        body {
            margin: 0;
            font-family: 'FreeSerif', serif;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        #controls {
            font-size: 95%;
            text-align: center;
        }

        #controls button,
        #controls input {
            font-size: inherit;
            vertical-align: middle;

            width: 2.2em;
            box-sizing: border-box;
            line-height: 1;

            padding-bottom: 0;

            padding-right: 0;
            min-height: 1.8em;
        }

            width: auto;
            min-width: 4.6em;
            padding-left: 0.3em;
            padding-right: 0.3em;

            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.35);
            background: #d9d9d9;
        }

            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: center;

        #buttonRow label,

<body>
    <canvas id="board" width="512" height="512" style="display:block;margin:8px auto;max-width:calc(100vw - 16px);height:auto"></canvas>

    <div id="controls">
        <div id="buttonRow">
            <button id="resetBtn" title="Reset">↺</button>
            <label>&nbsp;Depth:&nbsp;<input id="depthInput" type="number" value="3" min="1" max="9" style="width:1.5em"></label>
            <label>&nbsp;Clumsy:&nbsp;<input id="clumsyInput" type="number" value="9" min="0" max="99" style="width:1.8em">&nbsp;%</label>
            <button id="previewBtn" title="Preview">Preview</button>
            <button id="takebackBtn" title="Undo">⌫</button>
        </div>
        <span id="status"></span>
        <div id="searchInfo">
            <strong id="lastMoveLabel">Info:</strong> <span id="lastMoveInfo">Your move...</span>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        var AI_COLOR = 'b';
        var PIECE_VALUE = { P: 1, N: 3, B: 3, R: 5, Q: 9, K: 1000 };
        var SEARCH_INF = 10001;
        var MATE_SCORE = 1001;
        var DEADLINE_CHECK_INTERVAL = 128;
        var BASE_SLICE_MS = 10;
        var BASE_NODE_BUDGET = 192;
        var KINDLE_BATCH_BOOST = 100;
        var HARD_DEADLINE_MS = 30000;
        var SOFT_DEADLINE_MS = 10000;
        var PARTIAL_DEPTH_USE_THRESHOLD = 0.5;
        var DEFAULT_DEPTH_GROWTH = 2.6;
        var MIN_DEPTH_GROWTH = 1.4;
        var MAX_DEPTH_GROWTH = 4.5;

        var STORAGE = {
            depth: 'chess_max_depth',
            clumsy: 'chess_clumsiness',
            preview: 'chess_preview_enabled',
            kindleOverride: 'chess_kindle_override'
        };

        var LIGHT_SQUARE = '#F0D9B5';
        var DARK_SQUARE = '#B58863';
        var MARK_COLOR = '#202020';
        var PREVIEW_ALPHA = 0.35;

        var boardCanvas = document.getElementById('board');
        var ctx = boardCanvas.getContext ? boardCanvas.getContext('2d') : null;
        var controls = document.getElementById('controls');
        var statusEl = document.getElementById('status');
        var depthInput = document.getElementById('depthInput');
        var clumsyInput = document.getElementById('clumsyInput');
        var previewBtn = document.getElementById('previewBtn');
        var infoLabel = document.getElementById('lastMoveLabel');
        var infoText = document.getElementById('lastMoveInfo');

        var squareSize = 64;
        var fontWatchHandle = null;

        var userAgent = (typeof navigator !== 'undefined' && navigator.userAgent) ? navigator.userAgent : '';
        var kindleAuto = /Kindle|Silk|KF[A-Z0-9]+|KFTT|KFMUWI|KFSUWI|KFDOWI|KFTHWI|KFTRWI/i.test(userAgent);
        var kindleMode = kindleAuto;

        var game = {
            board: null,
            selected: null,
            turn: 'w',
            gameOver: false,
            history: [],
            lastDouble: null,
            material: 0,
            previewMove: null,
            previewDrawAt: 0,
            renderBoardSnapshot: null,
            renderLastDoubleSnapshot: null
        };

        var previewEnabled = false;

        var engine = {
            thinking: false,
            timerId: null,
            session: null
        };

        function clampNum(v, lo, hi) {
            if (v < lo) return lo;
            if (v > hi) return hi;
            return v;
        }

        function safeStorageGet(key) {
            try {
                return localStorage.getItem(key);
            } catch (err) {
                return null;
            }
        }

        function safeStorageSet(key, value) {
            try {
                localStorage.setItem(key, value);
            } catch (err) {
                // Ignore blocked storage in restricted environments.
            }
        }

        function configureKindleMode() {
            try {
                var query = (typeof location !== 'undefined' && location.search) ? location.search : '';
                var queryMatch = /[?&]kindle=(1|0)\b/i.exec(query);
                if (queryMatch) {
                    kindleMode = (queryMatch[1] === '1');
                    safeStorageSet(STORAGE.kindleOverride, kindleMode ? '1' : '0');
                } else {
                    var saved = safeStorageGet(STORAGE.kindleOverride);
                    if (saved === '1' || saved === '0') kindleMode = (saved === '1');
                }
            } catch (err) {
                // Ignore query parsing/storage failures.
            }
        }

        function startFreeSerifWatcher() {
            if (fontWatchHandle || !document.fonts || !document.fonts.load) return;
            fontWatchHandle = document.fonts.load("10px 'FreeSerif'");
            fontWatchHandle.then(function () { redraw(); }).catch(function () {});
        }

        function createPiece(type, color, moved) {
            return { type: type, color: color, moved: !!moved };
        }

        function clonePiece(piece) {
            if (!piece) return null;
            return createPiece(piece.type, piece.color, piece.moved);
        }

        function createInitialBoard() {
            var grid = [];
            var r;
            var c;
            var home = ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R'];

            for (r = 0; r < 8; r++) {
                grid[r] = [];
                for (c = 0; c < 8; c++) {
                    grid[r][c] = null;
                }
            }

            for (c = 0; c < 8; c++) {
                grid[1][c] = createPiece('P', 'b', false);
                grid[6][c] = createPiece('P', 'w', false);
            }

            for (c = 0; c < 8; c++) {
                grid[0][c] = createPiece(home[c], 'b', false);
                grid[7][c] = createPiece(home[c], 'w', false);
            }

            return grid;
        }

        function cloneBoard(srcBoard) {
            var out = [];
            var r;
            var c;
            for (r = 0; r < 8; r++) {
                out[r] = [];
                for (c = 0; c < 8; c++) {
                    out[r][c] = clonePiece(srcBoard[r][c]);
                }
            }
            return out;
        }

        function signedTypeValue(type, color) {
            var value = PIECE_VALUE[type] || 0;
            return color === 'w' ? value : -value;
        }

        function signedPieceValue(piece) {
            return piece ? signedTypeValue(piece.type, piece.color) : 0;
        }

        function promotionSwing(color) {
            var delta = (PIECE_VALUE.Q || 0) - (PIECE_VALUE.P || 0);

                    var pseudo = pseudoMovesFrom(p, r, c);
                    for (var i = 0; i < pseudo.length; i++) {
                        var mv = [r, c, pseudo[i][0], pseudo[i][1]];
                        var token = applyMove(mv);
                        var legalMove = !inCheck(color);
                        unapplyMove(mv, token);
                        if (legalMove) legal.push(mv);
                    }
                }
            }

            return legal;
        }

        function hasAnyLegalMove(color) {
            return generateLegalMoves(color).length > 0;
        }

        function isCheckmate(color) {
            return inCheck(color) && !hasAnyLegalMove(color);
        }

        function isStalemate(color) {
            return !inCheck(color) && !hasAnyLegalMove(color);
        }

        function tryMove(sr, sc, tr, tc) {
            var piece = game.board[sr][sc];
            if (!piece) return false;

            var target = game.board[tr][tc];
            if (target && target.color === piece.color) return false;

            var pseudo = pseudoMovesFrom(piece, sr, sc);
            var found = false;
            for (var i = 0; i < pseudo.length; i++) {
                if (pseudo[i][0] === tr && pseudo[i][1] === tc) {
                    found = true;
                    break;
                }
            }
            if (!found) return false;

            var move = [sr, sc, tr, tc];
            var token = applyMove(move);
            if (inCheck(piece.color)) {
                unapplyMove(move, token);
                return false;
            }

            game.history.push({ move: move, token: token });
            return true;
        }

        function readClumsyProbability() {
            var raw = parseFloat(clumsyInput.value);
            if (!isFinite(raw)) raw = 0;
            return clampNum(raw, 0, 99) / 100;
        }

        function clumsyRootScore(score, clumsyProb, aiColor) {
            var adjusted = score + (Math.random() - 0.5) / 100;
            var roll = Math.random();
            var hardMiss = clumsyProb * clumsyProb;

            if (roll < hardMiss) return aiColor === 'w' ? (-SEARCH_INF + 1) : (SEARCH_INF - 1);
            if (roll < clumsyProb) return adjusted + (Math.random() > 0.5 ? -1 : 1);
            return adjusted;
        }

        function evaluateMaterial() {
            var score = game.material;
            if (score > SEARCH_INF - 1) score = SEARCH_INF - 1;
            if (score < -SEARCH_INF + 1) score = -SEARCH_INF + 1;
            return score;
        }

        function makeFrame(depth, color, alpha, beta, undo) {
            return {
                depth: depth,
                color: color,
                alpha: alpha,
                beta: beta,
                moves: null,
                moveIndex: 0,
                best: (color === 'w') ? -SEARCH_INF : SEARCH_INF,
                entered: false,
                undo: undo || null
            };
        }

        function makeSearchTask(depth, color, alpha, beta, hardDeadline) {
            return {
                stack: [makeFrame(depth, color, alpha, beta, null)],
                hardDeadline: hardDeadline,
                deadlineCounter: 0,
                done: false,
                timedOut: false,
                value: 0
            };
        }

        function unwindTask(task) {
            while (task && task.stack && task.stack.length) {
                var frame = task.stack.pop();
                if (frame.undo) unapplyMove(frame.undo.move, frame.undo.token);
            }
            if (task) task.done = true;
        }

        function rollbackCurrentRoot(session) {
            if (!session || !session.current) return;
            if (session.current.task) unwindTask(session.current.task);
            unapplyMove(session.current.move, session.current.token);
            session.current = null;
        }

        function completeNode(task, value) {
            var frame = task.stack.pop();
            if (frame.undo) unapplyMove(frame.undo.move, frame.undo.token);

            if (!task.stack.length) {
                task.done = true;
                task.value = value;
                return;
            }

            var parent = task.stack[task.stack.length - 1];
            if (parent.color === 'w') {
                if (value > parent.best) parent.best = value;
                if (value > parent.alpha) parent.alpha = value;
            } else {
                if (value < parent.best) parent.best = value;
                if (value < parent.beta) parent.beta = value;
            }
        }

        function stepSearch(task, nodeBudget) {
            var visited = 0;

            while (!task.done && visited < nodeBudget) {
                if (task.deadlineCounter <= 0) {
                    if (Date.now() >= task.hardDeadline) {
                        unwindTask(task);
                        task.timedOut = true;
                        task.done = true;
                        task.value = 0;
                        return;
                    }
                    task.deadlineCounter = DEADLINE_CHECK_INTERVAL;
                }
                task.deadlineCounter -= 1;

                var frame = task.stack[task.stack.length - 1];

                if (!frame.entered) {
                    frame.entered = true;
                    visited += 1;

                    if (frame.depth === 0) {
                        completeNode(task, evaluateMaterial());
                        continue;
                    }

                    frame.moves = generateLegalMoves(frame.color);
                    if (!frame.moves.length) {
                        completeNode(task, inCheck(frame.color) ? (frame.color === 'w' ? -MATE_SCORE : MATE_SCORE) : 0);
                        continue;
                    }

                    frame.moveIndex = 0;
                    frame.best = (frame.color === 'w') ? -SEARCH_INF : SEARCH_INF;
                    continue;
                }

                if (frame.moveIndex >= frame.moves.length || frame.beta <= frame.alpha) {
                    completeNode(task, frame.best);
                    continue;
                }

                var childMove = frame.moves[frame.moveIndex];
                frame.moveIndex += 1;

                var childToken = applyMove(childMove);
                var childColor = frame.color === 'w' ? 'b' : 'w';

                task.stack.push(makeFrame(
                    frame.depth - 1,
                    childColor,
                    frame.alpha,
                    frame.beta,
                    { move: childMove, token: childToken }
                ));
            }
        }

        function recordDepthScore(session, move, score) {
            session.depthEvaluated += 1;
            if (!session.depthHasScore || score < session.depthBestScore) {
                session.depthHasScore = true;
                session.depthBestMove = move;
                session.depthBestScore = score;
            }

            if (session.depthHasScore && session.depthBestMove) {
                setPreviewMove(session.depthBestMove, false);
            }
        }

        function pickBestAtDeadline(session) {
            var usePartial = false;
            if (session.depthHasScore && session.depthBestMove && session.queue.length > 0) {
                usePartial = (session.depthEvaluated / session.queue.length) >= PARTIAL_DEPTH_USE_THRESHOLD;
            }
            if (usePartial) {
                return {
                    move: session.depthBestMove,
                    score: session.depthBestScore,
                    depth: session.depth
                };
            }

            return {
                move: session.bestMove,
                score: session.bestScore,
                depth: session.reachedDepth > 0 ? session.reachedDepth : 1
            };
        }

        function shouldGoDeeper(session, depthElapsedMs, nowMs) {
            var elapsed = Math.max(1, depthElapsedMs);
            if (session.prevDepthElapsedMs > 0) {
                var ratio = elapsed / session.prevDepthElapsedMs;
                session.depthGrowth = clampNum(ratio, MIN_DEPTH_GROWTH, MAX_DEPTH_GROWTH);
            }

            var growth = session.depthGrowth || DEFAULT_DEPTH_GROWTH;
            var predictedMs = elapsed * growth;
            var safetyMs = Math.max(400, Math.min(2000, predictedMs * 0.10));
            return (nowMs + predictedMs + safetyMs) < session.hardDeadline;
        }

        function startNextRootMove(session) {
            if (session.queueIndex >= session.queue.length) return false;

            var move = session.queue[session.queueIndex];
            session.queueIndex += 1;

            var token = applyMove(move);

            if (isCheckmate('w')) {
                unapplyMove(move, token);
                recordDepthScore(session, move, clumsyRootScore(-MATE_SCORE, session.clumsyProb, AI_COLOR));
                return true;
            }

            if (isStalemate('w')) {
                unapplyMove(move, token);
                recordDepthScore(session, move, clumsyRootScore(0, session.clumsyProb, AI_COLOR));
                return true;
            }

            session.current = {
                move: move,
                token: token,
                task: makeSearchTask(session.depth - 1, 'w', -SEARCH_INF, SEARCH_INF, session.hardDeadline)
            };
            return true;
        }

        function pumpEngine() {
            engine.timerId = null;
            var session = engine.session;
            if (!session || !engine.thinking || game.gameOver || game.turn !== AI_COLOR) return;

            if (Date.now() >= session.hardDeadline) session.timedOut = true;

            showThinkingInfo(session.depth, session.startMs);
            var batch = kindleMode ? KINDLE_BATCH_BOOST : 1;
            var sliceEnd = Date.now() + (BASE_SLICE_MS * batch);

            while (Date.now() < sliceEnd) {
                if (session.timedOut || Date.now() >= session.hardDeadline) {
                    session.timedOut = true;
                    break;
                }

                if (!session.current) {
                    if (!startNextRootMove(session)) break;
                    if (!session.current) continue;
                }

                stepSearch(session.current.task, BASE_NODE_BUDGET * batch);
                if (!session.current.task.done) break;

                var doneTask = session.current.task;
                var doneMove = session.current.move;
                var doneToken = session.current.token;
                unapplyMove(doneMove, doneToken);
                session.current = null;

                if (doneTask.timedOut) {
                    session.timedOut = true;
                    break;
                }

                recordDepthScore(session, doneMove, clumsyRootScore(doneTask.value, session.clumsyProb, AI_COLOR));
            }

            if (session.timedOut || Date.now() >= session.hardDeadline) {
                if (session.current) rollbackCurrentRoot(session);
                var deadlineChoice = pickBestAtDeadline(session);
                engine.session = null;
                finishEngineTurn(deadlineChoice.move, deadlineChoice.score, deadlineChoice.depth, session.startMs);
                return;
            }

            if (!session.current && session.queueIndex >= session.queue.length) {
                if (session.depthHasScore) {
                    session.bestMove = session.depthBestMove;
                    session.bestScore = session.depthBestScore;
                    session.reachedDepth = session.depth;
                    if (session.bestMove) setPreviewMove(session.bestMove, true);
                }

                var depthDoneAt = Date.now();
                var depthElapsed = depthDoneAt - session.depthStartedAt;
                if (session.depth >= session.targetDepth || !shouldGoDeeper(session, depthElapsed, depthDoneAt)) {
                    engine.session = null;
                    finishEngineTurn(session.bestMove, session.bestScore, session.reachedDepth, session.startMs);
                    return;
                }

                session.prevDepthElapsedMs = Math.max(1, depthElapsed);
                session.depthStartedAt = depthDoneAt;
                session.depth += 1;
                session.queueIndex = 0;
                session.depthHasScore = false;
                session.depthBestMove = null;
                session.depthBestScore = SEARCH_INF;
                session.depthEvaluated = 0;
            }

            engine.timerId = setTimeout(pumpEngine, 0);
        }

        function startEngineTurn() {
            if (engine.thinking || game.gameOver || game.turn !== AI_COLOR) return;

            var roots = generateLegalMoves(AI_COLOR);
            if (!roots.length) {
                game.gameOver = true;
                refreshStatus();
                return;
            }

            var startMs = Date.now();
            engine.thinking = true;
            engine.session = {
                startMs: startMs,
                hardDeadline: startMs + HARD_DEADLINE_MS,
                softDeadline: startMs + SOFT_DEADLINE_MS,
                targetDepth: clampNum(parseInt(depthInput.value, 10) || 3, 1, 9),
                clumsyProb: readClumsyProbability(),
                depth: 1,
                depthStartedAt: startMs,
                prevDepthElapsedMs: 0,
                depthGrowth: DEFAULT_DEPTH_GROWTH,
                queue: roots,
                queueIndex: 0,
                depthHasScore: false,
                depthBestMove: null,
                depthBestScore: SEARCH_INF,
                depthEvaluated: 0,
                current: null,
                bestMove: roots[0],
                bestScore: 0,
                reachedDepth: 0,
                timedOut: false
            };

            game.previewMove = null;
            game.previewDrawAt = 0;
            game.renderBoardSnapshot = cloneBoard(game.board);
            game.renderLastDoubleSnapshot = game.lastDouble ? { row: game.lastDouble.row, col: game.lastDouble.col } : null;

            showThinkingInfo(1, startMs);
            engine.timerId = setTimeout(pumpEngine, 0);
        }

        function takeBack() {
            clearEngineState();
            if (!game.history.length) return;

            var plies = game.history.length >= 2 ? 2 : 1;
            if (game.gameOver && game.turn === 'b') plies = 1;

            for (var i = 0; i < plies && game.history.length > 0; i++) {
                var entry = game.history.pop();
                unapplyMove(entry.move, entry.token);

                var piece = game.board[entry.move[0]][entry.move[1]];
                if (piece && piece.color) game.turn = piece.color;
            }

            if (plies === 2) game.turn = (AI_COLOR === 'w') ? 'b' : 'w';

            game.gameOver = false;
            game.selected = null;
            if (infoLabel) infoLabel.style.display = '';
            if (infoText) infoText.textContent = 'Move taken back.';

            redraw();
            refreshStatus();
        }

        function onBoardClick(ev) {
            if (game.gameOver || engine.thinking) return;

            var rect = boardCanvas.getBoundingClientRect();
            var x = ev.clientX - rect.left;
            var y = ev.clientY - rect.top;
            var col = Math.floor(x / squareSize);
            var row = Math.floor(y / squareSize);

            if (!inBounds(row, col)) return;

            var clicked = game.board[row][col];

            if (!game.selected) {
                if (clicked && clicked.color === game.turn) {
                    game.selected = [row, col];
                    redraw();
                }
                return;
            }
            var sr = game.selected[0];
            var sc = game.selected[1];

            if (sr === row && sc === col) {
                game.selected = null;
                redraw();
                return;
            }

            if (tryMove(sr, sc, row, col)) {
                game.selected = null;
                redraw();

                game.turn = game.turn === 'w' ? 'b' : 'w';
                if (isCheckmate(game.turn) || isStalemate(game.turn)) game.gameOver = true;

                refreshStatus();
                if (!game.gameOver && game.turn === AI_COLOR) {
                    engine.timerId = setTimeout(startEngineTurn, 50);
                }
            } else if (clicked && clicked.color === game.turn) {
                game.selected = [row, col];
                redraw();
            }
        }

        function initPersistentInputs() {
            var savedDepth = safeStorageGet(STORAGE.depth);
            var savedClumsy = safeStorageGet(STORAGE.clumsy);
            var savedPreview = safeStorageGet(STORAGE.preview);
            if (savedDepth !== null) depthInput.value = savedDepth;
            if (savedClumsy !== null) clumsyInput.value = savedClumsy;
            previewEnabled = (savedPreview === '1');
            if (previewBtn) {
                previewBtn.textContent = 'Preview';
                previewBtn.className = previewEnabled ? 'is-on' : '';
            }

            depthInput.addEventListener('change', function () {
                safeStorageSet(STORAGE.depth, depthInput.value);
            });

            clumsyInput.addEventListener('change', function () {
                safeStorageSet(STORAGE.clumsy, clumsyInput.value);
            });

            if (previewBtn) {
                previewBtn.addEventListener('click', function () {
                    previewEnabled = !previewEnabled;
                    safeStorageSet(STORAGE.preview, previewEnabled ? '1' : '0');
                    previewBtn.textContent = 'Preview';
                    previewBtn.className = previewEnabled ? 'is-on' : '';
                    redraw();
                });
            }
        }

        function bindEvents() {
            document.getElementById('resetBtn').addEventListener('click', resetGame);
            document.getElementById('takebackBtn').addEventListener('click', takeBack);
            boardCanvas.addEventListener('click', onBoardClick);
            if (window.addEventListener) window.addEventListener('resize', resizeLayout);
        }

        configureKindleMode();
        initPersistentInputs();
        bindEvents();
        resetGame();
        startFreeSerifWatcher();
    })();
    </script>
    <script>
    (function () {
        'use strict';
        if (!('serviceWorker' in navigator)) return;
        if (!(location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) return;
        window.addEventListener('load', function () {
            navigator.serviceWorker.register('./sw.js').catch(function () {});
        });
    })();
    </script>
