<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Pente JS</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:'FreeSerif',serif;overflow-x:hidden;-webkit-text-size-adjust:100%;background:#fff;color:#23160f}
    .wrap{width:100%;margin:0;padding:8px 0 0}
    canvas{display:block;margin:8px auto;max-width:calc(100vw - 16px);height:auto;touch-action:manipulation}
    #controls{font-size:95%;text-align:center;font-family:serif}
    #controls button,#controls input{font-size:inherit;vertical-align:middle}
    #controls button{width:2.2em;line-height:1;padding:0;min-height:1.8em}
    #previewBtn{width:auto;min-width:4.6em;padding-left:.3em;padding-right:.3em}
    #previewBtn.is-on{box-shadow:inset 0 2px 4px rgba(0,0,0,.35);background:#d9d9d9}
    #buttonRow{display:flex;flex-wrap:nowrap;align-items:center;justify-content:center;gap:.25em;white-space:nowrap}
    #buttonRow label{display:inline-flex;align-items:center;line-height:1;white-space:nowrap}
    #status{display:block;margin-top:.35em;font-weight:700}
  </style>
</head>
<body>
  <main class="wrap">
    <canvas id="board" width="900" height="900"></canvas>
    <div id="controls">
      <div id="buttonRow">
        <button id="resetBtn" title="Reset">&#8634;</button>
        <label>&nbsp;Depth:&nbsp;<input id="depthInput" type="number" value="3" min="1" max="9" style="width:2.2em"></label>
        <label>&nbsp;Clumsy:&nbsp;<input id="clumsyInput" type="number" value="0" min="0" max="100" style="width:2.2em;margin-right:2px">%</label>
        <button id="previewBtn" title="Preview">Preview</button>
        <button id="takebackBtn" title="Undo">&#9003;</button>
      </div>
      <span id="status"></span>
    </div>
  </main>
  <script>
  (function(){
    'use strict';
    var N=13,HUMAN='w',AI='b',INF=1e9;
    var board,turn,over,winner,history,previewMove,previewEnabled,aiBusy,aiTimer,cell,pad,stoneR,captures;
    var aiThinkStart=0,aiDepthNow=0,aiDepthDone=0,aiLastSec=0,aiTargetDepth=0,aiBestMove=null,aiDepthStart=0,searchDeadline=0;
    var canvas=document.getElementById('board'),ctx=canvas.getContext&&canvas.getContext('2d');
    var controls=document.getElementById('controls'),statusEl=document.getElementById('status');
    var depthInput=document.getElementById('depthInput'),clumsyInput=document.getElementById('clumsyInput'),previewBtn=document.getElementById('previewBtn');
    var LIGHT_SQUARE='rgba(240,217,181,.25)',DARK_SQUARE='rgba(181,136,99,.25)',GRID='#4d4d4d';
    var dirs=[[1,0],[0,1],[1,1],[1,-1]];

    function clamp(v,lo,hi){v=parseFloat(v);if(!isFinite(v))v=lo;if(v<lo)return lo;if(v>hi)return hi;return v;}
    function save(k,v){try{localStorage.setItem(k,v);}catch(e){}}
    function load(k){try{return localStorage.getItem(k);}catch(e){return null;}}
    function opp(c){return c===HUMAN?AI:HUMAN;}
    function inBounds(r,c){return r>=0&&r<N&&c>=0&&c<N;}
    function makeBoard(){var b=[],r,c;for(r=0;r<N;r++){b[r]=[];for(c=0;c<N;c++)b[r][c]=null;}return b;}
    function cloneMarks(){var a=[],r,c;for(r=0;r<N;r++){a[r]=[];for(c=0;c<N;c++)a[r][c]=false;}return a;}
    function cloneBoard(src){var b=[],r,c;for(r=0;r<N;r++){b[r]=[];for(c=0;c<N;c++)b[r][c]=src[r][c];}return b;}
    function boardFull(){var r,c;for(r=0;r<N;r++)for(c=0;c<N;c++)if(board[r][c]===null)return false;return true;}

    function countRunFrom(r,c,dr,dc,color){
      var n=0,nr=r,nc=c;
      while(inBounds(nr,nc)&&board[nr][nc]===color){n++;nr+=dr;nc+=dc;}
      return n;
    }
    function hasFive(color){
      var r,c,d,n;
      for(r=0;r<N;r++)for(c=0;c<N;c++){
        if(board[r][c]!==color)continue;
        for(d=0;d<dirs.length;d++){
          n=1+countRunFrom(r+dirs[d][0],c+dirs[d][1],dirs[d][0],dirs[d][1],color);
          if(n>=5)return true;
        }
      }
      return false;
    }

    function moveHeuristic(r,c,color){
      var s=0,center=(N-1)/2,dr,dc,nr,nc,v;
      s -= (Math.abs(r-center)+Math.abs(c-center))*0.2;
      for(dr=-1;dr<=1;dr++)for(dc=-1;dc<=1;dc++){
        if(!dr&&!dc)continue;
        nr=r+dr;nc=c+dc;
        if(!inBounds(nr,nc))continue;
        v=board[nr][nc];
        if(v===color)s+=0.9;else if(v===opp(color))s+=1.1;
      }
      return s;
    }

    function legalMoves(color,forAi){
      var r,c,used={},list=[],m,hasStone=false,key;
      for(r=0;r<N;r++)for(c=0;c<N;c++)if(board[r][c]!==null)hasStone=true;
      if(!hasStone){return [{r:Math.floor(N/2),c:Math.floor(N/2),score:0}];}
      for(r=0;r<N;r++)for(c=0;c<N;c++){
        if(board[r][c]!==null)continue;
        var near=false,dr,dc,nr,nc;
        for(dr=-2;dr<=2;dr++)for(dc=-2;dc<=2;dc++){
          nr=r+dr;nc=c+dc;
          if(inBounds(nr,nc)&&board[nr][nc]!==null)near=true;
        }
        if(!near)continue;
        key=r+','+c;
        if(!used[key])used[key]={r:r,c:c,score:moveHeuristic(r,c,color)};
      }
      for(m in used)if(Object.prototype.hasOwnProperty.call(used,m))list.push(used[m]);
      list.sort(function(a,b){return b.score-a.score;});
      if(forAi&&list.length>24)list=list.slice(0,24);
      return list;
    }

    function applyMove(r,c,color){
      var token,i,d,dr,dc,r1,c1,r2,c2,r3,c3;
      if(!inBounds(r,c)||board[r][c]!==null)return null;
      token={r:r,c:c,color:color,flips:[],prevCaptures:{w:captures.w,b:captures.b}};
      board[r][c]=color;
      for(i=0;i<dirs.length;i++){
        d=dirs[i];
        for(var s=-1;s<=1;s+=2){
          dr=d[0]*s;dc=d[1]*s;
          r1=r+dr;c1=c+dc;r2=r+dr*2;c2=c+dc*2;r3=r+dr*3;c3=c+dc*3;
          if(!inBounds(r3,c3))continue;
          if(board[r1][c1]===opp(color)&&board[r2][c2]===opp(color)&&board[r3][c3]===color){
            token.flips.push([r1,c1,board[r1][c1]]);
            token.flips.push([r2,c2,board[r2][c2]]);
            board[r1][c1]=null;board[r2][c2]=null;
          }
        }
      }
      captures[color]+=token.flips.length;
      return token;
    }
    function undoToken(t){
      var i,p;
      if(!t)return;
      board[t.r][t.c]=null;
      for(i=0;i<t.flips.length;i++){p=t.flips[i];board[p[0]][p[1]]=p[2];}
      captures.w=t.prevCaptures.w;captures.b=t.prevCaptures.b;
    }

    function winnerNow(){
      if(hasFive(HUMAN)||captures.w>=10)return HUMAN;
      if(hasFive(AI)||captures.b>=10)return AI;
      if(boardFull())return 'd';
      return null;
    }

    function evalLine5(cells,color){
      var me=0,them=0,i,v,s=0;
      for(i=0;i<5;i++){v=cells[i];if(v===color)me++;else if(v===opp(color))them++;}
      if(me>0&&them===0){if(me===5)s+=10000;else if(me===4)s+=180;else if(me===3)s+=24;else if(me===2)s+=5;else s+=1;}
      if(them>0&&me===0){if(them===5)s-=11000;else if(them===4)s-=210;else if(them===3)s-=28;else if(them===2)s-=6;else s-=1;}
      return s;
    }
    function evaluate(){
      var w=winnerNow(),r,c,s=0,cells;
      if(w===AI)return 100000;
      if(w===HUMAN)return -100000;
      s += (captures.b-captures.w)*80;
      for(r=0;r<N;r++)for(c=0;c+4<N;c++){cells=[board[r][c],board[r][c+1],board[r][c+2],board[r][c+3],board[r][c+4]];s+=evalLine5(cells,AI);}
      for(c=0;c<N;c++)for(r=0;r+4<N;r++){cells=[board[r][c],board[r+1][c],board[r+2][c],board[r+3][c],board[r+4][c]];s+=evalLine5(cells,AI);}
      for(r=0;r+4<N;r++)for(c=0;c+4<N;c++){cells=[board[r][c],board[r+1][c+1],board[r+2][c+2],board[r+3][c+3],board[r+4][c+4]];s+=evalLine5(cells,AI);}
      for(r=4;r<N;r++)for(c=0;c+4<N;c++){cells=[board[r][c],board[r-1][c+1],board[r-2][c+2],board[r-3][c+3],board[r-4][c+4]];s+=evalLine5(cells,AI);}
      return s;
    }
    function terminal(){return !!winnerNow();}

    function search(depth,color,alpha,beta){
      if(searchDeadline&&Date.now()>=searchDeadline)return evaluate();
      if(depth<=0||terminal())return evaluate();
      var moves=legalMoves(color,true),i,m,t,val,best;
      if(!moves.length)return evaluate();
      if(color===AI){
        best=-INF;
        for(i=0;i<moves.length;i++){
          m=moves[i];t=applyMove(m.r,m.c,color);if(!t)continue;
          val=search(depth-1,opp(color),alpha,beta);undoToken(t);
          if(val>best)best=val;if(best>alpha)alpha=best;if(beta<=alpha)break;
        }return best;
      }
      best=INF;
      for(i=0;i<moves.length;i++){
        m=moves[i];t=applyMove(m.r,m.c,color);if(!t)continue;
        val=search(depth-1,opp(color),alpha,beta);undoToken(t);
        if(val<best)best=val;if(best<beta)beta=best;if(beta<=alpha)break;
      }return best;
    }

    function chooseAiMoveAtDepth(depth){
      var maxDepth=clamp(depth,1,9)|0,moves=legalMoves(AI,true),i,m,t,val,best=-INF,pool=[],bestMove=null,clumsy=clamp(clumsyInput.value,0,100)/100,n,deadline=Date.now()+350;
      if(!moves.length)return null;
      searchDeadline=deadline;
      for(i=0;i<moves.length;i++){
        m=moves[i];t=applyMove(m.r,m.c,AI);if(!t)continue;
        val=search(maxDepth-1,HUMAN,-INF,INF);undoToken(t);m.score=val;
        if(val>best){best=val;pool=[m];}else if(val===best)pool.push(m);
        if(Date.now()>=deadline)break;
      }
      searchDeadline=0;
      if(pool.length){
        bestMove=pool[0];
        if(clumsy>0&&pool.length>1){n=Math.max(1,Math.min(pool.length,1+Math.floor(clumsy*3)));bestMove=pool[Math.floor(Math.random()*n)];}
      }
      return bestMove;
    }

    function leadText(){
      var e=evaluate();
      if(e>0)return 'Black leads by '+e.toFixed(1);
      if(e<0)return 'White leads by '+Math.abs(e).toFixed(1);
      return 'Level';
    }
    function refresh(){
      var w=winnerNow(),score=evaluate();
      if(over||w){
        over=true;winner=w||winner;
        if(winner===HUMAN)statusEl.textContent='Info: Game over: White wins '+Math.abs(score).toFixed(1)+'.';
        else if(winner===AI)statusEl.textContent='Info: Game over: Black wins '+Math.abs(score).toFixed(1)+'.';
        else statusEl.textContent='Info: Game over: Draw 0.0.';
      }else if(aiBusy&&aiThinkStart){
        statusEl.textContent='Info: Thinking Depth '+aiDepthNow+' for '+((Date.now()-aiThinkStart)/1000).toFixed(1)+' s.';
      }else{
        statusEl.textContent='Info: '+leadText()+' for depth '+(aiDepthDone>0?aiDepthDone:clamp(depthInput.value,1,9))+' after '+aiLastSec.toFixed(1)+' s.';
      }
    }

    function drawStone(r,c,color,alpha){
      var x=pad+c*cell+cell*0.5,y=pad+r*cell+cell*0.5;
      if(typeof alpha==='number')ctx.globalAlpha=alpha;
      ctx.fillStyle=(color===HUMAN)?'#ffffff':'#000000';
      ctx.beginPath();ctx.arc(x,y,stoneR,0,Math.PI*2,false);ctx.fill();
      ctx.lineWidth=Math.max(2,stoneR*0.14);ctx.strokeStyle=(color===HUMAN)?'#000000':'#ffffff';ctx.stroke();
      if(typeof alpha==='number')ctx.globalAlpha=1;
    }
    function drawCornerMarks(r,c,color){
      var x0=pad+c*cell,y0=pad+r*cell,seg=cell*0.12,w=Math.max(2,cell*0.07);
      ctx.strokeStyle=color||'#000000';ctx.lineWidth=w;ctx.lineCap='butt';ctx.beginPath();
      ctx.moveTo(x0,y0+seg);ctx.lineTo(x0,y0);ctx.lineTo(x0+seg,y0);
      ctx.moveTo(x0+cell,y0+seg);ctx.lineTo(x0+cell,y0);ctx.lineTo(x0+cell-seg,y0);
      ctx.moveTo(x0,y0+cell-seg);ctx.lineTo(x0,y0+cell);ctx.lineTo(x0+seg,y0+cell);
      ctx.moveTo(x0+cell,y0+cell-seg);ctx.lineTo(x0+cell,y0+cell);ctx.lineTo(x0+cell-seg,y0+cell);
      ctx.stroke();
    }
    function draw(){
      var r,c,last;
      if(!ctx)return;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for(r=0;r<N;r++)for(c=0;c<N;c++){
        ctx.fillStyle=((r+c)%2===0)?LIGHT_SQUARE:DARK_SQUARE;
        ctx.fillRect(pad+c*cell,pad+r*cell,cell,cell);
      }
      ctx.strokeStyle=GRID;ctx.lineWidth=Math.max(1,cell*0.03);ctx.beginPath();
      for(r=0;r<N;r++){ctx.moveTo(pad+cell*0.5,pad+r*cell+cell*0.5);ctx.lineTo(pad+(N-1)*cell+cell*0.5,pad+r*cell+cell*0.5);}
      for(c=0;c<N;c++){ctx.moveTo(pad+c*cell+cell*0.5,pad+cell*0.5);ctx.lineTo(pad+c*cell+cell*0.5,pad+(N-1)*cell+cell*0.5);}
      ctx.stroke();
      for(r=0;r<N;r++)for(c=0;c<N;c++)if(board[r][c])drawStone(r,c,board[r][c],1);
      if(previewEnabled&&previewMove&&turn===AI)drawStone(previewMove.r,previewMove.c,AI,0.32);
      if(history.length){last=history[history.length-1].move;drawCornerMarks(last.r,last.c,'#000000');}
    }

    function recordMove(color,token,move){history.push({color:color,token:token,move:move});turn=opp(color);previewMove=null;}
    function placeHuman(r,c){
      var t;if(over||turn!==HUMAN||aiBusy)return;
      t=applyMove(r,c,HUMAN);if(!t)return;
      recordMove(HUMAN,t,{r:r,c:c});draw();refresh();if(!over)scheduleAi();
    }
    function scheduleAi(){if(aiTimer)clearTimeout(aiTimer);aiTimer=setTimeout(startEngineTurn,previewEnabled?60:20);}
    function startEngineTurn(){
      aiTimer=null;if(over||turn!==AI||aiBusy)return;
      aiBusy=true;aiThinkStart=Date.now();aiDepthStart=aiThinkStart;aiDepthNow=1;aiTargetDepth=clamp(depthInput.value,1,9);aiBestMove=null;refresh();
      aiTimer=setTimeout(pumpEngineTurn,0);
    }
    function finishEngineTurn(){
      var t,m;aiBusy=false;aiLastSec=(Date.now()-aiThinkStart)/1000;aiDepthDone=aiDepthNow>0?Math.min(aiDepthNow,aiTargetDepth):aiDepthDone;
      aiThinkStart=0;aiDepthNow=0;aiTargetDepth=0;aiDepthStart=0;m=aiBestMove;
      if(!m){over=true;refresh();return;}
      if(previewEnabled){previewMove={r:m.r,c:m.c,color:AI};draw();}
      setTimeout(function(){
        if(over||turn!==AI)return;
        t=applyMove(m.r,m.c,AI);if(!t){over=true;refresh();return;}
        recordMove(AI,t,{r:m.r,c:m.c});draw();refresh();
      },previewEnabled?220:0);
    }
    function pumpEngineTurn(){
      var m,depthElapsed;aiTimer=null;if(over||turn!==AI||!aiBusy)return;
      refresh();if(Date.now()-aiThinkStart>=30000){finishEngineTurn();return;}
      m=chooseAiMoveAtDepth(aiDepthNow);if(m)aiBestMove=m;
      if(previewEnabled&&aiBestMove){previewMove={r:aiBestMove.r,c:aiBestMove.c,color:AI};draw();}
      depthElapsed=Date.now()-aiDepthStart;
      if(aiDepthNow>=aiTargetDepth||depthElapsed>=10000||(Date.now()+Math.max(400,depthElapsed*2))>=(aiThinkStart+30000)){finishEngineTurn();return;}
      aiDepthNow+=1;aiDepthStart=Date.now();aiTimer=setTimeout(pumpEngineTurn,0);
    }
    function undoEntry(e){if(!e)return;undoToken(e.token);turn=e.color;}
    function takeBack(){
      if(aiTimer){clearTimeout(aiTimer);aiTimer=null;}
      aiBusy=false;previewMove=null;aiThinkStart=0;aiDepthNow=0;aiTargetDepth=0;aiBestMove=null;aiDepthStart=0;
      if(!history.length)return;undoEntry(history.pop());while(history.length&&turn!==HUMAN)undoEntry(history.pop());
      over=false;winner=null;draw();refresh();
    }
    function reset(){
      if(aiTimer){clearTimeout(aiTimer);aiTimer=null;}
      board=makeBoard();turn=HUMAN;over=false;winner=null;history=[];previewMove=null;aiBusy=false;captures={w:0,b:0};
      aiThinkStart=0;aiDepthNow=0;aiDepthDone=0;aiLastSec=0;aiTargetDepth=0;aiBestMove=null;aiDepthStart=0;
      resize();draw();refresh();
    }
    function click(ev){
      var rect,x,y,sx,sy,r,c;
      if(over||turn!==HUMAN||aiBusy)return;
      rect=canvas.getBoundingClientRect();sx=canvas.width/rect.width;sy=canvas.height/rect.height;
      x=(ev.clientX-rect.left)*sx;y=(ev.clientY-rect.top)*sy;
      c=Math.floor((x-pad)/cell);r=Math.floor((y-pad)/cell);
      if(!inBounds(r,c)||board[r][c]!==null)return;
      placeHuman(r,c);
    }
    function resize(){
      var safety=60,controlsH=controls?controls.offsetHeight+16:0,maxW=(typeof window.innerWidth==='number'&&isFinite(window.innerWidth))?window.innerWidth-16:512,maxH=(typeof window.innerHeight==='number'&&isFinite(window.innerHeight))?window.innerHeight-controlsH-safety:512,size=Math.max(128,Math.floor(Math.min(maxW,maxH))),freeW;
      if(controls){
        var tw=Math.floor(size*0.9);controls.style.width=tw+'px';controls.style.fontSize=Math.max(10,Math.round(size*0.033))+'px';controls.style.boxSizing='border-box';controls.style.textAlign='center';
        controlsH=controls.offsetHeight+16;maxH=(typeof window.innerHeight==='number'&&isFinite(window.innerHeight))?window.innerHeight-controlsH-safety:512;size=Math.max(128,Math.floor(Math.min(maxW,maxH)));
      }
      freeW=Math.max(0,maxW-size);canvas.width=size;canvas.height=size;canvas.style.marginLeft=(8+Math.floor(freeW/2))+'px';canvas.style.marginRight=(8+Math.ceil(freeW/2))+'px';canvas.style.marginTop='8px';canvas.style.marginBottom='8px';
      if(controls){
        var cw=Math.floor(size*0.9),sg=size-cw;controls.style.width=cw+'px';controls.style.fontSize=Math.max(10,Math.round(size*0.033))+'px';controls.style.marginLeft=(8+Math.floor(freeW/2)+Math.floor(sg/2))+'px';controls.style.marginRight=(8+Math.ceil(freeW/2)+Math.ceil(sg/2))+'px';controls.style.marginTop='0px';controls.style.marginBottom='8px';
      }
      cell=Math.floor(size/N);pad=Math.floor((size-cell*N)/2);stoneR=Math.max(8,Math.floor(cell*0.34));draw();
    }
    function init(){
      var d=load('pente_depth'),c=load('pente_clumsy'),p=load('pente_preview');
      if(d!==null)depthInput.value=d;if(c!==null)clumsyInput.value=c;previewEnabled=(p==='1');previewBtn.className=previewEnabled?'is-on':'';
    }
    function bind(){
      document.getElementById('resetBtn').addEventListener('click',reset);
      document.getElementById('takebackBtn').addEventListener('click',takeBack);
      canvas.addEventListener('click',click);
      if(window.addEventListener)window.addEventListener('resize',resize);
      depthInput.addEventListener('change',function(){save('pente_depth',depthInput.value);});
      clumsyInput.addEventListener('change',function(){save('pente_clumsy',clumsyInput.value);});
      previewBtn.addEventListener('click',function(){previewEnabled=!previewEnabled;save('pente_preview',previewEnabled?'1':'0');previewBtn.className=previewEnabled?'is-on':'';draw();});
    }

    window.__test={getState:function(){return{over:over,turn:turn,wCaps:captures.w,bCaps:captures.b};},legalMoves:function(){return legalMoves(turn,false);},play:function(m){placeHuman(m.r,m.c);return true;},forceOutcome:function(side){over=true;winner=side==='white'?HUMAN:side==='black'?AI:'d';refresh();}};
    init();bind();reset();
  }());
  </script>
</body>
</html>
