<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Go JS</title>
  <style>
    :root{
      --bg1:#2e1a10;
      --bg2:#7b5a38;
      --panel:rgba(248,236,212,.94);
      --text:#26170f;
      --muted:#5f4530;
      --line:#8f6a44;
      --wood:#c79a5a;
      --wood2:#b88342;
      --shadow:rgba(25,14,7,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'FreeSerif', serif;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
      background:#fff;
      color:var(--text);
    }
    .wrap{width:100%; margin:0; padding:8px 0 0}
    canvas{
      display:block;
      margin:8px auto;
      max-width:calc(100vw - 16px);
      height:auto;
      touch-action:manipulation;
    }
    #controls{
      font-size:95%;
      text-align:center;
      font-family:serif;
      box-sizing:border-box;
    }
    #controls button,
    #controls input{
      font-size:inherit;
      vertical-align:middle;
    }
    #controls button{
      width:2.2em;
      box-sizing:border-box;
      line-height:1;
      padding-top:0;
      padding-bottom:0;
      padding-left:0;
      padding-right:0;
      min-height:1.8em;
    }
    #buttonRow{
      display:flex;
      flex-wrap:nowrap;
      align-items:center;
      justify-content:center;
      gap:0.25em;
      white-space:nowrap;
    }
    #buttonRow button,
    #buttonRow label,
    #buttonRow input{
      vertical-align:middle;
    }
    #buttonRow label{
      display:inline-flex;
      align-items:center;
      line-height:1;
      white-space:nowrap;
    }
    #clumsyLabel{
      margin-right:0.2em;
    }
    #previewBtn{
      width:auto;
      min-width:4.6em;
      padding-left:0.3em;
      padding-right:0.3em;
    }
    #previewBtn.is-on{
      box-shadow:inset 0 2px 4px rgba(0,0,0,.35);
      background:#d9d9d9;
    }
    #status{
      display:block;
      margin-top:.35em;
      font-weight:700;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <canvas id="board" width="860" height="860"></canvas>
    <div id="controls">
      <div id="buttonRow">
        <button id="resetBtn" title="Reset">↺</button>
        <label>&nbsp;Depth:&nbsp;<input id="depthInput" type="number" value="2" min="1" max="9" style="width:2.2em"></label>
        <label id="clumsyLabel">&nbsp;Clumsy:&nbsp;<input id="clumsyInput" type="number" value="0" min="0" max="100" style="width:2.2em;margin-right:2px">%</label>
        <button id="previewBtn" title="Preview">Preview</button>
        <button id="passBtn" title="Pass">↷</button>
        <button id="takebackBtn" title="Undo">⌫</button>
      </div>
      <span id="status"></span>
    </div>
  </main>

  <script>
  (function(){
    'use strict';

    var N = 13;
    var HUMAN = 'w';
    var AI = 'b';
    var KOMI = 6.5;
    var board = null;
    var turn = HUMAN;
    var over = false;
    var history = [];
    var captures = { b: 0, w: 0 };
    var koSig = null;
    var passStreak = 0;
    var previewMove = null;
    var previewEnabled = false;
    var aiBusy = false;
    var aiTimer = null;
    var aiThinkStart = 0;
    var aiDepthNow = 0;
    var aiDepthDone = 0;
    var aiLastSec = 0;
    var aiTargetDepth = 0;
    var aiBestMove = null;
    var aiDepthStart = 0;
    var searchDeadline = 0;
    var cell = 54;
    var pad = 30;
    var stoneR = 22;

    var canvas = document.getElementById('board');
    var ctx = canvas.getContext && canvas.getContext('2d');
    var controls = document.getElementById('controls');
    var statusEl = document.getElementById('status');
    var depthInput = document.getElementById('depthInput');
    var clumsyInput = document.getElementById('clumsyInput');
    var previewBtn = document.getElementById('previewBtn');
    var LIGHT_SQUARE = 'rgba(240,217,181,.20)';
    var DARK_SQUARE = 'rgba(181,136,99,.20)';
    var GO_ACCENT = '#4d4d4d';

    function clamp(v, lo, hi) {
      v = parseFloat(v);
      if (!isFinite(v)) v = lo;
      if (v < lo) return lo;
      if (v > hi) return hi;
      return v;
    }
    function pickClumsyMoveFromScores(scored, clumsyPct) {
      var pct = clamp(clumsyPct, 0, 100), p, u, skip = 0, idx;
      if (!scored || !scored.length) return null;
      if (scored.length === 1) return scored[0].move;
      if (pct >= 100) return scored[(Math.random() * scored.length) | 0].move;
      if (pct <= 0) return scored[0].move;
      p = pct / 100;
      u = Math.random();
      while (skip < scored.length - 1 && u < Math.pow(p, skip + 1)) skip++;
      idx = skip + ((Math.random() * (scored.length - skip)) | 0);
      return scored[idx].move;
    }

    function save(key, value) {
      try { localStorage.setItem(key, value); } catch (e) {}
    }

    function load(key) {
      try { return localStorage.getItem(key); } catch (e) { return null; }
    }

    function opp(color) {
      return color === HUMAN ? AI : HUMAN;
    }

    function makeBoard() {
      var b = [];
      var r, c;
      for (r = 0; r < N; r++) {
        b[r] = [];
        for (c = 0; c < N; c++) b[r][c] = null;
      }
      return b;
    }

    function cloneMarks() {
      var a = [];
      var r, c;
      for (r = 0; r < N; r++) {
        a[r] = [];
        for (c = 0; c < N; c++) a[r][c] = false;
      }
      return a;
    }

    function inBounds(r, c) {
      return r >= 0 && r < N && c >= 0 && c < N;
    }

    function boardSig() {
      var out = [];
      var r, c, line, v;
      for (r = 0; r < N; r++) {
        line = '';
        for (c = 0; c < N; c++) {
          v = board[r][c];
          line += v ? v : '.';
        }
        out.push(line);
      }
      return out.join('/');
    }

    function createInitialBoard() {
      var b = makeBoard();
      b[0][0] = 'w';
      b[N - 1][N - 1] = 'w';
      b[0][N - 1] = 'b';
      b[N - 1][0] = 'b';
      return b;
    }

    function collectGroup(r, c) {
      var color = board[r][c];
      var seen = cloneMarks();
      var stack = [[r, c]];
      var cells = [];
      var libs = 0;
      var i, j, p, nr, nc, v;
      var dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      seen[r][c] = true;
      while (stack.length) {
        p = stack.pop();
        cells.push([p[0], p[1]]);
        for (i = 0; i < dirs.length; i++) {
          nr = p[0] + dirs[i][0];
          nc = p[1] + dirs[i][1];
          if (!inBounds(nr, nc)) continue;
          v = board[nr][nc];
          if (v === null) {
            libs += 1;
          } else if (v === color && !seen[nr][nc]) {
            seen[nr][nc] = true;
            stack.push([nr, nc]);
          }
        }
      }
      return { cells: cells, libs: libs };
    }

    function makeMove(r, c, color) {
      if (!inBounds(r, c) || board[r][c] !== null) return null;

      var sigBefore = boardSig();
      var token = {
        kind: 'move',
        r: r,
        c: c,
        color: color,
        prevKo: koSig,
        prevPass: passStreak,
        prevCapB: captures.b,
        prevCapW: captures.w,
        removed: [],
        sigBefore: sigBefore
      };
      var dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      var i, nr, nc, g, j, p, v;
      var seen = cloneMarks();
      var oppColor = opp(color);

      board[r][c] = color;
      for (i = 0; i < dirs.length; i++) {
        nr = r + dirs[i][0];
        nc = c + dirs[i][1];
        if (!inBounds(nr, nc) || board[nr][nc] !== oppColor || seen[nr][nc]) continue;
        g = collectGroup(nr, nc);
        for (j = 0; j < g.cells.length; j++) {
          p = g.cells[j];
          seen[p[0]][p[1]] = true;
        }
        if (g.libs === 0) {
          for (j = 0; j < g.cells.length; j++) {
            p = g.cells[j];
            board[p[0]][p[1]] = null;
            token.removed.push([p[0], p[1]]);
          }
          if (color === 'b') captures.b += g.cells.length;
          else captures.w += g.cells.length;
        }
      }

      g = collectGroup(r, c);
      if (g.libs === 0 || boardSig() === koSig) {
        undoMove(token);
        return null;
      }

      koSig = sigBefore;
      passStreak = 0;
      return token;
    }

    function undoMove(token) {
      var i, p;
      if (!token) return;
      if (token.kind === 'pass') {
        koSig = token.prevKo;
        passStreak = token.prevPass;
        return;
      }
      board[token.r][token.c] = null;
      for (i = 0; i < token.removed.length; i++) {
        p = token.removed[i];
        board[p[0]][p[1]] = opp(token.color);
      }
      captures.b = token.prevCapB;
      captures.w = token.prevCapW;
      koSig = token.prevKo;
      passStreak = token.prevPass;
    }

    function makePass(color) {
      var token = {
        kind: 'pass',
        color: color,
        prevKo: koSig,
        prevPass: passStreak
      };
      koSig = null;
      passStreak += 1;
      return token;
    }

    function scoreTerritory() {
      var seen = cloneMarks();
      var score = 0;
      var r, c, q, cellData, p, nr, nc, i;
      var dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      for (r = 0; r < N; r++) {
        for (c = 0; c < N; c++) {
          if (board[r][c] !== null || seen[r][c]) continue;
          q = [[r, c]];
          seen[r][c] = true;
          var region = 0;
          var touchB = false;
          var touchW = false;
          while (q.length) {
            cellData = q.pop();
            region += 1;
            for (i = 0; i < dirs.length; i++) {
              nr = cellData[0] + dirs[i][0];
              nc = cellData[1] + dirs[i][1];
              if (!inBounds(nr, nc)) continue;
              if (board[nr][nc] === null) {
                if (!seen[nr][nc]) {
                  seen[nr][nc] = true;
                  q.push([nr, nc]);
                }
              } else if (board[nr][nc] === 'b') {
                touchB = true;
              } else {
                touchW = true;
              }
            }
          }
          if (touchW && !touchB) score += region;
          else if (touchB && !touchW) score -= region;
        }
      }
      return score;
    }

    function evaluateBoard() {
      var r, c;
      var stonesB = 0, stonesW = 0;
      var score = 0;
      for (r = 0; r < N; r++) {
        for (c = 0; c < N; c++) {
          if (board[r][c] === 'b') stonesB += 1;
          else if (board[r][c] === 'w') stonesW += 1;
        }
      }
      score += (stonesW - stonesB) * 2;
      score += (captures.w - captures.b) * 8;
      score += scoreTerritory();
      score += KOMI;
      return score;
    }
    function evaluateForAi() {
      var s = evaluateBoard();
      return AI === 'w' ? s : -s;
    }

    function hasAnyLegalMove(color) {
      return legalMoves(color, false).length > 0;
    }

    function isTerminal() {
      return passStreak >= 2 || boardFull() || (!hasAnyLegalMove(HUMAN) && !hasAnyLegalMove(AI));
    }

    function boardFull() {
      var r, c;
      for (r = 0; r < N; r++) {
        for (c = 0; c < N; c++) {
          if (board[r][c] === null) return false;
        }
      }
      return true;
    }

    function movePotential(r, c, color) {
      var score = 0;
      var center = (N - 1) / 2;
      var dr = Math.abs(r - center);
      var dc = Math.abs(c - center);
      var dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      var i, nr, nc;
      score -= (dr + dc) * 0.25;
      for (i = 0; i < dirs.length; i++) {
        nr = r + dirs[i][0];
        nc = c + dirs[i][1];
        if (!inBounds(nr, nc) || board[nr][nc] === null) continue;
        score += board[nr][nc] === color ? 1.4 : 0.8;
      }
      return score;
    }
    function tacticalMoveScore(r, c, color) {
      var tok = makeMove(r, c, color);
      var g, libs, captured, score;
      if (!tok) return -1e9;
      g = collectGroup(r, c);
      libs = g.libs;
      captured = tok.removed.length;
      score = movePotential(r, c, color);
      score += captured * 40;
      score += Math.min(libs, 6) * 0.9;
      if (captured === 0 && libs <= 1) score -= 28;
      if (libs === 2) score -= 4;
      undoMove(tok);
      return score;
    }

    function legalMoves(color, forAi) {
      var out = [];
      var r, c, dr, dc, nr, nc, key, cand;
      var used = {};
      var allStones = [];
      for (r = 0; r < N; r++) {
        for (c = 0; c < N; c++) {
          if (board[r][c] !== null) allStones.push([r, c]);
        }
      }

      if (forAi) {
        if (!allStones.length) {
          cand = [[Math.floor(N / 2), Math.floor(N / 2)]];
        } else {
          for (var s = 0; s < allStones.length; s++) {
            r = allStones[s][0];
            c = allStones[s][1];
            for (dr = -2; dr <= 2; dr++) {
              for (dc = -2; dc <= 2; dc++) {
                if (dr === 0 && dc === 0) continue;
                if (Math.max(Math.abs(dr), Math.abs(dc)) > 2) continue;
                nr = r + dr;
                nc = c + dc;
                if (!inBounds(nr, nc) || board[nr][nc] !== null) continue;
                key = nr + ',' + nc;
                if (!used[key]) used[key] = [nr, nc];
              }
            }
          }
          cand = [];
          for (key in used) {
            if (Object.prototype.hasOwnProperty.call(used, key)) cand.push(used[key]);
          }
          cand.sort(function(a, b) {
            return movePotential(b[0], b[1], color) - movePotential(a[0], a[1], color);
          });
        }
      } else {
        cand = [];
        for (r = 0; r < N; r++) {
          for (c = 0; c < N; c++) {
            if (board[r][c] !== null) continue;
            cand.push([r, c]);
          }
        }
      }

      for (var i = 0; i < cand.length; i++) {
        r = cand[i][0];
        c = cand[i][1];
        var s0 = tacticalMoveScore(r, c, color);
        if (s0 <= -1e8) continue;
        out.push({ r: r, c: c, score: s0 });
      }

      out.sort(function(a, b) { return b.score - a.score; });
      return out;
    }

    function searchMoveLimit(depth) {
      if (depth >= 5) return 28;
      if (depth >= 3) return 24;
      return 20;
    }

    function rootMoveLimit(depth) {
      if (depth >= 5) return 22;
      if (depth >= 3) return 18;
      return 14;
    }

    function search(depth, color, alpha, beta) {
      if (searchDeadline && Date.now() >= searchDeadline) return evaluateForAi();
      if (depth <= 0 || isTerminal()) return evaluateForAi();
      var moves = legalMoves(color, true);
      if (!moves.length) {
        if (!hasAnyLegalMove(opp(color))) return evaluateForAi();
        return search(depth - 1, opp(color), alpha, beta);
      }
      if (moves.length > searchMoveLimit(depth)) moves = moves.slice(0, searchMoveLimit(depth));

      if (color === AI) {
        var best = -1e9;
        for (var i = 0; i < moves.length; i++) {
          var m = moves[i];
          var tok = makeMove(m.r, m.c, color);
          if (!tok) continue;
          var val = search(depth - 1, opp(color), alpha, beta);
          undoMove(tok);
          if (val > best) best = val;
          if (best > alpha) alpha = best;
          if (beta <= alpha) break;
        }
        return best;
      }

      var worst = 1e9;
      for (var j = 0; j < moves.length; j++) {
        var n = moves[j];
        var t = makeMove(n.r, n.c, color);
        if (!t) continue;
        var val2 = search(depth - 1, opp(color), alpha, beta);
        undoMove(t);
        if (val2 < worst) worst = val2;
        if (worst < beta) beta = worst;
        if (beta <= alpha) break;
      }
      return worst;
    }

    function chooseAiMove() {
      var maxDepth = clamp(depthInput.value, 1, 9);
      var clumsyPct = clamp(clumsyInput.value, 0, 100);
      var moves = legalMoves(AI, true);
      var i, scored = [];
      var deadline = Date.now() + 350;
      if (!moves.length) return null;
      if (clumsyPct >= 100) return moves[(Math.random() * moves.length) | 0];
      if (moves.length > rootMoveLimit(maxDepth)) moves = moves.slice(0, rootMoveLimit(maxDepth));
      searchDeadline = deadline;
      for (i = 0; i < moves.length; i++) {
        var m = moves[i];
        var tok = makeMove(m.r, m.c, AI);
        if (!tok) continue;
        var val = search(maxDepth - 1, HUMAN, -1e9, 1e9);
        undoMove(tok);
        scored.push({ move: m, score: val });
        if (Date.now() >= deadline) break;
      }
      searchDeadline = 0;
      if (!scored.length) return null;
      scored.sort(function(a, b) { return b.score - a.score; });
      return pickClumsyMoveFromScores(scored, clumsyPct);
    }

    function refreshStatus() {
      var score = evaluateBoard();
      var lead = score > 0 ? 'White leads by ' + score.toFixed(1) :
        score < 0 ? 'Black leads by ' + Math.abs(score).toFixed(1) : 'Level';
      if (over) {
        statusEl.textContent = 'Info: Game over: ' + resultText(score) + ' ' + score.toFixed(1) + '.';
      } else if (aiBusy && turn === AI && aiThinkStart) {
        statusEl.textContent = 'Info: Thinking Depth ' + aiDepthNow + ' for ' + ((Date.now() - aiThinkStart) / 1000).toFixed(1) + ' s.';
      } else {
        statusEl.textContent = 'Info: ' + lead + ' for depth ' + (aiDepthDone > 0 ? aiDepthDone : clamp(depthInput.value, 1, 9)) + ' after ' + aiLastSec.toFixed(1) + ' s.';
      }
    }

    function updatePreview() {
      if (!previewBtn) return;
      previewBtn.className = previewEnabled ? 'is-on' : '';
      previewBtn.textContent = 'Preview';
    }

    function undoEntry(entry) {
      if (!entry) return;
      undoMove(entry.token);
      turn = entry.color;
    }

    function takeBack() {
      if (aiTimer) {
        clearTimeout(aiTimer);
        aiTimer = null;
      }
      previewMove = null;
      aiBusy = false;
      aiThinkStart = 0;
      aiDepthNow = 0;
      aiTargetDepth = 0;
      aiBestMove = null;
      aiDepthStart = 0;
      if (!history.length) return;
      undoEntry(history.pop());
      while (history.length && turn !== HUMAN) {
        undoEntry(history.pop());
      }
      over = false;
      draw();
      refreshStatus();
    }

    function recordAndAdvance(entryColor, token, move) {
      history.push({ color: entryColor, token: token, move: move });
      turn = opp(entryColor);
      previewMove = null;
      if (passStreak >= 2 || boardFull() || (!hasAnyLegalMove(HUMAN) && !hasAnyLegalMove(AI))) over = true;
      draw();
      refreshStatus();
    }

    function doPass(color) {
      var token = makePass(color);
      history.push({ color: color, token: token, pass: true });
      turn = opp(color);
      previewMove = null;
      if (passStreak >= 2) over = true;
      draw();
      refreshStatus();
    }

    function humanPass() {
      if (over || turn !== HUMAN) return;
      doPass(HUMAN);
      if (!over && turn === AI) scheduleAi();
    }

    function scheduleAi() {
      if (aiTimer) clearTimeout(aiTimer);
      aiTimer = setTimeout(startEngineTurn, previewEnabled ? 60 : 20);
    }

    function startEngineTurn() {
      var maxDepth = clamp(depthInput.value, 1, 9);
      aiTimer = null;
      if (over || turn !== AI || aiBusy) return;
      aiBusy = true;
      aiThinkStart = Date.now();
      aiDepthStart = aiThinkStart;
      aiDepthNow = 1;
      aiTargetDepth = maxDepth;
      aiBestMove = null;
      refreshStatus();
      aiTimer = setTimeout(pumpEngineTurn, 0);
    }

    function finishEngineTurn() {
      var mv, tok;
      aiBusy = false;
      aiLastSec = (Date.now() - aiThinkStart) / 1000;
      aiDepthDone = aiDepthNow > 0 ? Math.min(aiDepthNow, aiTargetDepth) : aiDepthDone;
      aiThinkStart = 0;
      aiDepthNow = 0;
      aiDepthStart = 0;
      aiTargetDepth = 0;
      mv = aiBestMove;
      if (!mv) {
        doPass(AI);
        refreshStatus();
        return;
      }
      if (previewEnabled) {
        previewMove = { r: mv.r, c: mv.c, color: AI };
        draw();
      }
      setTimeout(function() {
        if (over || turn !== AI) return;
        tok = makeMove(mv.r, mv.c, AI);
        if (!tok) {
          doPass(AI);
          refreshStatus();
          return;
        }
        recordAndAdvance(AI, tok, mv);
        if (!over && turn === HUMAN && !hasAnyLegalMove(HUMAN)) {
          humanPass();
        }
      }, previewEnabled ? 240 : 0);
    }

    function pumpEngineTurn() {
      var savedDepth, mv, depthElapsed, now;
      aiTimer = null;
      if (over || turn !== AI || !aiBusy) return;
      refreshStatus();
      now = Date.now();
      if (now - aiThinkStart >= 30000) {
        finishEngineTurn();
        return;
      }
      savedDepth = depthInput.value;
      depthInput.value = '' + aiDepthNow;
      mv = chooseAiMove();
      depthInput.value = savedDepth;
      if (mv) {
        aiBestMove = mv;
        if (previewEnabled) {
          previewMove = { r: mv.r, c: mv.c, color: AI };
          draw();
        }
      }
      depthElapsed = Date.now() - aiDepthStart;
      if (aiDepthNow >= aiTargetDepth || depthElapsed >= 10000 || (Date.now() + Math.max(400, depthElapsed * 2)) >= (aiThinkStart + 30000)) {
        finishEngineTurn();
        return;
      }
      aiDepthNow += 1;
      aiDepthStart = Date.now();
      aiTimer = setTimeout(pumpEngineTurn, 0);
    }

    function placeHuman(r, c) {
      var tok;
      if (over || turn !== HUMAN || aiBusy) return;
      tok = makeMove(r, c, HUMAN);
      if (!tok) return;
      recordAndAdvance(HUMAN, tok, { r: r, c: c });
      if (!over) {
        if (!hasAnyLegalMove(AI)) {
          doPass(AI);
          if (!over && !hasAnyLegalMove(HUMAN)) humanPass();
        } else {
          scheduleAi();
        }
      }
    }

    function resize() {
      var safety = 60;
      var controlsH = controls ? controls.offsetHeight + 16 : 0;
      var maxW = (typeof window.innerWidth === 'number' && isFinite(window.innerWidth)) ? (window.innerWidth - 16) : 512;
      var maxH = (typeof window.innerHeight === 'number' && isFinite(window.innerHeight)) ? (window.innerHeight - controlsH - safety) : 512;
      var boardSize = Math.max(128, Math.floor(Math.min(maxW, maxH)));

      if (controls) {
        var testWidth = Math.floor(boardSize * 0.9);
        controls.style.width = testWidth + 'px';
        controls.style.fontSize = Math.max(10, Math.round(boardSize * 0.033)) + 'px';
        controls.style.boxSizing = 'border-box';
        controls.style.textAlign = 'center';
        controlsH = controls.offsetHeight + 16;
        maxH = (typeof window.innerHeight === 'number' && isFinite(window.innerHeight)) ? (window.innerHeight - controlsH - safety) : 512;
        boardSize = Math.max(128, Math.floor(Math.min(maxW, maxH)));
      }

      var extraW = Math.max(0, maxW - boardSize);
      var leftMargin = 8 + Math.floor(extraW / 2);
      var rightMargin = 8 + Math.ceil(extraW / 2);

      canvas.width = boardSize;
      canvas.height = boardSize;
      canvas.style.marginLeft = leftMargin + 'px';
      canvas.style.marginRight = rightMargin + 'px';
      canvas.style.marginTop = '8px';
      canvas.style.marginBottom = '8px';
      if (controls) {
        var controlsWidth = Math.floor(boardSize * 0.9);
        var sideGap = boardSize - controlsWidth;
        controls.style.width = controlsWidth + 'px';
        controls.style.fontSize = Math.max(10, Math.round(boardSize * 0.033)) + 'px';
        controls.style.marginLeft = (leftMargin + Math.floor(sideGap / 2)) + 'px';
        controls.style.marginRight = (rightMargin + Math.ceil(sideGap / 2)) + 'px';
        controls.style.marginTop = '0px';
        controls.style.marginBottom = '8px';
      }
      pad = Math.max(20, Math.floor(boardSize * 0.035));
      cell = (boardSize - pad * 2) / (N - 1);
      stoneR = Math.max(10, cell * 0.38);
      draw();
    }

    function starPoint(r, c) {
      var pts = [[3,3],[3,9],[6,6],[9,3],[9,9]];
      var i;
      for (i = 0; i < pts.length; i++) {
        if (pts[i][0] === r && pts[i][1] === c) return true;
      }
      return false;
    }

    function drawStone(r, c, color, alpha) {
      var x = pad + c * cell;
      var y = pad + r * cell;
      var radius = stoneR;
      if (typeof alpha === 'number') ctx.globalAlpha = alpha;
      ctx.fillStyle = (color === 'b') ? '#000000' : '#ffffff';
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2, false);
      ctx.fill();
      ctx.lineWidth = Math.max(2, radius * 0.14);
      ctx.strokeStyle = (color === 'b') ? '#ffffff' : '#000000';
      ctx.stroke();
      if (typeof alpha === 'number') ctx.globalAlpha = 1;
    }

    function draw() {
      var r, c;
      if (!ctx) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (r = 0; r < N; r++) {
        for (c = 0; c < N; c++) {
          ctx.fillStyle = ((r + c) % 2 === 0) ? LIGHT_SQUARE : DARK_SQUARE;
          ctx.fillRect(pad + (c - 0.5) * cell, pad + (r - 0.5) * cell, cell, cell);
        }
      }
      ctx.strokeStyle = GO_ACCENT;
      ctx.lineWidth = Math.max(1, cell * 0.04);
      ctx.beginPath();
      for (r = 0; r < N; r++) {
        ctx.moveTo(pad, pad + r * cell);
        ctx.lineTo(pad + (N - 1) * cell, pad + r * cell);
      }
      for (c = 0; c < N; c++) {
        ctx.moveTo(pad + c * cell, pad);
        ctx.lineTo(pad + c * cell, pad + (N - 1) * cell);
      }
      ctx.stroke();
      ctx.fillStyle = GO_ACCENT;
      for (r = 0; r < N; r++) {
        for (c = 0; c < N; c++) {
          if (!starPoint(r, c)) continue;
          ctx.beginPath();
          ctx.arc(pad + c * cell, pad + r * cell, Math.max(1.2, cell * 0.08), 0, Math.PI * 2, false);
          ctx.fill();
        }
      }
      for (r = 0; r < N; r++) {
        for (c = 0; c < N; c++) {
          if (board[r][c] !== null) drawStone(r, c, board[r][c], 1);
        }
      }
      if (previewMove && previewEnabled) drawStone(previewMove.r, previewMove.c, previewMove.color, 0.32);
      if (history.length) {
        var last = history[history.length - 1];
        if (last && last.move) {
          ctx.strokeStyle = 'rgba(255,215,120,.9)';
          ctx.lineWidth = Math.max(2, cell * 0.09);
          ctx.beginPath();
          ctx.arc(pad + last.move.c * cell, pad + last.move.r * cell, stoneR * 0.55, 0, Math.PI * 2, false);
          ctx.stroke();
        }
      }
    }

    function resultText(score) {
      if (score > 0) return 'White wins';
      if (score < 0) return 'Black wins';
      return 'Draw';
    }

    function finaliseIfNeeded() {
      if (!isTerminal()) return;
      over = true;
      refreshStatus();
    }

    function clickBoard(ev) {
      var rect, x, y, sx, sy, c, r;
      if (over || turn !== HUMAN || aiBusy) return;
      rect = canvas.getBoundingClientRect();
      sx = canvas.width / rect.width;
      sy = canvas.height / rect.height;
      x = (ev.clientX - rect.left) * sx;
      y = (ev.clientY - rect.top) * sy;
      c = Math.round((x - pad) / cell);
      r = Math.round((y - pad) / cell);
      if (!inBounds(r, c)) return;
      placeHuman(r, c);
      finaliseIfNeeded();
    }

    function bind() {
      document.getElementById('resetBtn').addEventListener('click', resetGame);
      document.getElementById('takebackBtn').addEventListener('click', takeBack);
      document.getElementById('passBtn').addEventListener('click', humanPass);
      canvas.addEventListener('click', clickBoard);
      if (window.addEventListener) window.addEventListener('resize', resize);
      depthInput.addEventListener('change', function(){ save('go_depth', depthInput.value); });
      clumsyInput.addEventListener('change', function(){ save('go_clumsy', clumsyInput.value); });
      if (previewBtn) {
        previewBtn.addEventListener('click', function(){
          previewEnabled = !previewEnabled;
          save('go_preview', previewEnabled ? '1' : '0');
          updatePreview();
          draw();
        });
      }
    }

    function initSaved() {
      var d = load('go_depth');
      var c = load('go_clumsy');
      var p = load('go_preview');
      if (d !== null) depthInput.value = d;
      if (c !== null) clumsyInput.value = c;
      previewEnabled = (p === '1');
      updatePreview();
    }

    function resetGame() {
      if (aiTimer) clearTimeout(aiTimer);
      aiTimer = null;
      aiBusy = false;
      aiThinkStart = 0;
      aiDepthNow = 0;
      aiDepthDone = 0;
      aiLastSec = 0;
      aiTargetDepth = 0;
      aiBestMove = null;
      aiDepthStart = 0;
      board = createInitialBoard();
      turn = HUMAN;
      over = false;
      history = [];
      captures = { b: 0, w: 0 };
      koSig = null;
      passStreak = 0;
      previewMove = null;
      resize();
      draw();
      refreshStatus();
    }

    window.__test = {
      getState: function() {
        var r, c, w = 0, b = 0, e = 0;
        for (r = 0; r < N; r++) for (c = 0; c < N; c++) {
          if (board[r][c] === 'b') b++;
          else if (board[r][c] === 'w') w++;
          else e++;
        }
        return { over: over, turn: turn, w: w, b: b, empty: e, captures: { b: captures.b, w: captures.w }, passStreak: passStreak };
      },
      legalMoves: function() { return legalMoves(turn, false); },
      play: function(move) { return placeHuman(move.r, move.c); },
      forceOutcome: function(side) {
        over = true;
        if (side === 'white') statusEl.textContent = 'Info: Game over: White wins.';
        else if (side === 'black') statusEl.textContent = 'Info: Game over: Black wins.';
        else statusEl.textContent = 'Info: Game over: Draw.';
      }
    };

    initSaved();
    bind();
    resetGame();
  }());
  </script>
</body>
</html>
