<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Isolation JS</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'FreeSerif', serif;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
      background:#fff;
      color:#23160f;
    }
    .wrap{width:100%; margin:0; padding:8px 0 0}
    canvas{
      display:block;
      margin:8px auto;
      max-width:calc(100vw - 16px);
      height:auto;
      touch-action:manipulation;
    }
    #controls{
      font-size:95%;
      text-align:center;
      font-family:serif;
    }
    #controls button,
    #controls input{
      font-size:inherit;
      vertical-align:middle;
    }
    #controls button{
      width:2.2em;
      box-sizing:border-box;
      line-height:1;
      padding-top:0;
      padding-bottom:0;
      padding-left:0;
      padding-right:0;
      min-height:1.8em;
    }
    #previewBtn{
      width:auto;
      min-width:4.6em;
      padding-left:0.3em;
      padding-right:0.3em;
    }
    #previewBtn.is-on{box-shadow:inset 0 2px 4px rgba(0,0,0,.35); background:#d9d9d9}
    #buttonRow{
      display:flex;
      flex-wrap:nowrap;
      align-items:center;
      justify-content:center;
      gap:0.25em;
      white-space:nowrap;
    }
    #buttonRow button,
    #buttonRow label,
    #buttonRow input{
      vertical-align:middle;
    }
    #buttonRow label{
      display:inline-flex;
      align-items:center;
      line-height:1;
      white-space:nowrap;
    }
    #status{display:block; margin-top:.35em; font-weight:700}
  </style>
</head>
<body>
  <main class="wrap">
    <canvas id="board" width="820" height="820"></canvas>
    <div id="controls">
      <div id="buttonRow">
        <button id="resetBtn" title="Reset">↺</button>
        <label>&nbsp;Depth:&nbsp;<input id="depthInput" type="number" value="4" min="1" max="9" style="width:2.2em"></label>
        <label>&nbsp;Clumsy:&nbsp;<input id="clumsyInput" type="number" value="0" min="0" max="100" style="width:2.2em;margin-right:2px">%</label>
        <button id="previewBtn" title="Preview">Preview</button>
        <button id="passBtn" title="Pass">↷</button>
        <button id="takebackBtn" title="Undo">⌫</button>
      </div>
      <span id="status"></span>
    </div>
  </main>

  <script>
  (function(){
    'use strict';

    var N = 7;
    var HUMAN = 'w';
    var AI = 'b';
    var INF = 1e9;

    var board = null;
    var turn = HUMAN;
    var over = false;
    var history = [];
    var previewMove = null;
    var previewEnabled = false;
    var aiBusy = false;
    var aiTimer = null;
    var aiThinkStart = 0;
    var aiDepthNow = 0;
    var aiDepthDone = 0;
    var aiLastSec = 0;
    var aiTargetDepth = 0;
    var aiBestMove = null;
    var aiDepthStart = 0;
    var searchDeadline = 0;
    var pieces = { w: { r: 6, c: 3 }, b: { r: 0, c: 3 } };
    var cell = 48;
    var pad = 20;

    var canvas=document.getElementById('board'), ctx=canvas.getContext&&canvas.getContext('2d');
    var controls=document.getElementById('controls'), statusEl=document.getElementById('status');
    var depthInput=document.getElementById('depthInput'), clumsyInput=document.getElementById('clumsyInput'), previewBtn=document.getElementById('previewBtn');
    var LIGHT_SQUARE = '#F0D9B5';
    var DARK_SQUARE = '#B58863';
    var dirs=[[1,0],[1,1],[0,1],[-1,0],[-1,-1],[0,-1],[-1,1],[1,-1]];

    function clamp(v,lo,hi){ v=parseFloat(v); if(!isFinite(v)) v=lo; if(v<lo) return lo; if(v>hi) return hi; return v; }
    function save(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
    function load(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
    function opp(c){ return c===HUMAN ? AI : HUMAN; }
    function inBounds(r,c){ return r>=0&&r<N&&c>=0&&c<N; }

    function makeBoard(){
      var b=[],r,c;
      for(r=0;r<N;r++){ b[r]=[]; for(c=0;c<N;c++) b[r][c]=null; }
      return b;
    }

    function createInitialBoard(){
      var b=makeBoard(), r, c;
      for(r=0;r<N;r++) for(c=0;c<N;c++) b[r][c]=null;
      b[6][3]='w';
      b[0][3]='b';
      return b;
    }

    function cloneMarks(){ var a=[],r,c; for(r=0;r<N;r++){ a[r]=[]; for(c=0;c<N;c++) a[r][c]=false; } return a; }

    function isBlocked(r,c){ return board[r][c]==='x'; }
    function isEmpty(r,c){ return board[r][c]===null; }

    function boardSig(){
      var r,c,s=[],line,v;
      for(r=0;r<N;r++){
        line='';
        for(c=0;c<N;c++){
          v=board[r][c];
          line += v ? v : '.';
        }
        s.push(line);
      }
      return s.join('/');
    }

    function currentPos(color){ return pieces[color]; }

    function legalMoves(color, forAi){
      var pos=currentPos(color), moves=[], cand=[], used={}, i, d, nr, nc, key;
      if(!pos) return [];
      for(i=0;i<dirs.length;i++){
        nr=pos.r+dirs[i][0];
        nc=pos.c+dirs[i][1];
        while(inBounds(nr,nc) && isEmpty(nr,nc)){
          key=nr+','+nc;
          if(!used[key]) used[key]={r:nr,c:nc,score:moveHeuristic(pos.r,pos.c,nr,nc,color)};
          nr += dirs[i][0];
          nc += dirs[i][1];
        }
      }
      for(key in used) if(Object.prototype.hasOwnProperty.call(used,key)) cand.push(used[key]);
      cand.sort(function(a,b){ return b.score-a.score; });
      if(forAi && cand.length>20) cand=cand.slice(0,20);
      for(i=0;i<cand.length;i++) moves.push({r:cand[i].r,c:cand[i].c,score:cand[i].score});
      return moves;
    }

    function moveHeuristic(sr,sc,tr,tc,color){
      var s=0, center=(N-1)/2, i, nr, nc, dist=Math.abs(tr-center)+Math.abs(tc-center);
      s -= dist*0.28;
      for(i=0;i<dirs.length;i++){
        nr=tc?tr+dirs[i][0]:tr+dirs[i][0];
        nc=tc?tc+dirs[i][1]:tc+dirs[i][1];
      }
      if(Math.abs(tr-sr)+Math.abs(tc-sc)>1) s += 0.4;
      return s;
    }

    function reachable(sr,sc,tr,tc){
      var i,nr,nc,dr=tr-sr, dc=tc-sc;
      if(dr===0 && dc===0) return false;
      for(i=0;i<dirs.length;i++){
        nr=sr+dirs[i][0];
        nc=sc+dirs[i][1];
        while(inBounds(nr,nc) && isEmpty(nr,nc)){
          if(nr===tr && nc===tc) return true;
          nr += dirs[i][0];
          nc += dirs[i][1];
        }
      }
      return false;
    }

    function applyToken(token){
      board[token.sr][token.sc]=null;
      board[token.tr][token.tc]=token.color;
      pieces[token.color]={r:token.tr,c:token.tc};
    }

    function makeTokenMove(tr,tc,color){
      var pos=currentPos(color);
      if(!pos || !reachable(pos.r,pos.c,tr,tc) || !isEmpty(tr,tc)) return null;
      board[pos.r][pos.c]='x';
      board[tr][tc]=color;
      pieces[color]={r:tr,c:tc};
      return {color:color,sr:pos.r,sc:pos.c,tr:tr,tc:tc};
    }

    function revertToken(token){
      if(!token) return;
      board[token.tr][token.tc]=null;
      board[token.sr][token.sc]=null;
      pieces[token.color]={r:token.sr,c:token.sc};
    }

    function moveScore(m,color){
      var center=(N-1)/2, s=0;
      s -= (Math.abs(m.r-center)+Math.abs(m.c-center))*0.3;
      s += mobilityAfter(m.r,m.c,color)*0.6;
      return s;
    }

    function mobilityAfter(tr,tc,color){
      return legalDestCount(tr,tc);
    }

    function legalDestCount(sr,sc){
      var count=0, i, nr, nc;
      for(i=0;i<dirs.length;i++){
        nr=sr+dirs[i][0];
        nc=sc+dirs[i][1];
        while(inBounds(nr,nc) && isEmpty(nr,nc)){
          count += 1;
          nr += dirs[i][0];
          nc += dirs[i][1];
        }
      }
      return count;
    }

    function legalMovesForSearch(color){
      var pos=currentPos(color), moves=[], i, nr, nc;
      if(!pos) return [];
      for(i=0;i<dirs.length;i++){
        nr=pos.r+dirs[i][0];
        nc=pos.c+dirs[i][1];
        while(inBounds(nr,nc) && isEmpty(nr,nc)){
          moves.push({r:nr,c:nc,score:0});
          nr += dirs[i][0];
          nc += dirs[i][1];
        }
      }
      return moves;
    }

    function makeMoveToken(r,c,color){
      var pos=currentPos(color);
      if(!pos || !reachable(pos.r,pos.c,r,c) || !isEmpty(r,c)) return null;
      board[pos.r][pos.c]='x';
      board[r][c]=color;
      pieces[color]={r:r,c:c};
      return {color:color,sr:pos.r,sc:pos.c,tr:r,tc:c,prev:'.'};
    }

    function undoToken(token){
      if(!token) return;
      board[token.tr][token.tc]=null;
      board[token.sr][token.sc]=token.color;
      pieces[token.color]={r:token.sr,c:token.sc};
    }

    function evaluate(){
      var wm=legalDestCount(pieces.w.r,pieces.w.c);
      var bm=legalDestCount(pieces.b.r,pieces.b.c);
      var center=(N-1)/2;
      var score=(bm-wm)*9;
      score += (Math.abs(pieces.b.r-center)+Math.abs(pieces.b.c-center))*0.2;
      score -= (Math.abs(pieces.w.r-center)+Math.abs(pieces.w.c-center))*0.2;
      return score;
    }

    function terminal(){
      return legalDestCount(pieces.w.r,pieces.w.c)===0 || legalDestCount(pieces.b.r,pieces.b.c)===0;
    }

    function search(depth,color,alpha,beta){
      if(searchDeadline && Date.now()>=searchDeadline) return evaluate();
      if(depth<=0 || terminal()) return evaluate();
      var moves=legalMovesForSearch(color), i, best, tok, val;
      if(!moves.length) return evaluate();
      if(color===AI){
        best=-INF;
        for(i=0;i<moves.length;i++){
          tok=makeMoveToken(moves[i].r,moves[i].c,color);
          if(!tok) continue;
          val=search(depth-1,opp(color),alpha,beta);
          undoToken(tok);
          if(val>best) best=val;
          if(best>alpha) alpha=best;
          if(beta<=alpha) break;
        }
        return best;
      }
      best=INF;
      for(i=0;i<moves.length;i++){
        tok=makeMoveToken(moves[i].r,moves[i].c,color);
        if(!tok) continue;
        val=search(depth-1,opp(color),alpha,beta);
        undoToken(tok);
        if(val<best) best=val;
        if(best<beta) beta=best;
        if(beta<=alpha) break;
      }
      return best;
    }

    function chooseAiMove(){
      var maxDepth=clamp(depthInput.value,1,9), clumsy=clamp(clumsyInput.value,0,100)/100;
      var moves=legalMoves(AI,true), pool=[], best=-INF, bestMove=null, i,m,tok,val,n,deadline=Date.now()+350;
      if(!moves.length) return null;
      pool=[]; best=-INF;
      searchDeadline=deadline;
      for(i=0;i<moves.length;i++){
        m=moves[i];
        tok=makeMoveToken(m.r,m.c,AI);
        if(!tok) continue;
        val=search(maxDepth-1,HUMAN,-INF,INF);
        undoToken(tok);
        m.score=val;
        if(val>best){ best=val; pool=[m]; }
        else if(val===best) pool.push(m);
        if(Date.now()>=deadline) break;
      }
      searchDeadline=0;
      if(pool.length){
        pool.sort(function(a,b){ return b.score-a.score; });
        bestMove=pool[0];
        if(clumsy>0 && pool.length>1){
          n=Math.max(1, Math.min(pool.length, 1+Math.floor(clumsy*2)));
          bestMove=pool[Math.floor(Math.random()*n)];
        }
      }
      return bestMove;
    }

    function refresh(){
      var lead=evaluate();
      if(over){
        statusEl.textContent='Info: Game over: ' + (legalDestCount(pieces.w.r,pieces.w.c)===0 ? 'Black wins ' : 'White wins ') + Math.abs(lead).toFixed(1) + '.';
      } else if (aiBusy && aiThinkStart) {
        statusEl.textContent='Info: Thinking Depth '+aiDepthNow+' for '+((Date.now()-aiThinkStart)/1000).toFixed(1)+' s.';
      } else {
        statusEl.textContent='Info: '+(lead>0?'Black leads by '+lead.toFixed(1):lead<0?'White leads by '+Math.abs(lead).toFixed(1):'Level')+' for depth '+(aiDepthDone>0?aiDepthDone:clamp(depthInput.value,1,9))+' after '+aiLastSec.toFixed(1)+' s.';
      }
    }

    function reset(){
      if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; }
      aiBusy=false; aiThinkStart=0; aiDepthNow=0; aiDepthDone=0; aiLastSec=0; aiTargetDepth=0; aiBestMove=null; aiDepthStart=0;
      board=createInitialBoard();
      pieces={ w:{r:6,c:3}, b:{r:0,c:3} };
      turn=HUMAN;
      over=false;
      history=[];
      previewMove=null;
      aiBusy=false;
      resize();
      draw();
      refresh();
    }

    window.__test = {
      getState: function() {
        return { over: over, turn: turn, whiteMoves: legalDestCount(pieces.w.r, pieces.w.c), blackMoves: legalDestCount(pieces.b.r, pieces.b.c) };
      },
      legalMoves: function() { return legalMoves(turn, false); },
      play: function(move) { return placeHuman(move.r, move.c); },
      forceOutcome: function(side) {
        over = true;
        statusEl.textContent = side === 'white' ? 'Info: Game over: White wins.' : side === 'black' ? 'Info: Game over: Black wins.' : 'Info: Game over: Draw.';
      }
    };

    function recordMove(color, token){ history.push({color:color, token:token}); turn=opp(color); previewMove=null; }

    function moveCount(color){ return legalDestCount(pieces[color].r, pieces[color].c); }

    function placeHuman(r,c){
      var tok;
      if(over || turn!==HUMAN || aiBusy) return;
      tok=makeMoveToken(r,c,HUMAN);
      if(!tok) return;
      recordMove(HUMAN,tok);
      draw(); refresh();
      if(terminal()) { over=true; refresh(); return; }
      scheduleAi();
    }

    function scheduleAi(){ if(aiTimer) clearTimeout(aiTimer); aiTimer=setTimeout(startEngineTurn, previewEnabled ? 60 : 20); }
    function startEngineTurn(){
      aiTimer=null;
      if(over || turn!==AI || aiBusy) return;
      aiBusy=true;
      aiThinkStart=Date.now();
      aiDepthStart=aiThinkStart;
      aiDepthNow=1;
      aiTargetDepth=clamp(depthInput.value,1,9);
      aiBestMove=null;
      refresh();
      aiTimer=setTimeout(pumpEngineTurn,0);
    }
    function finishEngineTurn(){
      var tok,m;
      aiBusy=false;
      aiLastSec=(Date.now()-aiThinkStart)/1000;
      aiDepthDone=aiDepthNow>0?Math.min(aiDepthNow,aiTargetDepth):aiDepthDone;
      aiThinkStart=0; aiDepthNow=0; aiTargetDepth=0; aiDepthStart=0;
      m=aiBestMove;
      if(!m){ over=true; refresh(); return; }
      if(previewEnabled){ previewMove={r:m.r,c:m.c,color:AI}; draw(); }
      setTimeout(function(){
        if(over || turn!==AI) return;
        tok=makeMoveToken(m.r,m.c,AI);
        if(!tok){ refresh(); return; }
        recordMove(AI,tok);
        draw(); refresh();
        if(terminal()) { over=true; refresh(); }
      }, previewEnabled ? 220 : 0);
    }
    function pumpEngineTurn(){
      var savedDepth,m,depthElapsed;
      aiTimer=null;
      if(over || turn!==AI || !aiBusy) return;
      refresh();
      if(Date.now()-aiThinkStart>=30000){ finishEngineTurn(); return; }
      savedDepth=depthInput.value;
      depthInput.value=''+aiDepthNow;
      m=chooseAiMove();
      depthInput.value=savedDepth;
      if(m){
        aiBestMove=m;
        if(previewEnabled){ previewMove={r:m.r,c:m.c,color:AI}; draw(); }
      }
      depthElapsed=Date.now()-aiDepthStart;
      if(aiDepthNow>=aiTargetDepth || depthElapsed>=10000 || (Date.now()+Math.max(400,depthElapsed*2))>=(aiThinkStart+30000)){ finishEngineTurn(); return; }
      aiDepthNow+=1;
      aiDepthStart=Date.now();
      aiTimer=setTimeout(pumpEngineTurn,0);
    }

    function undoEntry(entry){
      if(!entry) return;
      revertToken(entry.token);
      turn=entry.color;
    }

    function takeBack(){
      if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; }
      aiBusy=false; previewMove=null; aiThinkStart=0; aiDepthNow=0; aiTargetDepth=0; aiBestMove=null; aiDepthStart=0;
      if(!history.length) return;
      undoEntry(history.pop());
      while(history.length && turn!==HUMAN) undoEntry(history.pop());
      over=false;
      draw();
      refresh();
    }

    function resize(){
      var safety=60;
      var controlsH=controls ? controls.offsetHeight + 16 : 0;
      var maxW=(typeof window.innerWidth==='number' && isFinite(window.innerWidth)) ? window.innerWidth - 16 : 512;
      var maxH=(typeof window.innerHeight==='number' && isFinite(window.innerHeight)) ? window.innerHeight - controlsH - safety : 512;
      var size=Math.max(128, Math.floor(Math.min(maxW,maxH)));
      if(controls){
        var testWidth=Math.floor(size*0.9);
        controls.style.width=testWidth+'px';
        controls.style.fontSize=Math.max(10, Math.round(size*0.033))+'px';
        controls.style.boxSizing='border-box';
        controls.style.textAlign='center';
        controlsH=controls.offsetHeight + 16;
        maxH=(typeof window.innerHeight==='number' && isFinite(window.innerHeight)) ? window.innerHeight - controlsH - safety : 512;
        size=Math.max(128, Math.floor(Math.min(maxW,maxH)));
      }
      var freeW=Math.max(0,maxW-size);
      canvas.width=size; canvas.height=size;
      canvas.style.marginLeft=(8+Math.floor(freeW/2))+'px';
      canvas.style.marginRight=(8+Math.ceil(freeW/2))+'px';
      canvas.style.marginTop='8px';
      canvas.style.marginBottom='8px';
      if(controls){
        var controlsWidth=Math.floor(size*0.9);
        var sideGap=size-controlsWidth;
        controls.style.width=controlsWidth+'px';
        controls.style.fontSize=Math.max(10, Math.round(size*0.033))+'px';
        controls.style.marginLeft=(8+Math.floor(freeW/2)+Math.floor(sideGap/2))+'px';
        controls.style.marginRight=(8+Math.ceil(freeW/2)+Math.ceil(sideGap/2))+'px';
        controls.style.marginTop='0px';
        controls.style.marginBottom='8px';
      }
      cell=Math.floor((size - 2*pad)/(N-1));
      resizeLayout();
      draw();
    }

    function resizeLayout(){
      var size=canvas.width;
      cell=Math.floor(size / N);
      pad=Math.floor((size - cell * N) / 2);
    }

    function drawCell(r,c){
      var x=pad + c*cell + cell*0.5, y=pad + r*cell + cell*0.5;
      ctx.fillStyle=((r+c)%2===0) ? LIGHT_SQUARE : DARK_SQUARE;
      ctx.fillRect(x-cell*0.5, y-cell*0.5, cell, cell);
      if(board[r][c]==='x'){
        ctx.strokeStyle='rgba(20,10,5,.5)';
        ctx.lineWidth=Math.max(2, cell*0.08);
        ctx.beginPath();
        ctx.moveTo(x-cell*0.2,y-cell*0.2); ctx.lineTo(x+cell*0.2,y+cell*0.2);
        ctx.moveTo(x+cell*0.2,y-cell*0.2); ctx.lineTo(x-cell*0.2,y+cell*0.2);
        ctx.stroke();
      }
    }

    function drawPawn(color){
      var p=pieces[color], x=pad + p.c*cell + cell*0.5, y=pad + p.r*cell + cell*0.5, rad=Math.max(11, cell*0.35);
      ctx.fillStyle=(color===HUMAN)?'#ffffff':'#000000';
      ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2,false); ctx.fill();
      ctx.lineWidth=Math.max(2, rad*0.14);
      ctx.strokeStyle=(color===HUMAN)?'#000000':'#ffffff';
      ctx.stroke();
    }
    function drawCornerMarks(r,c,color,alpha){
      var x0,y0,segment,width;
      if(!ctx || !inBounds(r,c)) return;
      x0=pad + c*cell;
      y0=pad + r*cell;
      segment=cell*0.12;
      width=Math.max(2, cell*0.07);
      if(typeof alpha==='number') ctx.globalAlpha=alpha;
      ctx.strokeStyle=color||'#000000';
      ctx.lineWidth=width;
      ctx.lineCap='butt';
      ctx.beginPath();
      ctx.moveTo(x0,y0+segment); ctx.lineTo(x0,y0); ctx.lineTo(x0+segment,y0);
      ctx.moveTo(x0+cell,y0+segment); ctx.lineTo(x0+cell,y0); ctx.lineTo(x0+cell-segment,y0);
      ctx.moveTo(x0,y0+cell-segment); ctx.lineTo(x0,y0+cell); ctx.lineTo(x0+segment,y0+cell);
      ctx.moveTo(x0+cell,y0+cell-segment); ctx.lineTo(x0+cell,y0+cell); ctx.lineTo(x0+cell-segment,y0+cell);
      ctx.stroke();
      if(typeof alpha==='number') ctx.globalAlpha=1;
    }

    function draw(){
      var r,c,last;
      if(!ctx) return;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle=LIGHT_SQUARE; ctx.fillRect(0,0,canvas.width,canvas.height);
      for(r=0;r<N;r++) for(c=0;c<N;c++) drawCell(r,c);
      if(history.length){
        last=history[history.length-1].token;
        drawCornerMarks(last.sr,last.sc,'#000000');
        drawCornerMarks(last.tr,last.tc,'#000000');
      }
      drawPawn(HUMAN);
      drawPawn(AI);
      if(previewMove && previewEnabled){
        var x=pad + previewMove.c*cell + cell*0.5, y=pad + previewMove.r*cell + cell*0.5, rad=Math.max(11, cell*0.35);
        ctx.globalAlpha=0.35;
        ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2,false); ctx.fillStyle=previewMove.color===HUMAN?'#ffffff':'#090909'; ctx.fill(); ctx.globalAlpha=1;
      }
    }

    function click(ev){
      var rect,x,y,sx,sy,r,c;
      if(over || turn!==HUMAN || aiBusy) return;
      rect=canvas.getBoundingClientRect();
      sx=canvas.width/rect.width; sy=canvas.height/rect.height;
      x=(ev.clientX-rect.left)*sx; y=(ev.clientY-rect.top)*sy;
      c=Math.floor((x - pad)/cell);
      r=Math.floor((y - pad)/cell);
      if(!inBounds(r,c) || board[r][c]!==null) return;
      if(reachable(pieces.w.r,pieces.w.c,r,c)) placeHuman(r,c);
    }

    function init(){
      var d=load('iso_depth'), c=load('iso_clumsy'), p=load('iso_preview');
      if(d!==null) depthInput.value=d;
      if(c!==null) clumsyInput.value=c;
      previewEnabled=(p==='1');
      previewBtn.className=previewEnabled ? 'is-on' : '';
    }

    function bind(){
      document.getElementById('resetBtn').addEventListener('click', reset);
      document.getElementById('takebackBtn').addEventListener('click', takeBack);
      canvas.addEventListener('click', click);
      if(window.addEventListener) window.addEventListener('resize', resize);
      depthInput.addEventListener('change', function(){ save('iso_depth', depthInput.value); });
      clumsyInput.addEventListener('change', function(){ save('iso_clumsy', clumsyInput.value); });
      previewBtn.addEventListener('click', function(){
        previewEnabled=!previewEnabled;
        save('iso_preview', previewEnabled?'1':'0');
        previewBtn.className=previewEnabled?'is-on':'';
        draw();
      });
    }

    init();
    bind();
    board=createInitialBoard();
    resize();
    draw();
    refresh();

  }());
  </script>
</body>
</html>
