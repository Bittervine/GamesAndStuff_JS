<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#07111d">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./pwa-icon.svg" type="image/svg+xml">
  <title>Thorium Gap</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    :root {
      --panel: rgba(6, 12, 24, 0.62);
      --text: #f8fbff;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 0%, rgba(124, 247, 255, 0.18), transparent 28%),
        radial-gradient(circle at 90% 10%, rgba(255, 143, 232, 0.16), transparent 32%),
        linear-gradient(180deg, #08111d 0%, #030712 100%);
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    * { box-sizing: border-box; }
    #player3d {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      z-index: 2;
      pointer-events: none;
    }
    #enginefx {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      z-index: 3;
      pointer-events: none;
    }
    #damagefx {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      z-index: 5;
      pointer-events: none;
    }
    #cloud3d {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      z-index: 4;
      pointer-events: none;
    }
    #game {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      background: transparent;
      touch-action: none;
      z-index: 1;
    }
    #hud {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      background: transparent;
      z-index: 6;
    }
    #hudHint {
      position: fixed;
      left: 50%;
      top: 12px;
      transform: translateX(-50%);
      z-index: 7;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(6, 12, 24, 0.54);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.34);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s ease;
      white-space: nowrap;
    }
    #hudHint.show { opacity: 1; }
    #controls {
      position: fixed;
      left: 50%;
      right: auto;
      bottom: 12px;
      transform: translateX(-50%);
      z-index: 7;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      padding: 6px 8px;
      width: max-content;
      max-width: calc(100vw - 16px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.34);
    }
    #controls button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      min-width: 46px;
      min-height: 28px;
      padding: 4px 8px;
      color: var(--text);
      font: inherit;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.03em;
      line-height: 1;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.08));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        inset 0 -2px 0 rgba(0, 0, 0, 0.2),
        0 6px 14px rgba(0, 0, 0, 0.16);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #controls button:active, #controls button.active {
      transform: translateY(1px) scale(0.99);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        inset 0 -2px 0 rgba(0, 0, 0, 0.18),
        0 4px 14px rgba(0, 0, 0, 0.16);
      filter: saturate(1.2);
    }
    #controls button[data-act="fire"] {
      background: linear-gradient(180deg, rgba(124, 247, 255, 0.34), rgba(124, 247, 255, 0.1));
    }
    #controls button[data-act="bomb"] {
      background: linear-gradient(180deg, rgba(255, 214, 111, 0.34), rgba(255, 214, 111, 0.1));
    }
    #controls button[data-act="settings"] {
      background: linear-gradient(180deg, rgba(198, 164, 255, 0.32), rgba(124, 247, 255, 0.1));
    }

    #settingsDialog {
      border: 0;
      padding: 0;
      width: min(92vw, 560px);
      max-width: 560px;
      background: transparent;
      color: var(--text);
      box-shadow: none;
    }
    #settingsDialog::backdrop {
      background: rgba(1, 4, 12, 0.66);
      backdrop-filter: blur(4px);
    }
    .settings-card {
      width: 100%;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background:
        radial-gradient(circle at 10% 0%, rgba(124, 247, 255, 0.14), transparent 28%),
        radial-gradient(circle at 92% 6%, rgba(255, 143, 232, 0.14), transparent 32%),
        linear-gradient(180deg, rgba(12, 18, 34, 0.96), rgba(9, 12, 24, 0.96));
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.48);
    }
    .settings-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .settings-head h2 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      line-height: 1;
    }
    .settings-head p {
      margin: 8px 0 0;
      color: rgba(248, 251, 255, 0.74);
      font-size: 0.95rem;
    }
    .settings-close {
      appearance: none;
      border: 0;
      border-radius: 14px;
      min-height: 44px;
      padding: 10px 14px;
      color: var(--text);
      font: inherit;
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.24),
        inset 0 -2px 0 rgba(0, 0, 0, 0.22),
        0 8px 18px rgba(0, 0, 0, 0.22);
      cursor: pointer;
    }
    .settings-group {
      display: grid;
      gap: 8px;
      margin: 14px 0;
    }
    .settings-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .settings-value {
      color: rgba(248, 251, 255, 0.76);
      font-size: 0.95em;
    }
    .settings-group input[type="range"] {
      width: 100%;
      accent-color: #7cf7ff;
    }
    .settings-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
    }
    .settings-toggle span {
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .settings-toggle input {
      width: 20px;
      height: 20px;
      accent-color: #7cf7ff;
    }
    .difficulty-buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .difficulty-buttons button {
      min-height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    .difficulty-buttons button[aria-pressed="true"] {
      background: linear-gradient(180deg, rgba(124, 247, 255, 0.26), rgba(255, 255, 255, 0.08));
      border-color: rgba(124, 247, 255, 0.55);
    }
    .settings-note {
      margin: 14px 0 0;
      color: rgba(248, 251, 255, 0.72);
      font-size: 0.92rem;
      line-height: 1.35;
    }
    @media (max-width: 620px) {
      #controls {
        bottom: 8px;
        gap: 5px;
        padding: 5px 6px;
        max-width: calc(100vw - 12px);
      }
      #controls button {
        min-width: 42px;
        min-height: 22px;
        padding: 3px 7px;
        border-radius: 10px;
        font-size: 0.68rem;
      }
    }
  </style>
</head>
  <body>
  <canvas id="game"></canvas>
  <canvas id="player3d"></canvas>
  <canvas id="enginefx"></canvas>
  <canvas id="cloud3d"></canvas>
  <canvas id="damagefx"></canvas>
  <canvas id="hud"></canvas>
  <div id="hudHint"></div>
  <div id="controls" aria-label="Game controls">
    <button data-act="fire" aria-label="Fire weapon">FIRE</button>
    <button data-act="bomb" aria-label="Use bomb">BOMB</button>
    <button data-act="pause" aria-label="Pause game">PAUSE</button>
    <button data-act="settings" aria-label="Open settings">SETTINGS</button>
    <button data-act="sound" aria-label="Toggle sound">SOUND</button>
  </div>
  <dialog id="settingsDialog" aria-labelledby="settingsTitle" aria-modal="true">
    <div class="settings-card">
      <div class="settings-head">
        <div>
          <h2 id="settingsTitle">Command</h2>
          <p>Tune audio and combat difficulty for the breach run.</p>
        </div>
        <button type="button" class="settings-close" id="settingsClose">CLOSE</button>
      </div>

      <div class="settings-group">
        <div class="settings-label">
          <span>Effects Volume</span>
          <span class="settings-value" id="sfxVolumeValue">100%</span>
        </div>
        <input id="sfxVolume" type="range" min="0" max="1" step="0.01" value="1">
      </div>

      <div class="settings-group">
        <div class="settings-label">
          <span>Score Volume</span>
          <span class="settings-value" id="musicVolumeValue">100%</span>
        </div>
        <input id="musicVolume" type="range" min="0" max="1" step="0.01" value="1">
      </div>

      <div class="settings-group">
        <div class="settings-label">
          <span>Combat Intensity</span>
          <span class="settings-value" id="difficultyValue">Normal</span>
        </div>
        <div class="difficulty-buttons" id="difficultyButtons">
          <button type="button" data-difficulty="0">Easy</button>
          <button type="button" data-difficulty="1">Normal</button>
          <button type="button" data-difficulty="2">Hard</button>
        </div>
      </div>

      <label class="settings-toggle" for="loadAdvancedShip">
        <span>Load advanced 3D ship model</span>
        <input id="loadAdvancedShip" type="checkbox" checked>
      </label>

      <p class="settings-note">Low difficulty softens the assault. High difficulty tightens enemy pressure, speed, and boss durability.</p>
    </div>
  </dialog>
  <script>
    window.__ShotEmUp3D = window.__ShotEmUp3D || { enabled: true, player: { x: 0, y: 0, rot: 0, bob: 0, tilt: 0, bank: 0, alpha: 0, damage: 0, visible: false } };
  </script>
  <script src="ShotEmUp_JS.js?v=20260415b"></script>
  <script src="./pwa-register.js"></script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const shipCanvas = document.getElementById('player3d');
    const engineCanvas = document.getElementById('enginefx');
    const cloudCanvas = document.getElementById('cloud3d');
    const damageCanvas = document.getElementById('damagefx');
    const shipRenderer = new THREE.WebGLRenderer({
      canvas: shipCanvas,
      alpha: true,
      antialias: true,
      powerPreference: 'low-power'
    });
    const engineCtx = engineCanvas.getContext('2d');
    const cloudCtx = cloudCanvas.getContext('2d');
    const damageCtx = damageCanvas.getContext('2d');
    shipRenderer.setPixelRatio(0.5);  // Low for performance, high for quality
    shipRenderer.setSize(window.innerWidth, window.innerHeight, false);
    shipRenderer.setClearColor(0x000000, 0);

    const shipScene = new THREE.Scene();
    const shipCamera = new THREE.OrthographicCamera(
      -window.innerWidth * 0.5,
      window.innerWidth * 0.5,
      window.innerHeight * 0.5,
      -window.innerHeight * 0.5,
      0.1,
      2000
    );
    shipCamera.position.z = 1200;

    const shipAmbient = new THREE.AmbientLight(0xd8e6ff, 1.8);
    shipScene.add(shipAmbient);
    const shipKey = new THREE.DirectionalLight(0xffffff, 2.4);
    shipKey.position.set(1, 2, 3);
    shipScene.add(shipKey);
    const shipRim = new THREE.DirectionalLight(0x7cf7ff, 1.0);
    shipRim.position.set(-2, 1, -2);
    shipScene.add(shipRim);

    const gameBridge = window.__ShotEmUp3D = window.__ShotEmUp3D || {};
    gameBridge.enabled = true;
    gameBridge.player = gameBridge.player || { x: 0, y: 0, rot: 0, bob: 0, tilt: 0, bank: 0, alpha: 1, visible: false, damage: 0 };
    const loadAdvancedShipInput = document.getElementById('loadAdvancedShip');
    let shipBank = 0;
    const sparks = [];
    let sparkSeed = 0;
    let lastEngineX = null;
    let lastEngineY = null;

    const loader = new GLTFLoader();
    const textureLoader = new THREE.TextureLoader();
    let shipRoot = new THREE.Group();
    let shipPose = new THREE.Group();
    let shipVisual = new THREE.Group();
    let shipFallback = null;
    let shipModel = null;
    shipRoot.add(shipPose);
    shipPose.add(shipVisual);
    shipScene.add(shipRoot);
    let shipReady = false;
    const shipBounds = new THREE.Box3();
    const shipBoundsCenter = new THREE.Vector3();
    const shipAnchorOffset = new THREE.Vector3();
    const shipMeasureCorners = [
      new THREE.Vector3(),
      new THREE.Vector3(),
      new THREE.Vector3(),
      new THREE.Vector3(),
      new THREE.Vector3(),
      new THREE.Vector3(),
      new THREE.Vector3(),
      new THREE.Vector3()
    ];

    let shipScaleCorrection = 1;
    let shipScaleDirty = true;
    const advancedShipEnabled = !!window.__shotemup?.state?.settings?.loadAdvanced3DShipModel;
    gameBridge.advancedModelEnabled = advancedShipEnabled;
    if (loadAdvancedShipInput) loadAdvancedShipInput.checked = advancedShipEnabled;

    function ensureFallbackShip() {
      if (shipFallback) return;
      const geometry = new THREE.PlaneGeometry(90, 90);
      const purpleTexture = textureLoader.load('players_spaceship.png');
      purpleTexture.colorSpace = THREE.SRGBColorSpace;
      purpleTexture.center.set(0.5, 0.5);
      purpleTexture.rotation = Math.PI;
      const transparentFace = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0,
        depthWrite: false
      });
      const material = new THREE.MeshBasicMaterial({
        map: purpleTexture,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 1
      });
      shipFallback = new THREE.Mesh(geometry, material);
      shipFallback.rotation.x = Math.PI;
      shipVisual.add(shipFallback);
      shipScaleDirty = true;
    }

    function disposeFallbackShip() {
      if (!shipFallback) return;
      shipVisual.remove(shipFallback);
      shipFallback.geometry.dispose();
      const mats = Array.isArray(shipFallback.material) ? shipFallback.material : [shipFallback.material];
      for (const mat of mats) mat.dispose();
      shipFallback = null;
    }

    function reinitializeShip(advancedEnabled) {
      disposeFallbackShip();
      if (shipModel) {
        shipVisual.remove(shipModel);
        shipModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.geometry.dispose();
            if (Array.isArray(obj.material)) {
              obj.material.forEach((mat) => mat.dispose());
            } else if (obj.material) {
              obj.material.dispose();
            }
          }
        });
        shipModel = null;
      }
      shipReady = false;
      shipScaleDirty = true;
      shipBank = 0;
      shipVisual.clear();
      gameBridge.advancedModelEnabled = !!advancedEnabled;
      if (advancedEnabled) loadShipModel();
      else ensureFallbackShip();
    }

    function shipDisplayScale() {
      const coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
      return coarse ? 0.8 : 0.8;
    }

    function projectedBoxCssPixels(box, camera) {
      const min = box.min;
      const max = box.max;

      shipMeasureCorners[0].set(min.x, min.y, min.z);
      shipMeasureCorners[1].set(min.x, min.y, max.z);
      shipMeasureCorners[2].set(min.x, max.y, min.z);
      shipMeasureCorners[3].set(min.x, max.y, max.z);
      shipMeasureCorners[4].set(max.x, min.y, min.z);
      shipMeasureCorners[5].set(max.x, min.y, max.z);
      shipMeasureCorners[6].set(max.x, max.y, min.z);
      shipMeasureCorners[7].set(max.x, max.y, max.z);

      let left = Infinity;
      let right = -Infinity;
      let top = Infinity;
      let bottom = -Infinity;

      for (let i = 0; i < shipMeasureCorners.length; i++) {
        const p = shipMeasureCorners[i].project(camera);
        const x = (p.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-p.y * 0.5 + 0.5) * window.innerHeight;

        left = Math.min(left, x);
        right = Math.max(right, x);
        top = Math.min(top, y);
        bottom = Math.max(bottom, y);
      }

      return {
        x: left,
        y: top,
        w: right - left,
        h: bottom - top,
        cx: (left + right) * 0.5,
        cy: (top + bottom) * 0.5
      };
    }

    function recalibrateShipScale() {
      const desiredShipHeightPx = 90;
      const baseScale = shipDisplayScale();

      shipVisual.scale.setScalar(baseScale);
      shipRoot.updateMatrixWorld(true);
      shipBounds.setFromObject(shipVisual);

      const measuredShipBox = projectedBoxCssPixels(shipBounds, shipCamera);
      if (measuredShipBox.h > 0 && Number.isFinite(measuredShipBox.h)) {
        shipScaleCorrection = THREE.MathUtils.clamp(desiredShipHeightPx / measuredShipBox.h, 0.65, 1.45);
      } else {
        shipScaleCorrection = 1;
      }

      shipScaleDirty = false;
    }
    function loadShipModel() {
      if (shipReady || shipModel) return;
      loader.load(
        'player_spaceship.glb',
        (gltf) => {
          disposeFallbackShip();
          shipVisual.clear();
          const model = gltf.scene;
          shipModel = model;
          const box = new THREE.Box3().setFromObject(model);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);
          model.position.sub(center);
          const scale = Math.min(window.innerWidth, window.innerHeight) / Math.max(size.x, size.y) * 0.12;
          model.scale.setScalar(scale);
          model.rotation.x = Math.PI * 0.5;
          model.rotation.z = 0;
          shipVisual.add(model);
          shipScaleDirty = true;
          shipReady = true;
        },
        undefined,
        () => {
          shipReady = false;
        }
      );
    }
    gameBridge.loadAdvancedShipModel = loadShipModel;
    gameBridge.reinitializeShip = reinitializeShip;
    ensureFallbackShip();
    if (advancedShipEnabled) loadShipModel();

    const mouse = { x: 0, y: 0 };
    const clouds = [
      { x: 0.10, y: 0.20, s: 0.20, v: 0.010, a: 0.18, active: false, respawnAt: 0 },
      { x: 0.38, y: 0.14, s: 0.28, v: 0.014, a: 0.14, active: false, respawnAt: 0 },
      { x: 0.68, y: 0.24, s: 0.24, v: 0.011, a: 0.16, active: false, respawnAt: 0 },
      { x: 0.86, y: 0.12, s: 0.18, v: 0.009, a: 0.13, active: false, respawnAt: 0 }
    ];
    let cloudStartAt = performance.now();
    for (const cloud of clouds) {
      cloud.respawnAt = cloudStartAt;
      cloudStartAt += Math.random() * 3000;
    }
    window.addEventListener('pointermove', (ev) => {
      mouse.x = (ev.clientX / window.innerWidth) * 2 - 1;
      mouse.y = (ev.clientY / window.innerHeight) * 2 - 1;
    }, { passive: true });

    function resize() {
      shipRenderer.setSize(window.innerWidth, window.innerHeight, false);
      cloudCanvas.width = window.innerWidth;
      cloudCanvas.height = window.innerHeight;
      shipCamera.left = -window.innerWidth * 0.5;
      shipCamera.right = window.innerWidth * 0.5;
      shipCamera.top = window.innerHeight * 0.5;
      shipCamera.bottom = -window.innerHeight * 0.5;
      shipCamera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);

    function respawnCloud(cloud) {
      cloud.x = 0.08 + Math.random() * 0.84;
      cloud.y = -0.18 - Math.random() * 0.25;
      cloud.s = 0.16 + Math.random() * 0.14;
      cloud.v = 0.008 + Math.random() * 0.008;
      cloud.a = 0.12 + Math.random() * 0.08;
      cloud.active = true;
      cloud.respawnAt = 0;
    }

    function drawClouds() {
      const ctx = cloudCtx;
      const w = cloudCanvas.width = window.innerWidth;
      const h = cloudCanvas.height = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.005)';
      ctx.fillRect(0, 0, w, h);
      const now = performance.now();
      for (const cloud of clouds) {
        if (!cloud.active) {
          if (now >= cloud.respawnAt) respawnCloud(cloud);
          continue;
        }
        cloud.y += 0.012 + cloud.v * 0.0015;
        if (cloud.y > 1.15) {
          cloud.active = false;
          cloud.respawnAt = now + Math.random() * 3000;
          continue;
        }
        const px = cloud.x * w;
        const py = cloud.y * h;
        const s = cloud.s * Math.min(w, h) * 1.5;
        const puffs = [
          [0.00, 0.00, 0.42],
          [0.24, -0.10, 0.34],
          [0.48, 0.04, 0.40],
          [0.72, -0.06, 0.30]
        ];
        for (const [dx, dy, scale] of puffs) {
          const r = s * scale;
          const grad = ctx.createRadialGradient(px + dx * s, py + dy * s, r * 0.1, px + dx * s, py + dy * s, r);
          grad.addColorStop(0, `rgba(255,255,255,${cloud.a * 0.5})`);
          grad.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.ellipse(px + dx * s, py + dy * s, r * 1.2, r * 0.72, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawEngineFlames(player) {
      const w = engineCanvas.width = window.innerWidth;
      const h = engineCanvas.height = window.innerHeight;
      engineCtx.clearRect(0, 0, w, h);
      if (!player.visible) return;

      const x = player.x;
      const y = player.y + (player.bob || 0);
      const rot = -(player.rot || 0) + Math.PI * 1.25;
      const bank = player.bank || 0;
      const motion = (lastEngineX === null || lastEngineY === null) ? 1 : Math.min(1, Math.hypot(x - lastEngineX, y - lastEngineY) / 18);
      lastEngineX = x;
      lastEngineY = y;
      const flameScale = 0.7 + 0.3 * motion;
      const sx = Math.sin(rot);
      const sy = Math.cos(rot);
      const rearX = Math.cos(rot);
      const rearY = -Math.sin(rot);
      const bankShift = Math.sin(bank) * 4.5;
      const pulse = 0.72 + 0.28 * Math.sin(performance.now() * 0.03);
      const nozzleSpread = 15.5364 * Math.cos(bank);
      const rearOffset = 51;
      const ventralOffset = -5.2;
      const centerX = x + rearX * rearOffset;
      const centerY = y + rearY * rearOffset + ventralOffset;
      const nozzles = [
        { side: -1, hue: '#76ddff', core: '#e7fbff' },
        { side: 1, hue: '#4dbbff', core: '#f4ffff' }
      ];
      
      engineCtx.save();
      engineCtx.globalCompositeOperation = 'lighter';
      for (const nozzle of nozzles) {
        const nx = centerX + sx * (nozzle.side * nozzleSpread + bankShift);
        const ny = centerY + sy * (nozzle.side * nozzleSpread + bankShift);
        const len = (28 + pulse * 16) * flameScale;
        const flare = (10 + pulse * 8) * flameScale;
        const tipX = nx + rearX * len;
        const tipY = ny + rearY * len;

        const beam = engineCtx.createLinearGradient(nx, ny, tipX, tipY);
        beam.addColorStop(0, nozzle.core);
        beam.addColorStop(0.22, nozzle.hue);
        beam.addColorStop(1, 'rgba(0, 140, 255, 0)');

        engineCtx.strokeStyle = beam;
        engineCtx.fillStyle = beam;
        engineCtx.lineCap = 'round';
        engineCtx.lineJoin = 'round';

        engineCtx.globalAlpha = 0.92 * pulse * flameScale;
        engineCtx.lineWidth = (10 + pulse * 6) * flameScale;
        engineCtx.beginPath();
        engineCtx.moveTo(nx, ny);
        engineCtx.lineTo(nx + rearX * len * 0.72, ny + rearY * len * 0.72);
        engineCtx.stroke();

        engineCtx.globalAlpha = 0.58 * pulse * flameScale;
        engineCtx.lineWidth = (4 + pulse * 2) * flameScale;
        engineCtx.beginPath();
        engineCtx.moveTo(nx, ny);
        engineCtx.lineTo(tipX, tipY);
        engineCtx.stroke();

        const glow = engineCtx.createRadialGradient(nx, ny, 0, nx, ny, flare);
        glow.addColorStop(0, nozzle.core);
        glow.addColorStop(0.35, nozzle.hue);
        glow.addColorStop(1, 'rgba(0, 120, 255, 0)');
        engineCtx.globalAlpha = 0.7 * pulse * flameScale;
        engineCtx.fillStyle = glow;
        engineCtx.beginPath();
        engineCtx.arc(nx, ny, flare, 0, Math.PI * 2);
        engineCtx.fill();

        engineCtx.globalAlpha = 0.32 * pulse * flameScale;
        engineCtx.beginPath();
        engineCtx.moveTo(nx, ny);
        engineCtx.quadraticCurveTo(nx + rearX * (len * 0.42) + sx * 3, ny + rearY * (len * 0.42) + sy * 3, tipX, tipY);
        engineCtx.lineWidth = 2;
        engineCtx.stroke();
      }
      engineCtx.restore();
    }

    function drawDamageSparks(player) {
      const w = damageCanvas.width = window.innerWidth;
      const h = damageCanvas.height = window.innerHeight;
      damageCtx.clearRect(0, 0, w, h);
      const damage = Math.max(0, Math.min(1, player.damage || 0));
      const visible = !!player.visible;
      const craftW = 64;
      const craftH = 52;
      const maxTravel = craftW * 0.25;
      if (visible && damage > 0.01) {
        const emitCount = damage * 9 + damage * damage * 28;
        sparkSeed += emitCount;
        while (sparkSeed >= 1) {
          sparkSeed -= 1;
          const localX = (Math.random() - 0.5) * craftW * 0.72;
          const localY = (Math.random() - 0.5) * craftH * 0.72;
          const ang = (Math.random() * Math.PI * 2);
          const speed = 0.25 + Math.random() * (0.55 + damage * 1.1);
          const rot = (player.rot || 0) + (Math.random() - 0.5) * 0.35;
          const bx = player.x + localX * Math.cos(player.rot || 0) - localY * Math.sin(player.rot || 0);
          const by = player.y + player.bob + localX * Math.sin(player.rot || 0) + localY * Math.cos(player.rot || 0);
          const warm = Math.random() < 0.6;
          sparks.push({
            x: bx,
            y: by,
            vx: Math.cos(ang) * speed * 8 + Math.cos(rot) * 0.8,
            vy: Math.sin(ang) * speed * 8 + Math.sin(rot) * 0.8,
            life: 0.2 + Math.random() * 0.45,
            ttl: 0.2 + Math.random() * 0.45,
            size: (warm ? 1.5 + Math.random() * 2.2 : 1.2 + Math.random() * 1.6) * 0.5,
            color: warm ? '#ffd55a' : '#ff5b45',
            ox: bx,
            oy: by
          });
        }
      }

      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.life -= 0.08;
        if (s.life <= 0) {
          sparks.splice(i, 1);
          continue;
        }
        s.vx *= 0.985;
        s.vy *= 0.985;
        s.vy += 0.025;
        const x1 = s.x;
        const y1 = s.y;
        s.x += s.vx;
        s.y += s.vy;
        const dx = s.x - s.ox;
        const dy = s.y - s.oy;
        const dist = Math.hypot(dx, dy);
        if (dist > maxTravel) {
          const k = maxTravel / dist;
          s.x = s.ox + dx * k;
          s.y = s.oy + dy * k;
          s.vx *= 0.35;
          s.vy *= 0.35;
        }
        const t = s.life / s.ttl;
        const alpha = t * t * (0.22 + damage * 0.52);
        damageCtx.save();
        damageCtx.globalCompositeOperation = 'lighter';
        damageCtx.strokeStyle = s.color;
        const glow = damageCtx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 7);
        glow.addColorStop(0, s.color);
        glow.addColorStop(0.35, 'rgba(255, 255, 255, ' + (alpha * 0.75).toFixed(3) + ')');
        glow.addColorStop(1, 'rgba(255, 120, 0, 0)');
        damageCtx.fillStyle = glow;
        damageCtx.globalAlpha = alpha;
        damageCtx.lineWidth = Math.max(1, s.size * 0.8);
        damageCtx.beginPath();
        damageCtx.moveTo(x1, y1);
        damageCtx.lineTo(s.x, s.y);
        damageCtx.stroke();
        damageCtx.beginPath();
        damageCtx.arc(s.x, s.y, s.size * 1.2, 0, Math.PI * 2);
        damageCtx.fill();
        damageCtx.restore();
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      drawClouds();

      const player = gameBridge.player;
      if (!gameBridge.advancedModelEnabled) {
        player.bank = 0.0;
      }

      drawEngineFlames(player);
      drawDamageSparks(player);
      shipRoot.visible = !!player.visible;
      if (shipRoot.visible) {
        shipRoot.position.x = player.x - window.innerWidth * 0.5;
        shipRoot.position.y = window.innerHeight * 0.5 - player.y + player.bob;
        shipRoot.position.z = 0;
        shipRoot.rotation.set(0, 0, 0);
        shipPose.position.set(0, 0, 0);
        shipPose.rotation.z = -(player.rot || 0) - Math.PI * 0.25;
        shipPose.rotation.y = (player.tilt || 0) * 0.6;
        shipBank += ((player.bank || 0) - shipBank) * 0.22;
        if (gameBridge.advancedModelEnabled) {
          shipVisual.rotation.x = -0.08;
          shipVisual.rotation.z = 0;
          if (shipModel) shipModel.rotation.z = shipBank;
        } else if (shipFallback) {       
          shipVisual.rotation.x = -0.08;
          shipVisual.rotation.z = 0;
          shipVisual.rotation.y = 0.0+THREE.MathUtils.clamp(shipBank, -Math.PI * 0.25, Math.PI * 0.25); // Keep this unchanged!!!!
        }

        if (shipScaleDirty) {
          recalibrateShipScale();
        }

        shipVisual.scale.setScalar(shipDisplayScale() * shipScaleCorrection);
        shipRoot.updateMatrixWorld(true);
        shipBounds.setFromObject(shipVisual);
        gameBridge.player3dBox = projectedBoxCssPixels(shipBounds, shipCamera);

        shipBounds.getCenter(shipBoundsCenter);
        shipAnchorOffset.copy(shipBoundsCenter);
        shipRoot.worldToLocal(shipAnchorOffset);
        shipPose.position.set(-shipAnchorOffset.x, -shipAnchorOffset.y, 0);
      } else {
        shipBank += (0 - shipBank) * 0.15;
      }
      shipRenderer.render(shipScene, shipCamera);
    }
    animate();
  </script>
