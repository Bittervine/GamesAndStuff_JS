<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="theme-color" content="#07111d">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./pwa-icon.svg" type="image/svg+xml">
  <title>Thorium Gap</title>
  <style>
    :root {
      --panel: rgba(6, 12, 24, 0.62);
      --text: #f8fbff;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 0%, rgba(124, 247, 255, 0.18), transparent 28%),
        radial-gradient(circle at 90% 10%, rgba(255, 143, 232, 0.16), transparent 32%),
        linear-gradient(180deg, #08111d 0%, #030712 100%);
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    * { box-sizing: border-box; }
    #game {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      background: transparent;
      touch-action: none;
      z-index: 1;
    }
    #hud {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      background: transparent;
      z-index: 6;
    }
    #hudHint {
      position: fixed;
      left: 50%;
      top: 12px;
      transform: translateX(-50%);
      z-index: 7;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(190, 225, 255, 0.98);
      background: rgba(3, 14, 44, 0.88);
      backdrop-filter: blur(10px);
      box-shadow:
        0 0 0 1px rgba(34, 118, 255, 0.48),
        0 0 18px rgba(34, 118, 255, 0.56),
        0 12px 30px rgba(0, 0, 0, 0.34);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s ease;
      white-space: nowrap;
    }
    #hudHint.show { opacity: 1; }
    #controls {
      position: fixed;
      top: 7px;
      right: 12px;
      left: auto;
      bottom: auto;
      transform: none;
      z-index: 7;
      display: grid;
      grid-template-columns: 1fr;
      gap: 3px;
      justify-items: stretch;
      padding: 3px 8px;
      width: max-content;
      max-width: calc(100vw - 16px);
      border-radius: 16px;
      border: 1px solid rgba(64, 128, 255, 0.98);
      background: linear-gradient(180deg, rgba(3, 14, 44, 0.98), rgba(2, 8, 24, 0.78));
      backdrop-filter: blur(10px);
      box-shadow:
        0 0 0 2px rgba(34, 118, 255, 0.78),
        0 14px 36px rgba(0, 0, 0, 0.34),
        0 0 28px rgba(34, 118, 255, 0.76),
        0 0 42px rgba(34, 118, 255, 0.44);
    }
    #controls button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      width: 100%;
      min-width: 88px;
      height: 17px;
      padding: 0 8px;
      color: #000;
      font: inherit;
      font-size: 0.68rem;
      font-weight: 900;
      letter-spacing: 0.03em;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(180deg, rgba(190, 225, 255, 0.9), rgba(34, 118, 255, 0.72)),
        linear-gradient(180deg, rgba(8, 12, 24, 0.12), rgba(8, 12, 24, 0.02));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        inset 0 -2px 0 rgba(20, 66, 170, 0.64),
        0 0 14px rgba(34, 118, 255, 0.5),
        0 6px 14px rgba(0, 0, 0, 0.16);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #controls button:active, #controls button.active {
      transform: translateY(1px) scale(0.99);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.64),
        inset 0 -2px 0 rgba(20, 58, 128, 0.76),
        0 0 18px rgba(34, 118, 255, 0.64),
        0 4px 14px rgba(0, 0, 0, 0.16);
      filter: saturate(1.85) brightness(1.16);
    }
    #controls button[data-act="fire"] {
      background: linear-gradient(180deg, rgba(140, 196, 255, 0.92), rgba(34, 118, 255, 0.38));
    }
    #controls button[data-act="bomb"] {
      background: linear-gradient(180deg, rgba(255, 214, 111, 0.34), rgba(255, 214, 111, 0.1));
    }
    #controls button[data-act="settings"] {
      background: linear-gradient(180deg, rgba(120, 188, 255, 0.88), rgba(34, 118, 255, 0.34));
    }
    #titleManual {
      position: fixed;
      left: 50%;
      top: 54%;
      transform: translateX(-50%);
      z-index: 7;
      appearance: none;
      border: 2px solid rgba(64, 128, 255, 0.98);
      border-radius: 16px;
      padding: 10px 18px;
      min-width: 160px;
      color: #000;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(180deg, rgba(190, 225, 255, 0.92), rgba(34, 118, 255, 0.68));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.94),
        inset 0 -2px 0 rgba(20, 66, 170, 0.64),
        0 0 18px rgba(34, 118, 255, 0.5),
        0 10px 18px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #titleManual.show { display: inline-flex; }

    #settingsDialog {
      border: 0;
      padding: 0;
      width: min(92vw, 560px);
      max-width: 560px;
      background: transparent;
      color: var(--text);
      box-shadow: none;
    }
    #settingsDialog::backdrop {
      background: rgba(1, 4, 12, 0.66);
      backdrop-filter: blur(4px);
    }
    .settings-card {
      width: 100%;
      padding: 18px;
      border-radius: 24px;
      border: 2px solid rgba(225, 250, 255, 0.96);
      background:
        radial-gradient(circle at 10% 0%, rgba(34, 118, 255, 0.52), transparent 28%),
        radial-gradient(circle at 92% 6%, rgba(120, 188, 255, 0.38), transparent 32%),
        linear-gradient(180deg, rgba(3, 14, 44, 0.98), rgba(2, 8, 24, 0.98));
      box-shadow:
        0 0 0 2px rgba(64, 128, 255, 0.98),
        0 0 34px rgba(34, 118, 255, 0.52),
        0 24px 60px rgba(0, 0, 0, 0.48);
    }
    .settings-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .settings-head h2 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      line-height: 1;
    }
    .settings-head p {
      margin: 8px 0 0;
      color: rgba(248, 251, 255, 0.74);
      font-size: 0.95rem;
    }
    .settings-close {
      appearance: none;
      border: 0;
      border-radius: 14px;
      min-height: 44px;
      padding: 10px 14px;
      color: var(--text);
      font: inherit;
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(180deg, rgba(190, 225, 255, 0.96), rgba(34, 118, 255, 0.54));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.92),
        inset 0 -2px 0 rgba(20, 66, 170, 0.7),
        0 0 14px rgba(34, 118, 255, 0.4),
        0 8px 18px rgba(0, 0, 0, 0.22);
      cursor: pointer;
    }
    .settings-group {
      display: grid;
      gap: 8px;
      margin: 14px 0;
    }
    .settings-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .settings-value {
      color: rgba(248, 251, 255, 0.76);
      font-size: 0.95em;
    }
    .settings-group input[type="range"] {
      width: 100%;
      accent-color: #7cf7ff;
    }
    .settings-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 2px solid rgba(64, 128, 255, 0.98);
      background: rgba(3, 14, 44, 0.82);
    }
    .settings-toggle span {
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .settings-toggle input {
      width: 20px;
      height: 20px;
      accent-color: #7cf7ff;
    }
    .settings-toggle:has(input:disabled) {
      opacity: 0.48;
      filter: saturate(0.65);
    }
    .settings-toggle:has(input:disabled) input {
      cursor: not-allowed;
    }
    .difficulty-buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .difficulty-buttons button {
      min-height: 44px;
      border-radius: 14px;
      border: 2px solid rgba(64, 128, 255, 0.98);
      background: linear-gradient(180deg, rgba(190, 225, 255, 0.28), rgba(34, 118, 255, 0.18));
      color: var(--text);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.58),
        0 0 12px rgba(34, 118, 255, 0.26);
    }
    .difficulty-buttons button[aria-pressed="true"] {
      background: linear-gradient(180deg, rgba(190, 225, 255, 0.72), rgba(34, 118, 255, 0.4));
      border-color: rgba(64, 128, 255, 0.98);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.92),
        0 0 16px rgba(34, 118, 255, 0.44);
    }
    .settings-note {
      margin: 14px 0 0;
      color: rgba(248, 251, 255, 0.72);
      font-size: 0.92rem;
      line-height: 1.35;
    }
    @media (max-width: 620px) {
      #controls {
        top: auto;
        bottom: 8px;
        gap: 5px;
        padding: 5px 6px;
        max-width: calc(100vw - 12px);
        align-content: start;
      }
      #controls button {
        min-width: 42px;
        height: 22px;
        min-height: 22px;
        padding: 0 7px;
        border-radius: 10px;
        font-size: 0.68rem;
        white-space: nowrap;
      }
    }
  </style>
</head>
  <body>
  <canvas id="game"></canvas>
  <canvas id="hud"></canvas>
  <div id="hudHint"></div>
  <button id="titleManual" type="button">MANUAL</button>
  <div id="controls" aria-label="Game controls">
    <button data-act="pause" aria-label="Pause game">PAUSE</button>
    <button data-act="settings" aria-label="Open settings">SETTINGS</button>
  </div>
  <dialog id="settingsDialog" aria-labelledby="settingsTitle" aria-modal="true">
    <div class="settings-card">
      <div class="settings-head">
        <div>
          <h2 id="settingsTitle">Command</h2>
          <p>Tune audio and combat difficulty for the breach run.</p>
        </div>
        <button type="button" class="settings-close" id="settingsClose">CLOSE</button>
      </div>

      <div class="settings-group">
        <div class="settings-label">
          <span>Effects Volume</span>
          <span class="settings-value" id="sfxVolumeValue">100%</span>
        </div>
        <input id="sfxVolume" type="range" min="0" max="1" step="0.01" value="1">
      </div>

      <div class="settings-group">
        <div class="settings-label">
          <span>Score Volume</span>
          <span class="settings-value" id="musicVolumeValue">100%</span>
        </div>
        <input id="musicVolume" type="range" min="0" max="1" step="0.01" value="1">
      </div>

      <div class="settings-group">
        <div class="settings-label">
          <span>Combat Difficulty</span>
          <span class="settings-value" id="difficultyValue">Normal</span>
        </div>
        <div class="difficulty-buttons" id="difficultyButtons">
          <button type="button" data-difficulty="0">Easy</button>
          <button type="button" data-difficulty="1">Normal</button>
          <button type="button" data-difficulty="2">Hard</button>
        </div>
      </div>

      <label class="settings-toggle" for="lowEndMode">
        <span>Low end mode</span>
        <input id="lowEndMode" type="checkbox">
      </label>
    </div>
  </dialog>
  <script>
    (function () {
      var bust = Date.now().toString(36);
      document.write('<script src="ShotEmUp_JS.js?v=' + bust + '"><\/script>');
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js?v=' + bust, { updateViaCache: 'none' }).catch(function () {});
        });
      }
    }());
  </script>
</body>
</html>
