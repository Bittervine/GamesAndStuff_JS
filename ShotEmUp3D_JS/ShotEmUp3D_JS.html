<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flyttad</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --card: rgba(255, 255, 255, 0.84);
      --text: #1f1c17;
      --muted: #64594a;
      --accent: #8f5d2d;
      --border: rgba(31, 28, 23, 0.12);
      --shadow: 0 18px 50px rgba(84, 58, 24, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.75), transparent 40%),
        linear-gradient(160deg, #f7f1e7 0%, var(--bg) 55%, #e9dcc8 100%);
    }

    main {
      width: min(720px, calc(100vw - 2rem));
      padding: 2rem;
    }

    .card {
      padding: 2.2rem 2rem 1.8rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      margin: 0 0 0.75rem;
      font: 600 0.78rem/1.2 system-ui, sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    p {
      margin: 0;
      line-height: 1.55;
      font-size: 1.15rem;
    }

    .lead {
      font-size: clamp(1.45rem, 2.8vw, 2.2rem);
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      margin-top: 1.5rem;
      padding: 0.9rem 1.2rem;
      border-radius: 999px;
      color: white;
      text-decoration: none;
      background: linear-gradient(135deg, #a96b33, #7e4a1f);
      box-shadow: 0 10px 24px rgba(126, 74, 31, 0.28);
      font: 600 1rem/1.2 system-ui, sans-serif;
    }

    .hint {
      margin-top: 0.9rem;
      color: var(--muted);
      font-size: 0.98rem;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-label="Flyttad sida">
      <p class="eyebrow">Notis</p>
      <p class="lead">Tjena Richard! Jag har flyttat detta till en ny map. Nedan finns den nya länken.</p>
      <a href="../ThoriumGap_JS/ThoriumGap.html">Öppna ThoriumGap.html</a>
      <p class="hint">Jag ska se om jag kan lägga tillbaka 3D modellen, men än så länge är det bara 2D som gäller.</p>
    </section>
  </main>
</body>
</html>
