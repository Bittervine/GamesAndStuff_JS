<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Domineering JS</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'FreeSerif', serif;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
      background:#fff;
      color:#23160f;
    }
    .wrap{width:100%; margin:0; padding:8px 0 0}
    canvas{
      display:block;
      margin:8px auto;
      max-width:calc(100vw - 16px);
      height:auto;
      touch-action:manipulation;
    }
    #controls{
      font-size:95%;
      text-align:center;
      font-family:serif;
    }
    #controls button,
    #controls input{
      font-size:inherit;
      vertical-align:middle;
    }
    #controls button{
      width:2.2em;
      box-sizing:border-box;
      line-height:1;
      padding-top:0;
      padding-bottom:0;
      padding-left:0;
      padding-right:0;
      min-height:1.8em;
    }
    #previewBtn{
      width:auto;
      min-width:4.6em;
      padding-left:0.3em;
      padding-right:0.3em;
    }
    #previewBtn.is-on{
      box-shadow:inset 0 2px 4px rgba(0,0,0,0.35);
      background:#d9d9d9;
    }
    #buttonRow{
      display:flex;
      flex-wrap:nowrap;
      align-items:center;
      justify-content:center;
      gap:0.25em;
      white-space:nowrap;
    }
    #buttonRow button,
    #buttonRow label,
    #buttonRow input{
      vertical-align:middle;
    }
    #buttonRow label{
      display:inline-flex;
      align-items:center;
      line-height:1;
      white-space:nowrap;
    }
    #status{
      display:block;
      margin-top:.35em;
      font-weight:700;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <canvas id="board" width="760" height="760"></canvas>
    <div id="controls">
      <div id="buttonRow">
        <button id="resetBtn" title="Reset">↺</button>
        <label>&nbsp;Depth:&nbsp;<input id="depthInput" type="number" value="4" min="1" max="9" style="width:2.2em"></label>
        <label>&nbsp;Clumsy:&nbsp;<input id="clumsyInput" type="number" value="0" min="0" max="100" style="width:2.2em;margin-right:2px">%</label>
        <button id="previewBtn" title="Preview">Preview</button>
        <button id="takebackBtn" title="Undo">⌫</button>
      </div>
      <span id="status"></span>
    </div>
  </main>

  <script>
  (function(){
    'use strict';

    var LIGHT_SQUARE = 'rgba(240,217,181,.25)';
    var DARK_SQUARE = 'rgba(181,136,99,.25)';
    var MARK_COLOR = '#202020';

    var N=8, HUMAN='v', AI='h', INF=1e9, MATE=1e7;
    var board, turn, over, winner, history, previewMove, previewEnabled, aiBusy, aiTimer, cell, pad, boardSize;
    var aiThinkStart=0, aiDepthNow=0, aiDepthDone=0, aiLastSec=0, aiTargetDepth=0, aiBestMove=null, aiDepthStart=0, searchDeadline=0;
    var canvas=document.getElementById('board'), ctx=canvas.getContext&&canvas.getContext('2d');
    var controls=document.getElementById('controls'), statusEl=document.getElementById('status');
    var depthInput=document.getElementById('depthInput'), clumsyInput=document.getElementById('clumsyInput'), previewBtn=document.getElementById('previewBtn');

    function save(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
    function load(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
    function clamp(v,lo,hi){ v=parseFloat(v); if(!isFinite(v)) return lo; if(v<lo) return lo; if(v>hi) return hi; return v; }
    function opp(c){ return c===HUMAN ? AI : HUMAN; }
    function inBounds(r,c){ return r>=0 && r<N && c>=0 && c<N; }

    function makeBoard(){
      var b=[],r,c;
      for(r=0;r<N;r++){ b[r]=[]; for(c=0;c<N;c++) b[r][c]=null; }
      return b;
    }
    function resetState(){
      board=makeBoard();
      turn=HUMAN;
      over=false;
      winner=null;
      history=[];
      previewMove=null;
      aiBusy=false;
      if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; }
      aiThinkStart=0; aiDepthNow=0; aiDepthDone=0; aiLastSec=0; aiTargetDepth=0; aiBestMove=null; aiDepthStart=0;
    }
    function isEmptyMove(r,c,color){
      if(!inBounds(r,c)) return false;
      if(color===HUMAN) return r+1<N && board[r][c]===null && board[r+1][c]===null;
      return c+1<N && board[r][c]===null && board[r][c+1]===null;
    }
    function legalMoves(color){
      var moves=[], r, c;
      for(r=0;r<N;r++) for(c=0;c<N;c++) if(isEmptyMove(r,c,color)) moves.push({r:r,c:c});
      return moves;
    }
    function hasAnyLegalMove(color){ return legalMoves(color).length>0; }

    function moveToken(move,color){
      var t={r:move.r,c:move.c,color:color,prevTurn:turn,prevOver:over,prevWinner:winner,kind:'move'};
      board[move.r][move.c]=color;
      if(color===HUMAN) board[move.r+1][move.c]=color;
      else board[move.r][move.c+1]=color;
      return t;
    }
    function revertToken(t){
      if(!t) return;
      board[t.r][t.c]=null;
      if(t.color===HUMAN) board[t.r+1][t.c]=null;
      else board[t.r][t.c+1]=null;
      turn=t.prevTurn;
      over=t.prevOver;
      winner=t.prevWinner;
    }
    function finalizeIfNeeded(){
      if(over) return;
      if(!hasAnyLegalMove(turn)){
        over=true;
        winner=opp(turn);
      }
    }

    function segmentScore(r,c,color){
      var rr,cc,score=0,center=(N-1)/2, dist;
      if(!isEmptyMove(r,c,color)) return -9999;
      dist=Math.abs(r-center)+Math.abs(c-center);
      score += 40 - dist*6;
      if(color===HUMAN){
        rr=r; cc=c;
        if(r+1===N-1 || r===0) score += 6;
      } else {
        if(c+1===N-1 || c===0) score += 6;
      }
      return score;
    }
    function evaluateBoard(){
      var aiMoves=legalMoves(AI), huMoves=legalMoves(HUMAN), r, m, score=0;
      if(!aiMoves.length) return -MATE;
      if(!huMoves.length) return MATE;
      score += (aiMoves.length - huMoves.length) * 500;
      for(r=0;r<aiMoves.length;r++) score += segmentScore(aiMoves[r].r, aiMoves[r].c, AI);
      for(r=0;r<huMoves.length;r++) score -= segmentScore(huMoves[r].r, huMoves[r].c, HUMAN);
      return score;
    }

    function search(depth, alpha, beta, color){
      var moves=legalMoves(color), i, mv, tok, val, best;
      if(searchDeadline && Date.now()>=searchDeadline) return evaluateBoard();
      if(!moves.length) return color===AI ? -MATE + depth : MATE - depth;
      if(depth<=0) return evaluateBoard();
      if(color===AI){
        best=-INF;
        for(i=0;i<moves.length;i++){
          mv=moves[i];
          tok=moveToken(mv, color);
          turn=HUMAN;
          val=search(depth-1, alpha, beta, HUMAN);
          revertToken(tok);
          if(val>best) best=val;
          if(best>alpha) alpha=best;
          if(alpha>=beta) break;
        }
        return best;
      }
      best=INF;
      for(i=0;i<moves.length;i++){
        mv=moves[i];
        tok=moveToken(mv, color);
        turn=AI;
        val=search(depth-1, alpha, beta, AI);
        revertToken(tok);
        if(val<best) best=val;
        if(best<beta) beta=best;
        if(alpha>=beta) break;
      }
      return best;
    }
    function chooseAiMoveAtDepth(depth){
      var maxDepth=clamp(depth,1,9)|0, moves=legalMoves(AI), i,mv,tok,val,best=-INF,bestMove=null,pool=[],n,deadline=Date.now()+350;
      if(!moves.length) return null;
      pool=[]; best=-INF;
      searchDeadline=deadline;
      for(i=0;i<moves.length;i++){
        mv=moves[i];
        tok=moveToken(mv,AI);
        if(!tok) continue;
        val=search(maxDepth-1,-INF,INF,HUMAN) + segmentScore(mv.r, mv.c, AI);
        revertToken(tok);
        if(val>best){ best=val; pool=[mv]; }
        else if(val===best) pool.push(mv);
        if(Date.now()>=deadline) break;
      }
      searchDeadline=0;
      if(pool.length){
        bestMove=pool[0];
        if(clamp(clumsyInput.value,0,100) > 0 && pool.length>1){
          n=Math.max(1, Math.min(pool.length, 1+Math.floor(clamp(clumsyInput.value,0,100)/33)));
          bestMove=pool[Math.floor(Math.random()*n)];
        }
      }
      return bestMove;
    }

    function drawCell(r,c){
      var x=pad + c*cell, y=pad + r*cell;
      ctx.fillStyle=((r+c)%2===0) ? LIGHT_SQUARE : DARK_SQUARE;
      ctx.fillRect(x, y, cell, cell);
    }
    function drawDomino(r,c,color,alpha){
      var horizontal = (color===AI);
      var inset=Math.max(4, cell*0.14);
      var corner=Math.max(4, cell*0.12);
      var strokeW=Math.max(2, cell*0.08);
      var x=pad + c*cell + inset, y=pad + r*cell + inset;
      var w=horizontal ? cell*2-inset*2 : cell-inset*2;
      var h=horizontal ? cell-inset*2 : cell*2-inset*2;
      if(typeof alpha==='number') ctx.globalAlpha=alpha;
      ctx.fillStyle=(color===HUMAN)?'#ffffff':'#000000';
      ctx.beginPath();
      if(horizontal){
        ctx.moveTo(x,y+corner);
        ctx.lineTo(x,y+h-corner);
        ctx.quadraticCurveTo(x,y+h,x+corner,y+h);
        ctx.lineTo(x+w-corner,y+h);
        ctx.quadraticCurveTo(x+w,y+h,x+w,y+h-corner);
        ctx.lineTo(x+w,y+corner);
        ctx.quadraticCurveTo(x+w,y,x+w-corner,y);
        ctx.lineTo(x+corner,y);
        ctx.quadraticCurveTo(x,y,x,y+corner);
      } else {
        ctx.moveTo(x+corner,y);
        ctx.lineTo(x+w-corner,y);
        ctx.quadraticCurveTo(x+w,y,x+w,y+corner);
        ctx.lineTo(x+w,y+h-corner);
        ctx.quadraticCurveTo(x+w,y+h,x+w-corner,y+h);
        ctx.lineTo(x+corner,y+h);
        ctx.quadraticCurveTo(x,y+h,x,y+h-corner);
        ctx.lineTo(x,y+corner);
        ctx.quadraticCurveTo(x,y,x+corner,y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.lineWidth=strokeW;
      ctx.strokeStyle=(color===HUMAN)?'#000000':'#ffffff';
      ctx.stroke();
      if(typeof alpha==='number') ctx.globalAlpha=1;
    }
    function drawCornerBracketRect(x,y,w,h,color,alpha){
      var seg=Math.max(6, Math.min(w,h)*0.16), lw=Math.max(2, cell*0.07);
      if(typeof alpha==='number') ctx.globalAlpha=alpha;
      ctx.strokeStyle=color||'#000000';
      ctx.lineWidth=lw;
      ctx.lineCap='butt';
      ctx.beginPath();
      ctx.moveTo(x,y+seg); ctx.lineTo(x,y); ctx.lineTo(x+seg,y);
      ctx.moveTo(x+w,y+seg); ctx.lineTo(x+w,y); ctx.lineTo(x+w-seg,y);
      ctx.moveTo(x,y+h-seg); ctx.lineTo(x,y+h); ctx.lineTo(x+seg,y+h);
      ctx.moveTo(x+w,y+h-seg); ctx.lineTo(x+w,y+h); ctx.lineTo(x+w-seg,y+h);
      ctx.stroke();
      if(typeof alpha==='number') ctx.globalAlpha=1;
    }
    function draw(){
      var r,c,i,last;
      if(!ctx) return;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for(r=0;r<N;r++) for(c=0;c<N;c++) drawCell(r,c);
      if(previewEnabled && previewMove && turn===AI) drawDomino(previewMove.r, previewMove.c, AI, 0.35);
      for(i=0;i<history.length;i++) drawDomino(history[i].r, history[i].c, history[i].color, 1);
      if(history.length){
        var x,y,w,h;
        last=history[history.length-1];
        x=pad + last.c*cell;
        y=pad + last.r*cell;
        w=(last.color===HUMAN?cell:cell*2);
        h=(last.color===HUMAN?cell*2:cell);
        drawCornerBracketRect(x, y, w, h, '#000000');
      }
    }

    function relativeScore(){
      return legalMoves(AI).length - legalMoves(HUMAN).length;
    }
    function statusText(){
      var score=relativeScore(), lead;
      if(over){
        if(winner===HUMAN) return 'Info: Game over: White wins ' + Math.abs(score).toFixed(1) + '.';
        if(winner===AI) return 'Info: Game over: Black wins ' + Math.abs(score).toFixed(1) + '.';
        return 'Info: Game over: Draw 0.0.';
      }
      if(aiBusy && aiThinkStart){
        return 'Info: Thinking Depth ' + aiDepthNow + ' for ' + ((Date.now()-aiThinkStart)/1000).toFixed(1) + ' s.';
      }
      lead=score>0 ? 'Black leads by ' + score.toFixed(1) : score<0 ? 'White leads by ' + Math.abs(score).toFixed(1) : 'Level';
      return 'Info: ' + lead + ' for depth ' + (aiDepthDone>0?aiDepthDone:clamp(depthInput.value,1,9)) + ' after ' + aiLastSec.toFixed(1) + ' s.';
    }
    function refresh(){
      finalizeIfNeeded();
      statusEl.textContent=statusText();
      draw();
    }

    function placeHuman(r,c){
      var tok;
      if(over || turn!==HUMAN || aiBusy) return false;
      if(!isEmptyMove(r,c,HUMAN)) return false;
      tok=moveToken({r:r,c:c}, HUMAN);
      history.push(tok);
      turn=AI;
      finalizeIfNeeded();
      refresh();
      if(!over) scheduleAI();
      return true;
    }
    function placeAI(move){
      var tok;
      tok=moveToken(move, AI);
      history.push(tok);
      turn=HUMAN;
      finalizeIfNeeded();
      refresh();
    }
    function scheduleAI(){
      if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; }
      aiTimer=setTimeout(startEngineTurn, previewEnabled ? 60 : 20);
    }
    function startEngineTurn(){
      aiTimer=null;
      if(over || turn!==AI || aiBusy) return;
      aiBusy=true;
      aiThinkStart=Date.now();
      aiDepthStart=aiThinkStart;
      aiDepthNow=1;
      aiTargetDepth=clamp(depthInput.value,1,9)|0;
      aiBestMove=null;
      refresh();
      aiTimer=setTimeout(pumpEngineTurn,0);
    }
    function finishEngineTurn(){
      var mv;
      aiBusy=false;
      aiLastSec=(Date.now()-aiThinkStart)/1000;
      aiDepthDone=aiDepthNow>0?Math.min(aiDepthNow,aiTargetDepth):aiDepthDone;
      aiThinkStart=0; aiDepthNow=0; aiTargetDepth=0; aiDepthStart=0;
      mv=aiBestMove;
      if(over || turn!==AI || !mv){ finalizeIfNeeded(); refresh(); return; }
      previewMove=null;
      if(previewEnabled){
        previewMove={r:mv.r,c:mv.c,color:AI};
        draw();
      }
      setTimeout(function(){
        if(over || turn!==AI) return;
        placeAI(mv);
      }, previewEnabled ? 220 : 0);
    }
    function pumpEngineTurn(){
      var mv, depthElapsed;
      aiTimer=null;
      if(over || turn!==AI || !aiBusy) return;
      refresh();
      if(Date.now()-aiThinkStart>=30000){ finishEngineTurn(); return; }
      mv=chooseAiMoveAtDepth(aiDepthNow);
      if(mv) aiBestMove=mv;
      if(previewEnabled){
        previewMove=aiBestMove ? {r:aiBestMove.r,c:aiBestMove.c,color:AI} : null;
        draw();
      }
      depthElapsed=Date.now()-aiDepthStart;
      if(aiDepthNow>=aiTargetDepth || depthElapsed>=10000 || (Date.now()+Math.max(400,depthElapsed*2))>=(aiThinkStart+30000)){ finishEngineTurn(); return; }
      aiDepthNow+=1;
      aiDepthStart=Date.now();
      aiTimer=setTimeout(pumpEngineTurn,0);
    }

    function click(ev){
      var rect,x,y,sx,sy,r,c;
      if(over || turn!==HUMAN || aiBusy) return;
      rect=canvas.getBoundingClientRect();
      sx=canvas.width/rect.width; sy=canvas.height/rect.height;
      x=(ev.clientX-rect.left)*sx; y=(ev.clientY-rect.top)*sy;
      c=Math.floor((x-pad)/cell);
      r=Math.floor((y-pad)/cell);
      if(!inBounds(r,c)) return;
      placeHuman(r,c);
    }

    function takeBack(){
      var tok;
      if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; }
      aiBusy=false; aiThinkStart=0; aiDepthNow=0; aiTargetDepth=0; aiBestMove=null; aiDepthStart=0;
      if(!history.length) return;
      tok=history.pop();
      revertToken(tok);
      previewMove=null;
      finalizeIfNeeded();
      refresh();
    }

    function resetGame(){
      if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; }
      aiBusy=false; aiThinkStart=0; aiDepthNow=0; aiTargetDepth=0; aiBestMove=null; aiDepthStart=0;
      resetState();
      previewEnabled=load('dom_preview')==='1';
      previewBtn.className=previewEnabled ? 'is-on' : '';
      refresh();
    }

    window.__test = {
      getState: function() {
        return { over: over, turn: turn, winner: winner, legalWhite: legalMoves(HUMAN).length, legalBlack: legalMoves(AI).length };
      },
      legalMoves: function() { return legalMoves(turn); },
      play: function(move) { return placeHuman(move.r, move.c); },
      forceOutcome: function(side) {
        over = true;
        winner = side === 'white' ? HUMAN : side === 'black' ? AI : null;
        statusEl.textContent = side === 'white' ? 'Info: Game over: White wins.' : side === 'black' ? 'Info: Game over: Black wins.' : 'Info: Game over: Draw.';
      }
    };

    function resize(){
      var safety=60;
      var controlsH=controls ? controls.offsetHeight + 16 : 0;
      var maxW=(typeof window.innerWidth==='number' && isFinite(window.innerWidth)) ? window.innerWidth - 16 : 512;
      var maxH=(typeof window.innerHeight==='number' && isFinite(window.innerHeight)) ? window.innerHeight - controlsH - safety : 512;
      var size=Math.max(128, Math.floor(Math.min(maxW, maxH)));
      if(controls){
        var testWidth=Math.floor(size*0.9);
        controls.style.width=testWidth+'px';
        controls.style.fontSize=Math.max(10, Math.round(size*0.033))+'px';
        controls.style.boxSizing='border-box';
        controls.style.textAlign='center';
        controlsH=controls.offsetHeight + 16;
        maxH=(typeof window.innerHeight==='number' && isFinite(window.innerHeight)) ? window.innerHeight - controlsH - safety : 512;
        size=Math.max(128, Math.floor(Math.min(maxW, maxH)));
      }
      var freeW=Math.max(0, maxW - size);
      boardSize=size;
      canvas.width=size;
      canvas.height=size;
      canvas.style.marginLeft=(8 + Math.floor(freeW/2)) + 'px';
      canvas.style.marginRight=(8 + Math.ceil(freeW/2)) + 'px';
      canvas.style.marginTop='8px';
      canvas.style.marginBottom='8px';
      if(controls){
        var controlsWidth=Math.floor(size*0.9);
        var sideGap=size-controlsWidth;
        controls.style.width=controlsWidth + 'px';
        controls.style.fontSize=Math.max(10, Math.round(size*0.033))+'px';
        controls.style.marginLeft=(8 + Math.floor(freeW/2) + Math.floor(sideGap/2)) + 'px';
        controls.style.marginRight=(8 + Math.ceil(freeW/2) + Math.ceil(sideGap/2)) + 'px';
        controls.style.marginTop='0px';
        controls.style.marginBottom='8px';
      }
      pad=0;
      cell=size/N;
      draw();
    }

    function updatePreview(){
      if(!previewEnabled || over || turn!==AI || aiBusy){ previewMove=null; return; }
      previewMove=chooseAiMoveAtDepth(clamp(depthInput.value,1,9)|0);
    }

    function bind(){
      document.getElementById('resetBtn').addEventListener('click', resetGame);
      document.getElementById('takebackBtn').addEventListener('click', takeBack);
      canvas.addEventListener('click', click);
      if(window.addEventListener) window.addEventListener('resize', resize);
      depthInput.addEventListener('change', function(){ save('dom_depth', depthInput.value); updatePreview(); draw(); });
      clumsyInput.addEventListener('change', function(){ save('dom_clumsy', clumsyInput.value); updatePreview(); draw(); });
      previewBtn.addEventListener('click', function(){
        previewEnabled=!previewEnabled;
        save('dom_preview', previewEnabled ? '1' : '0');
        previewBtn.className=previewEnabled ? 'is-on' : '';
        updatePreview();
        draw();
      });
    }

    function boot(){
      var d=load('dom_depth'), c=load('dom_clumsy'), p=load('dom_preview');
      if(d!==null) depthInput.value=d;
      if(c!==null) clumsyInput.value=c;
      previewEnabled=(p==='1');
      previewBtn.className=previewEnabled ? 'is-on' : '';
      bind();
      resetState();
      resize();
      refresh();
      if(previewEnabled) updatePreview();
      refresh();
      scheduleAI();
    }

    boot();
  })();
  </script>
</body>
</html>
