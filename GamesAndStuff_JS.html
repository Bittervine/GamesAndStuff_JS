<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games And Stuff</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --panel: rgba(15, 23, 42, 0.82);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #f59e0b;
      --accent-2: #22c55e;
      --shadow: rgba(2, 6, 23, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(245, 158, 11, 0.2), transparent 30%),
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.22), transparent 28%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
    }

    .wrap {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.2rem, 4vw, 3.8rem);
      line-height: 1.05;
    }

    .intro {
      margin: 0 0 28px;
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .game-link {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      padding: 20px;
      border-radius: 24px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.08));
      color: var(--text);
      text-decoration: none;
      text-align: center;
      font-size: clamp(1.35rem, 2.4vw, 1.95rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      box-shadow: 0 20px 32px var(--shadow);
      transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
      backdrop-filter: blur(8px);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .game-link:nth-child(odd) {
      border-color: rgba(245, 158, 11, 0.45);
    }

    .game-link:nth-child(even) {
      border-color: rgba(34, 197, 94, 0.45);
    }

    .game-link:hover,
    .game-link:focus-visible {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 24px 36px rgba(2, 6, 23, 0.48);
      outline: none;
    }

    .game-link:active {
      transform: translateY(1px) scale(0.99);
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100% - 20px, 700px);
        padding-top: 20px;
      }

      .grid {
        gap: 14px;
      }

      .game-link {
        min-height: 96px;
        font-size: 1.4rem;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Games And Stuff</h1>
    <p class="intro">Choose a game to launch.</p>

    <section class="grid" aria-label="Game launcher">
      <a class="game-link" href="Chess_JS/Chess_JS.html">Chess</a>
      <a class="game-link" href="Mandelbrot_JS/Mandelbrot_JS.html">Mandelbrot</a>
      <a class="game-link" href="NaughtAndCrosses_JS/NaughtsAndCrosses_JS.html">Naught And Crosses</a>
      <a class="game-link" href="Ranger2_JS/Ranger2_JS.html">Ranger 2</a>
      <a class="game-link" href="Rogue_JS/Rogue_JS.html">Rogue</a>
      <a class="game-link" href="Tetris_JS/Tetris_JS.html">Tetris</a>
    </section>
  </main>
</body>
</html>
