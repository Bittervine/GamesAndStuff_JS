<!doctype html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no'>
<meta name='theme-color' content='#0f1f2b'>
<title>Reader JS</title>
<style>
html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background: #e8e2d4;
  color: #1f1a13;
  font-family: "Segoe UI", Tahoma, Arial, sans-serif;
}

body.theme-inverted {
  background: #090b0e;
  color: #ece7df;
}

* {
  box-sizing: border-box;
}

#bookFileInput {
  position: absolute;
  left: -9999px;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}

.app-shell {
  display: -ms-flexbox;
  display: flex;
  -ms-flex-direction: column;
  flex-direction: column;
  width: 100%;
  height: 100%;
}

.top-menu {
  display: -ms-flexbox;
  display: flex;
  -ms-flex-align: stretch;
  align-items: stretch;
  -ms-flex-pack: justify;
  justify-content: space-between;
  -ms-flex-wrap: wrap;
  flex-wrap: wrap;
  gap: 8px;
  padding: 8px 10px;
  border-bottom: 1px solid #b8ab92;
  background: #f7f1e4;
}

body.theme-inverted .top-menu {
  background: #121820;
  border-bottom-color: #304152;
}

.menu-group {
  display: -ms-flexbox;
  display: flex;
  -ms-flex-align: center;
  align-items: center;
  gap: 6px;
  min-width: 0;
}

.title-group {
  -ms-flex: 1 1 auto;
  flex: 1 1 auto;
  display: block;
}

.groupbox {
  display: -ms-flexbox;
  display: flex;
  -ms-flex-align: center;
  align-items: center;
  gap: 6px;
  min-width: 0;
  border: 1px solid #c7d2dc;
  border-radius: 8px;
  padding: 6px 8px;
  background: rgba(255, 255, 255, 0.72);
  min-height: 44px;
  box-sizing: border-box;
  align-self: stretch;
}

.groupbox legend {
  padding: 0 4px;
  font-size: 12px;
  color: #4a4a4a;
}

.groupbox.book-group,
.groupbox.chapter-group,
.groupbox.action-group {
  -ms-flex-wrap: nowrap;
  flex-wrap: nowrap;
}

.groupbox.title-group {
  -ms-flex: 1 1 auto;
  flex: 1 1 auto;
  align-items: center;
  justify-content: center;
}

.groupbox.title-group .book-title {
  white-space: nowrap;
}

.groupbox.action-group {
  -ms-flex-pack: start;
  justify-content: flex-start;
}

.menu-button {
  border: 1px solid #6a7e8f;
  background: #dbe7ef;
  color: #1b232b;
  border-radius: 6px;
  cursor: pointer;
  padding: 6px 10px;
  font-family: inherit;
  font-size: 14px;
  line-height: 1.2;
}

.menu-button.secondary {
  background: #ece7dd;
  border-color: #a99777;
}
.menu-button.toggle-on {
  background: #cfd9e2;
  border-color: #5b7387;
  box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.35);
  transform: translateY(1px);
}

.menu-button:disabled {
  opacity: 0.5;
  cursor: default;
}

.menu-select {
  border: 1px solid #6a7e8f;
  background: #fff;
  color: #111;
  border-radius: 4px;
  font-family: inherit;
  font-size: 12px;
  padding: 0 6px;
  height: 32px;
  box-sizing: border-box;
}

.menu-select.secondary {
  background: #ece7dd;
  border-color: #a99777;
}

body.theme-inverted .menu-button {
  background: #2d3d4c;
  color: #e5edf4;
  border-color: #4c6378;
}

body.theme-inverted .menu-button.secondary {
  background: #23303d;
  border-color: #4f677f;
}
body.theme-inverted .menu-button.toggle-on {
  background: #1b2733;
  border-color: #7595b5;
  box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
}

.book-title {
  display: block;
  font-size: 15px;
  font-weight: 600;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.book-author {
  display: block;
  font-size: 12px;
  line-height: 1.2;
  color: #5b5449;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

body.theme-inverted .book-author {
  color: #bbc5cf;
}

.status-strip {
  display: -ms-flexbox;
  display: flex;
  -ms-flex-align: center;
  align-items: center;
  -ms-flex-pack: justify;
  justify-content: space-between;
  gap: 8px;
  padding: 6px 10px;
  border-bottom: 1px solid #b8ab92;
  background: #f7f1e4;
  color: #4b4438;
  font-size: 12px;
}

body.theme-inverted .status-strip {
  background: #121820;
  border-bottom-color: #304152;
  color: #c9d2db;
}

.status-strip span {
  -ms-flex: 1 1 0;
  flex: 1 1 0;
  min-width: 0;
}

.status-strip span:nth-child(2) {
  text-align: center;
}

.status-strip span:nth-child(3) {
  text-align: right;
}

.reader-viewport {
  -ms-flex: 1 1 auto;
  flex: 1 1 auto;
  min-height: 0;
  width: 100%;
  overflow: hidden;
  position: relative;
  background: #fdfcf8;
}

.reader-tap-overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  background: transparent;
  touch-action: manipulation;
}

body.theme-inverted .reader-viewport {
  background: #10161d;
}

.legacy-reader-root {
  width: 100%;
  height: 100%;
}

.settings-dialog {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  left: 0;
  display: none;
  background: rgba(8, 10, 14, 0.45);
  z-index: 40;
}

.settings-dialog.is-open {
  display: block;
}

.book-file-input {
  position: absolute;
  left: -9999px;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}

.book-name-input {
  width: min(40vw, 260px);
  max-width: 100%;
  padding: 6px 8px;
  border: 1px solid #6a7e8f;
  border-radius: 6px;
  font: inherit;
}

.settings-panel {
  width: 96%;
  max-width: 460px;
  margin: 4vh auto;
  padding: 14px;
  border: 1px solid #9e8f72;
  border-radius: 10px;
  background: #faf4e9;
  color: #1f1a13;
  display: block;
}

body.theme-inverted .settings-panel {
  background: #1a212b;
  border-color: #415364;
  color: #ece7df;
}

.settings-panel h2 {
  margin: 0 0 10px;
  font-size: 20px;
  line-height: 1.2;
}

.settings-panel label {
  display: block;
  font-size: 13px;
  margin-bottom: 10px;
}

.settings-panel select,
.settings-panel input[type="range"] {
  width: 100%;
  margin-top: 4px;
}

.settings-panel select {
  padding: 5px;
  border: 1px solid #a89a82;
  border-radius: 5px;
  font-family: inherit;
  font-size: 14px;
  background: #fff;
  color: #1f1a13;
}

body.theme-inverted .settings-panel select {
  background: #121820;
  color: #ece7df;
  border-color: #4d5f72;
}

.settings-panel output {
  display: inline-block;
  margin-top: 4px;
  font-size: 12px;
}

.checkbox-row {
  display: -ms-flexbox;
  display: flex;
  -ms-flex-align: center;
  align-items: center;
  gap: 8px;
}

.settings-actions {
  display: -ms-flexbox;
  display: flex;
  -ms-flex-pack: end;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 8px;
}

@media (max-width: 820px) {
  .menu-group {
    width: 100%;
  }

  .title-group {
    -ms-flex-order: -1;
    order: -1;
  }

  .book-title,
  .book-author {
    white-space: normal;
  }

  .status-strip {
    display: block;
  }

  .status-strip span {
    display: block;
    text-align: left;
    margin-bottom: 3px;
  }
}

</style>
</head>
<body>
<div class='app-shell'>
<header class='top-menu'>
<fieldset class='groupbox book-group'>
<legend>Book</legend>
<select id='bookSourceSelect' class='menu-select'></select>
<button id='loadBookButton' class='menu-button'>Load</button>
<button id='saveBookButton' class='menu-button secondary'>Save</button>
<input id='bookFileInput' class='book-file-input' type='file'>
</fieldset>
<fieldset class='groupbox chapter-group'>
<legend>Chapter</legend>
<button id='previousChapterButton' class='menu-button secondary' title='Previous'>Last Chapter</button>
<button id='nextChapterButton' class='menu-button secondary' title='Next'>Next Chapter</button>
</fieldset>
<fieldset class='groupbox title-group'>
<legend>Title:</legend>
<span id='bookTitle' class='book-title'>No book loaded</span><span id='bookAuthor' class='book-author'></span>
</fieldset>
<fieldset class='groupbox action-group'>
<legend>Misc</legend>
<button id='autoAdvanceButton' class='menu-button secondary' title='Toggle automatic advancement'>Autoscroll</button>
<button id='settingsButton' class='menu-button'>Settings</button>
</fieldset>
</header>
<div class='status-strip'><span id='chapterStatus'>Chapter -</span><span id='progressStatus'>Progress 0%</span><span id='modeStatus'>Scroll mode: Page</span></div>
<div id='readerViewport' class='reader-viewport' aria-label='Book content'></div>
</div>
<div id='settingsDialog' class='settings-dialog' aria-hidden='true'>
<form id='settingsForm' class='settings-panel' action='#'>
<h2>Reader Settings</h2>
<label>Font Family<select id='fontFamilyInput'><option value="'Palatino Linotype', Palatino, 'Times New Roman', serif">Palatino</option><option value="Georgia, 'Times New Roman', serif">Georgia</option><option value="'Times New Roman', Times, serif">Times New Roman</option><option value="'Trebuchet MS', Arial, sans-serif">Trebuchet</option><option value="'Segoe UI', Tahoma, Arial, sans-serif">Segoe UI</option><option value='Arial, Helvetica, sans-serif'>Arial</option></select></label>
<label>Font Size (px)<input id='fontSizeInput' type='range' min='12' max='42' step='1'><output id='fontSizeOutput' for='fontSizeInput'></output></label>
<label>Font Boldness<input id='fontWeightInput' type='range' min='100' max='900' step='100'><output id='fontWeightOutput' for='fontWeightInput'></output></label>
<label>Line Height<input id='lineHeightInput' type='range' min='1.2' max='2.2' step='0.05'><output id='lineHeightOutput' for='lineHeightInput'></output></label>
<label><span>Smooth Scroll Mode</span><select id='scrollModeInput'><option value='page'>Page</option><option value='line'>Line-by-line</option><option value='pixel'>Pixel-by-pixel</option></select></label>
<label>Lines Per Advance<input id='lineStepInput' type='range' min='1' max='12' step='1'><output id='lineStepOutput' for='lineStepInput'></output></label>
<label>Scroll Duration (ms)<input id='scrollDurationInput' type='range' min='0' max='100' step='1'><output id='scrollDurationOutput' for='scrollDurationInput'></output></label>
<label>Tap Advance Region (%)<input id='tapRegionInput' type='range' min='8' max='45' step='1'><output id='tapRegionOutput' for='tapRegionInput'></output></label>
<label class='checkbox-row'><input id='invertModeInput' type='checkbox'>Invert Colors</label>
<div class='settings-actions'><button type='button' id='resetSettingsButton' class='menu-button secondary'>Reset</button><button type='button' id='cancelSettingsButton' class='menu-button secondary'>Close</button><button type='submit' id='saveSettingsButton' class='menu-button'>Save</button></div>
</form>
</div>
