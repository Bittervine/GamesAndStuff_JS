        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #ffffff;
            color: #111111;
            font-family: Georgia, "Times New Roman", serif;
            -webkit-text-size-adjust: 100%;
            overflow: hidden;
        }

        #wrap {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 8px;
            gap: 6px;
        }

        #boardWrap {
            flex: 0 0 auto;
            border: 0;
            background: transparent;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game {
            display: block;
            background: #e8dcc0;
            image-rendering: pixelated;
            touch-action: manipulation;
            max-width: 100%;
            max-height: 100%;
        }

        #controlPanel {
            flex: 0 0 auto;
            width: 100%;
            max-width: 100%;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-wrap: nowrap;
            white-space: nowrap;
        }

        .moveGrid {
            width: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 3px;
        }

        #upBtn {
            grid-column: 2;
            grid-row: 1;
        }

        #leftBtn {
            grid-column: 1;
            grid-row: 2;
        }

        #rightBtn {
            grid-column: 3;
            grid-row: 2;
        }

        #downBtn {
            grid-column: 2;
            grid-row: 3;
        }

        button {
            border: 1px solid #111111;
            border-radius: 4px;
            background: #f4f4f4;
            color: #111111;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 12px;
            font-weight: bold;
            padding: 3px 6px;
            cursor: pointer;
        }

        button:active {
            transform: translateY(1px);
        }

        .moveBtn {
            background: #f2f2f2;
            font-size: 14px;
            padding: 0;
            line-height: 1;
            min-height: 28px;
            min-width: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .moveBtn .btnInner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
        }

        .moveBtn .btnIcon {
            font-family: 'Segoe UI Symbol', serif;
            font-size: 14px;
            line-height: 1;
        }

        .moveBtn .btnText {
            font-size: 9px;
            line-height: 1;
        }

        .spacer {
            width: 0.9em;
            height: 1px;
            flex: 0 0 auto;
        }

        .undoGlyph {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
        }

        #messageText {
            font-size: 12px;
            line-height: 1.2;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <div id="boardWrap">
            <canvas id="game" width="320" height="320"></canvas>
        </div>

        <div id="controlPanel">
            <div class="row">
                <span>Difficulty:</span>
                <button type="button" id="diff1Btn">1</button>
                <button type="button" id="diff2Btn">2</button>
                <button type="button" id="diff3Btn">3</button>
                <button type="button" id="diff4Btn">4</button>
                <button type="button" id="diff5Btn">5</button>
                <div class="spacer"></div>
                <button type="button" id="upBtn" class="moveBtn" title="Up"><span class="btnInner"><span class="btnIcon">&#x2B06;</span></span></button>
                <button type="button" id="leftBtn" class="moveBtn" title="Left"><span class="btnInner"><span class="btnIcon">&#x2B05;</span></span></button>
                <button type="button" id="rightBtn" class="moveBtn" title="Right"><span class="btnInner"><span class="btnIcon">&#x27A1;</span></span></button>
                <button type="button" id="downBtn" class="moveBtn" title="Down"><span class="btnInner"><span class="btnIcon">&#x2B07;</span></span></button>
                <div class="spacer"></div>
                <button type="button" id="undoBtn" class="undoGlyph" title="Undo">&#x232B;</button>
            </div>
            <div id="messageText">Pick a difficulty to generate a level.</div>
        </div>
    </div>

                var fontText = ICON.wizardNeutral + ICON.brick;

                function finish() {
                    if (finished) {
                        return;
                    }
                    finished = true;
                    if (timeoutId) {
                        window.clearTimeout(timeoutId);
                    }
                    done();
                }

                if (!document.fonts || !document.fonts.load) {
                    finish();
                    return;
                }

                try {
                    if (document.fonts.check && document.fonts.check('16px "SokobanGlyphs"', fontText)) {
                        finish();
                        return;
                    }
                } catch (errCheck) {
                    // Continue into async load fallback.
                }

                timeoutId = window.setTimeout(function () {
                    finish();
                }, 3000);

                try {
                    document.fonts.load('16px "SokobanGlyphs"', fontText).then(function () {
                        finish();
                    }, function () {
                        finish();
                    });
                } catch (errLoad) {
                    finish();
                }
            }

            function bindUI() {
                document.getElementById('diff1Btn').onclick = function () {
                    generateDifficulty('diff1');
                };
                document.getElementById('diff2Btn').onclick = function () {
                    generateDifficulty('diff2');
                };
                document.getElementById('diff3Btn').onclick = function () {
                    generateDifficulty('diff3');
                };
                document.getElementById('diff4Btn').onclick = function () {
                    generateDifficulty('diff4');
                };
                document.getElementById('diff5Btn').onclick = function () {
                    generateDifficulty('diff5');
                };

                document.getElementById('undoBtn').onclick = function () {
                    undoMove();
                };

                document.getElementById('upBtn').onclick = function () {
                    attemptMove(0, -1);
                };
                document.getElementById('downBtn').onclick = function () {
                    attemptMove(0, 1);
                };
                document.getElementById('leftBtn').onclick = function () {
                    attemptMove(-1, 0);
                };
                document.getElementById('rightBtn').onclick = function () {
                    attemptMove(1, 0);
                };

                canvas.addEventListener('click', onBoardClick);
                document.onkeydown = function (e) {
                    e = e || window.event;
                    var key = e.keyCode || e.which;
                    if (key === 8 || key === 85) {
                        undoMove();
                        return cancelEvent(e);
                    }
                    if (key === 37 || key === 65) {
                        attemptMove(-1, 0);
                        return cancelEvent(e);
                    }
                    if (key === 38 || key === 87) {
                        attemptMove(0, -1);
                        return cancelEvent(e);
                    }
                    if (key === 39 || key === 68) {
                        attemptMove(1, 0);
                        return cancelEvent(e);
                    }
                    if (key === 40 || key === 83) {
                        attemptMove(0, 1);
                        return cancelEvent(e);
                    }
                    return true;
                };
            }

            function onBoardClick(e) {
                var rect;
                var x;
                var y;
                var gx;
                var gy;
                var boxIdx;
                var dx;
                var dy;
                var target;

                if (!state.map || state.solved) {
                    return;
                }

                rect = canvas.getBoundingClientRect();
                x = (e.clientX - rect.left) * (canvas.width / rect.width);
                y = (e.clientY - rect.top) * (canvas.height / rect.height);
                gx = Math.floor(x / currentCell);
                gy = Math.floor(y / currentCell);
                if (gx < 0 || gy < 0 || gy >= state.map.length || gx >= state.map[0].length) {
                    return;
                }
                if (handlePadClick(gx, gy)) {
                    return cancelEvent(e);
                }
                if (isWall(state.map, gx, gy)) {
                    return;
                }

                boxIdx = boxIndexAt(state.boxes, gx, gy);
                if (boxIdx >= 0) {
                    dx = gx - state.player.x;
                    dy = gy - state.player.y;
                    if (Math.abs(dx) + Math.abs(dy) !== 1) {
                        return;
                    }
                    target = { x: gx + dx, y: gy + dy };
                    if (isWall(state.map, target.x, target.y) || boxIndexAt(state.boxes, target.x, target.y) >= 0) {
                        return;
                    }
                    attemptMove(dx, dy);
                    return;
                }

                if (gx === state.player.x && gy === state.player.y) {
                    return;
                }
                movePlayerToClickedCell(gx, gy);
            }

            function movePlayerToClickedCell(targetX, targetY) {
                var path = findPathWithoutPushing(state.player.x, state.player.y, targetX, targetY);
                var i;
                if (!path || path.length < 2) {
                    return;
                }
                for (i = 1; i < path.length; i = i + 1) {
                    attemptMove(path[i].x - state.player.x, path[i].y - state.player.y);
                    if (state.solved || state.player.x === targetX && state.player.y === targetY) {
                        return;
                    }
                }
            }

            function findPathWithoutPushing(startX, startY, targetX, targetY) {
                var width = state.map[0].length;
                var height = state.map.length;
                var visited = [];
                var queue = [];
                var head = 0;
                var dirs = [
                    { x: 0, y: -1 },
                    { x: 1, y: 0 },
                    { x: 0, y: 1 },
                    { x: -1, y: 0 }
                ];
                var i;
                var cur;
                var nx;
                var ny;
                var key;
                var parentKey;

                for (i = 0; i < height; i = i + 1) {
                    visited[i] = [];
                }

                queue.push({ x: startX, y: startY, path: [{ x: startX, y: startY }] });
                visited[startY][startX] = true;

                while (head < queue.length) {
                    cur = queue[head];
                    head = head + 1;
                    if (cur.x === targetX && cur.y === targetY) {
                        return cur.path;
                    }
                    for (i = 0; i < dirs.length; i = i + 1) {
                        nx = cur.x + dirs[i].x;
                        ny = cur.y + dirs[i].y;
                        if (nx < 0 || ny < 0 || nx >= width || ny >= height) {
                            continue;
                        }
                        if (visited[ny][nx]) {
                            continue;
                        }
                        if (isWall(state.map, nx, ny) || boxIndexAt(state.boxes, nx, ny) >= 0) {
                            continue;
                        }
                        visited[ny][nx] = true;
                        parentKey = cur.path.slice(0);
                        parentKey.push({ x: nx, y: ny });
                        queue.push({ x: nx, y: ny, path: parentKey });
                    }
                }

                return null;
            }

            function cancelEvent(e) {
                if (e.preventDefault) {
                    e.preventDefault();
                }
                e.returnValue = false;
                return false;
            }

            function generateDifficulty(id) {
                var spec = DIFFICULTY[id] || DIFFICULTY.diff3;
                pendingDifficultyId = spec.id;
                if (!glyphFontReady) {
                    state.difficulty = spec;
                    announce('Loading wizard glyphs...');
                    updateHud();
                    return;
                }
                state.difficulty = spec;
                state.message = 'Generating ' + spec.name + ' level...';
                updateHud();
                render();
                window.setTimeout(function () {
                    var level = generateLevel(spec);
                    if (!level) {
                        level = fallbackLevel(spec);
                        level.fallback = true;
                    }
                    loadLevel(spec, level);
                }, 10);
            }

            function loadLevel(spec, level) {
                state.map = level.map;
                state.goals = clonePoints(level.goals);
                state.goalsLookup = pointsLookup(state.goals);
                state.deadLookup = computeDeadLookup(state.map, state.goalsLookup);
                state.boxes = clonePoints(level.boxes);
                state.player = { x: level.player.x, y: level.player.y };
                state.initial = {
                    boxes: clonePoints(state.boxes),
                    player: { x: state.player.x, y: state.player.y }
                };
                state.moves = 0;
                state.pushes = 0;
                state.solved = false;
                state.history = [];
                state.generatorAttempts = level.attempt || 1;
                state.solverPushEstimate = level.solvePushes || 0;
                if (level.fallback) {
                    announce('Generator fallback used. Level is still solvable.');
                } else {
                    announce(spec.name + ' level generated.');
                }
                resizeBoard();
                updateHud();
                render();
            }

            function restartLevel() {
                if (!state.map || !state.initial) {
                    return;
                }
                state.boxes = clonePoints(state.initial.boxes);
                state.player = { x: state.initial.player.x, y: state.initial.player.y };
                state.moves = 0;
                state.pushes = 0;
                state.solved = false;
                state.history = [];
                announce('Level restarted.');
                updateHud();
                render();
            }

            function undoMove() {
                if (!state.history || state.history.length === 0) {
                    announce('Nothing to undo.');
                    return;
                }
                var snap = state.history.pop();
                state.player.x = snap.player.x;
                state.player.y = snap.player.y;
                state.boxes = clonePoints(snap.boxes);
                state.moves = snap.moves;
                state.pushes = snap.pushes;
                state.solved = false;
                announce('Undo.');
                updateHud();
                render();
            }

            function attemptMove(dx, dy) {
                if (!state.map) {
                    return;
                }
                if (state.solved) {
                    announce('Solved. Generating a new ' + state.difficulty.name + ' level...');
                    updateHud();
                    render();
                    generateDifficulty(state.difficulty.id);
                    return;
                }

                var tx = state.player.x + dx;
                var ty = state.player.y + dy;
                if (isWall(state.map, tx, ty)) {
                    announce('Blocked by wall.');
                    updateHud();
                    render();
                    return;
                }

                var boxIdx = boxIndexAt(state.boxes, tx, ty);
                pushHistorySnapshot();

                if (boxIdx >= 0) {
                    var bx = tx + dx;
                    var by = ty + dy;
                    if (isWall(state.map, bx, by) || boxIndexAt(state.boxes, bx, by) >= 0) {
                        state.history.pop();
                        announce('Box cannot be pushed there.');
                        updateHud();
                        render();
                        return;
                    }
                    state.boxes[boxIdx].x = bx;
                    state.boxes[boxIdx].y = by;
                    state.player.x = tx;
                    state.player.y = ty;
                    state.moves = state.moves + 1;
                    state.pushes = state.pushes + 1;
                    announce('Push.');
                } else {
                    state.player.x = tx;
                    state.player.y = ty;
                    state.moves = state.moves + 1;
                    announce('Move.');
                }

                if (isSolved()) {
                    state.solved = true;
                    announce('Solved in ' + state.moves + ' moves (' + state.pushes + ' pushes).');
                }

                updateHud();
                render();
            }

            function pushHistorySnapshot() {
                state.history.push({
                    player: { x: state.player.x, y: state.player.y },
                    boxes: clonePoints(state.boxes),
                    moves: state.moves,
                    pushes: state.pushes
                });
                if (state.history.length > 800) {
                    state.history.shift();
                }
            }

            function isSolved() {
                var i;
                for (i = 0; i < state.boxes.length; i = i + 1) {
                    if (!state.goalsLookup[keyFor(state.boxes[i].x, state.boxes[i].y)]) {
                        return false;
                    }
                }
                return true;
            }

            function boxesOnGoalsCount() {
                var i;
                var count = 0;
                for (i = 0; i < state.boxes.length; i = i + 1) {
                    if (state.goalsLookup[keyFor(state.boxes[i].x, state.boxes[i].y)]) {
                        count = count + 1;
                    }
                }
                return count;
            }

            function updateHud() {
                var solvedText = state.solved ? 'Solved' : 'Active';
                if (messageText) {
                    messageText.textContent = 'Moves: ' + state.moves + ' | ' + solvedText + ' | ' + state.message;
                }
            }

            function announce(text) {
                state.message = text;
            }

            function render() {
                if (!glyphFontReady || !state.map) {
                    return;
                }

                var h = state.map.length;
                var w = state.map[0].length;
                var x;
                var y;
                var px;
                var py;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (y = 0; y < h; y = y + 1) {
                    for (x = 0; x < w; x = x + 1) {
                        px = x * currentCell;
                        py = y * currentCell;
                        if (state.map[y][x] === WALL) {
                            drawWallCell(px, py, x, y);
                        } else {
                            drawFloorCell(px, py, state.goalsLookup[keyFor(x, y)] ? true : false);
                        }
                    }
                }

                drawBoxes();
                drawPlayer(state.player.x * currentCell, state.player.y * currentCell);
                drawDirectionPad(w, h);
            }

            function drawDirectionPad(boardWidth, boardHeight) {
                var startX = Math.max(0, boardWidth - PAD_SIZE);
                var startY = Math.max(0, boardHeight - PAD_SIZE);
                var x;
                var y;
                var px;
                var py;

                for (y = startY; y < boardHeight; y = y + 1) {
                    for (x = startX; x < boardWidth; x = x + 1) {
                        px = x * currentCell;
                        py = y * currentCell;
                        drawPadCell(px, py, x, y, boardWidth, boardHeight);
                    }
                }
            }

            function drawPadCell(px, py, gx, gy, boardWidth, boardHeight) {
                var action = padActionAt(gx, gy, boardWidth, boardHeight);
                var inner = Math.max(4, Math.floor(currentCell * 0.18));
                var x1 = px + inner;
                var y1 = py + inner;
                var x2 = px + currentCell - inner;
                var y2 = py + currentCell - inner;
                var cx = px + Math.floor(currentCell / 2);
                var cy = py + Math.floor(currentCell / 2);

                ctx.save();
                ctx.fillStyle = action ? PAD_FILL : PAD_FILL_LIGHT;
                ctx.fillRect(px, py, currentCell, currentCell);
                ctx.strokeStyle = PAD_STROKE;
                ctx.lineWidth = 2.5;
                ctx.strokeRect(px + 0.5, py + 0.5, currentCell - 1, currentCell - 1);

                if (gx === boardWidth - 2 && gy === boardHeight - 2) {
                    ctx.fillStyle = PAD_FILL_DARK;
                    ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
                }

                if (action === 'up') {
                    drawPadArrow(cx, cy, 'up');
                } else if (action === 'down') {
                    drawPadArrow(cx, cy, 'down');
                } else if (action === 'left') {
                    drawPadArrow(cx, cy, 'left');
                } else if (action === 'right') {
                    drawPadArrow(cx, cy, 'right');
                }

                ctx.restore();
            }

            function drawPadArrow(cx, cy, dir) {
                var size = Math.max(6, Math.floor(currentCell * 0.28));
                var shaft = Math.max(2, Math.floor(currentCell * 0.08));
                var half = Math.max(3, Math.floor(size / 2));

                ctx.save();
                ctx.fillStyle = PAD_ARROW;
                ctx.strokeStyle = PAD_ARROW;
                ctx.lineWidth = shaft;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();

                if (dir === 'up') {
                    ctx.moveTo(cx, cy - half);
                    ctx.lineTo(cx, cy + half);
                    ctx.moveTo(cx - half, cy - Math.floor(half * 0.2));
                    ctx.lineTo(cx, cy - half);
                    ctx.lineTo(cx + half, cy - Math.floor(half * 0.2));
                } else if (dir === 'down') {
                    ctx.moveTo(cx, cy - half);
                    ctx.lineTo(cx, cy + half);
                    ctx.moveTo(cx - half, cy + Math.floor(half * 0.2));
                    ctx.lineTo(cx, cy + half);
                    ctx.lineTo(cx + half, cy + Math.floor(half * 0.2));
                } else if (dir === 'left') {
                    ctx.moveTo(cx - half, cy);
                    ctx.lineTo(cx + half, cy);
                    ctx.moveTo(cx - Math.floor(half * 0.2), cy - half);
                    ctx.lineTo(cx - half, cy);
                    ctx.lineTo(cx - Math.floor(half * 0.2), cy + half);
                } else if (dir === 'right') {
                    ctx.moveTo(cx - half, cy);
                    ctx.lineTo(cx + half, cy);
                    ctx.moveTo(cx + Math.floor(half * 0.2), cy - half);
                    ctx.lineTo(cx + half, cy);
                    ctx.lineTo(cx + Math.floor(half * 0.2), cy + half);
                }

                ctx.stroke();
                ctx.fill();
                ctx.restore();
            }

            function handlePadClick(gx, gy) {
                var action = padActionAt(gx, gy, state.map[0].length, state.map.length);
                if (action === 'up') {
                    attemptMove(0, -1);
                    return true;
                }
                if (action === 'down') {
                    attemptMove(0, 1);
                    return true;
                }
                if (action === 'left') {
                    attemptMove(-1, 0);
                    return true;
                }
                if (action === 'right') {
                    attemptMove(1, 0);
                    return true;
                }
                return false;
            }

            function padActionAt(x, y, boardWidth, boardHeight) {
                var startX = Math.max(0, boardWidth - PAD_SIZE);
                var startY = Math.max(0, boardHeight - PAD_SIZE);
                if (x < startX || y < startY) {
                    return '';
                }
                if (x === startX + 1 && y === startY) {
                    return 'up';
                }
                if (x === startX && y === startY + 1) {
                    return 'left';
                }
                if (x === startX + 2 && y === startY + 1) {
                    return 'right';
                }
                if (x === startX + 1 && y === startY + 2) {
                    return 'down';
                }
                return '';
            }

            function drawFloorCell(px, py, isGoal) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(px, py, currentCell, currentCell);

                if (isGoal) {
                    var cx = px + Math.floor(currentCell / 2);
                    var cy = py + Math.floor(currentCell / 2);
                    ctx.save();
                    ctx.strokeStyle = '#5a3f1e';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(cx, cy, Math.floor(currentCell * 0.22), 0, Math.PI * 2, false);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(cx - Math.floor(currentCell * 0.18), cy);
                    ctx.lineTo(cx + Math.floor(currentCell * 0.18), cy);
                    ctx.moveTo(cx, cy - Math.floor(currentCell * 0.18));
                    ctx.lineTo(cx, cy + Math.floor(currentCell * 0.18));
                    ctx.stroke();
                    ctx.restore();
                }
            }

            function drawWallCell(px, py, gx, gy) {
                drawBrickCell(px, py, gx, gy);
            }

            function drawBoxes() {
                var i;
                var b;
                var px;
                var py;
                var onGoal;
                for (i = 0; i < state.boxes.length; i = i + 1) {
                    b = state.boxes[i];
                    px = b.x * currentCell;
                    py = b.y * currentCell;
                    onGoal = state.goalsLookup[keyFor(b.x, b.y)] ? true : false;
                    drawSingleBox(px, py, onGoal);
                }
            }

            function drawSingleBox(px, py, onGoal) {
                ctx.save();
                if (rockImage && rockImage.complete && rockImage.naturalWidth > 0) {
                    ctx.drawImage(rockImage, px, py, currentCell, currentCell);
                } else {
                    drawGlyph(ctx, cp(0x1FAA8), px + Math.floor(currentCell / 2), py + Math.floor(currentCell / 2) + 1, Math.floor(currentCell * 0.88), FONT_EMOJI, '#111111');
                }
                if (onGoal) {
                    ctx.strokeStyle = '#a88a4a';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(px + 2, py + 2, currentCell - 4, currentCell - 4);
                }
                ctx.restore();
            }

            function drawPlayer(px, py) {
                var cx = px + Math.floor(currentCell / 2);
                var cy = py + Math.floor(currentCell / 2);
                if (wizardImage && wizardImage.complete && wizardImage.naturalWidth > 0) {
                    ctx.drawImage(wizardImage, px, py, currentCell, currentCell);
                    return;
                }
                drawGlyph(ctx, ICON.wizard, cx, cy + 1, Math.floor(currentCell * 0.78), FONT_EMOJI, '#111111');
            }

            function drawGlyph(g, glyph, x, y, pixelSize, font, color) {
                g.save();
                g.font = 'bold ' + pixelSize + 'px ' + font;
                g.textAlign = 'center';
                g.textBaseline = 'middle';
                g.fillStyle = color;
                g.fillText(glyph, x, y);
                if (glyph === ICON.wizard) {
                    try {
                        if (!glyph || glyph.length === 0) {
                            g.fillText(ICON.wizardNeutral, x, y);
                        }
                    } catch (err) {
                        g.fillText(ICON.wizardNeutral, x, y);
                    }
                }
                g.restore();
            }

            function drawBrickCell(px, py, gx, gy) {
                if (isEnclosedWallCell(gx, gy, state.map)) {
                    ctx.fillStyle = '#d9d9d9';
                    ctx.fillRect(px, py, currentCell, currentCell);
                    return;
                }
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(px, py, currentCell, currentCell);
                if (brickImage && brickImage.complete && brickImage.naturalWidth > 0) {
                    ctx.drawImage(brickImage, px, py, currentCell, currentCell);
                    return;
                }
                var rowH = Math.max(3, Math.floor(currentCell / 4));
                var brickW = Math.max(6, Math.floor(currentCell / 2));
                var y1 = py + rowH;
                var y2 = py + (rowH * 2);
                var y3 = py + (rowH * 3);
                ctx.save();
                ctx.fillStyle = '#8f4f31';
                ctx.fillRect(px, py, currentCell, currentCell);
                ctx.strokeStyle = '#f2cab0';
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.62;
                ctx.beginPath();
                ctx.moveTo(px, y1);
                ctx.lineTo(px + currentCell, y1);
                ctx.moveTo(px, y2);
                ctx.lineTo(px + currentCell, y2);
                ctx.moveTo(px, y3);
                ctx.lineTo(px + currentCell, y3);

                ctx.moveTo(px + brickW, py);
                ctx.lineTo(px + brickW, y1);
                ctx.moveTo(px + Math.floor(brickW / 2), y1);
                ctx.lineTo(px + Math.floor(brickW / 2), y2);
                ctx.moveTo(px + Math.floor(brickW * 1.5), y1);
                ctx.lineTo(px + Math.floor(brickW * 1.5), y2);
                ctx.moveTo(px + brickW, y2);
                ctx.lineTo(px + brickW, y3);
                ctx.moveTo(px + Math.floor(brickW / 2), y3);
                ctx.lineTo(px + Math.floor(brickW / 2), py + currentCell);
                ctx.moveTo(px + Math.floor(brickW * 1.5), y3);
                ctx.lineTo(px + Math.floor(brickW * 1.5), py + currentCell);
                ctx.stroke();
                ctx.restore();
            }

            function resizeBoard() {
                if (!state.map) {
                    return;
                }
                var w = state.map[0].length;
                var h = state.map.length;
                var controlsHeight = controlPanel ? controlPanel.offsetHeight : 0;
                var maxW = (typeof window.innerWidth === 'number' && isFinite(window.innerWidth)) ? (window.innerWidth - 16) : (w * CELL);
                var maxH = (typeof window.innerHeight === 'number' && isFinite(window.innerHeight)) ? (window.innerHeight - controlsHeight - 24) : (h * CELL);
                currentCell = Math.max(16, Math.floor(Math.min(maxW / w, maxH / h)));
                canvas.width = Math.max(1, w * currentCell);
                canvas.height = Math.max(1, h * currentCell);
                canvas.style.width = canvas.width + 'px';
                canvas.style.height = canvas.height + 'px';
            }

            function generateLevel(spec) {
                var attempt;
                var map;
                var goals;
                var scramble;
                var actions;
                var finalized;

                for (attempt = 1; attempt <= spec.genAttempts; attempt = attempt + 1) {
                    map = generateMap(spec.width, spec.height, spec.wallCount);
                    if (!map) {
                        continue;
                    }

                    goals = pickGoals(map, spec.boxes);
                    if (!goals) {
                        continue;
                    }

                    scramble = reverseScrambleState(map, goals, spec);
                    if (!scramble) {
                        continue;
                    }

                    if (scramble.distance >= spec.minDistance) {
                        actions = invertReverseHistory(scramble.reverseHistory);
                        finalized = finalizeGeneratedLevel(spec, map, goals, scramble.boxes, scramble.player, attempt, actions, scramble.pulls);
                        if (finalized) {
                            return finalized;
                        }
                    }
                }

                return null;
            }

            function fallbackLevel(spec) {
                var wallCount = Math.max(2, Math.floor(spec.wallCount * 0.4));
                var attempt;
                var map;
                var goals;
                var scramble;
                var actions;
                var finalized;

                for (attempt = 1; attempt <= 500; attempt = attempt + 1) {
                    map = generateMap(spec.width, spec.height, wallCount);
                    goals = pickGoals(map, spec.boxes);
                    if (!goals) {

                    }
                    scramble = reverseScrambleState(map, goals, spec);
                    if (scramble) {
                        actions = invertReverseHistory(scramble.reverseHistory);
                        finalized = finalizeGeneratedLevel(spec, map, goals, scramble.boxes, scramble.player, attempt, actions, scramble.pulls);
                        if (finalized) {
                            return finalized;
                        }
                    }
                }

                return deterministicFallback(spec);
            }

            function reverseScrambleState(map, goals, spec) {
                var goalLookup = pointsLookup(goals);
                var boxes = clonePoints(goals);
                var player = pickPlayer(map, [], boxes);
                var targetPulls;
                var maxSteps;
                var steps;
                var pulls;
                var swaps;
                var prevBoxIndex;
                var seen = {};
                var moves;
                var chosen;
                var currentKey;
                var offGoals;
                var dist;
                var score;

                if (!player) {

                }

                normalizeBoxes(boxes);
                currentKey = stateKey(boxes, player);
                seen[currentKey] = true;

                targetPulls = randInt(spec.scrambleMin, spec.scrambleMax + 1);
                maxSteps = Math.max(targetPulls * 3, targetPulls + 20);
                pulls = 0;
                swaps = 0;

                    if (!chosen) {

                    }

                    player = chosen.nextPlayer;
                    pulls = pulls + 1;
                    if (chosen.boxIndex !== prevBoxIndex) {

                    }
                    prevBoxIndex = chosen.boxIndex;
                    seen[chosen.nextKey] = true;
                    reverseMove = {
                        standX: chosen.standX,
                        standY: chosen.standY,
                        destX: chosen.destX,
                        destY: chosen.destY,
                        boxFromX: chosen.boxX,
                        boxFromY: chosen.boxY,
                        dx: chosen.dx,
                        dy: chosen.dy
                    };
                    history.push(reverseMove);

                    offGoals = countOffGoals(boxes, goalLookup);
                    dist = chosen.distance;
                    score = (dist * 12) + (offGoals * 28) + pulls + (swaps * 3);

                    if (offGoals > 0 && pulls >= spec.scrambleMin) {
                        if (!best || score > best.score) {
                            best = {
                                boxes: clonePoints(boxes),
                                player: { x: player.x, y: player.y },
                                pulls: pulls,
                                score: score,
                                distance: dist,
                                reverseHistory: cloneMoves(history)
                            };
                        }
                    }

                    if (pulls >= targetPulls && best && steps > spec.scrambleMin) {
                        break;
                    }
                }

                if (!best) {

                }
                return best;
            }

            function listPullMoves(map, boxes, player) {
                var lookup = boxLookup(boxes);
                var reachable = reachableCells(map, player, lookup);
                var moves = [];
                var key;
                var parts;
                var px;
                var py;
                var di;
                var dx;
                var dy;
                var boxX;
                var boxY;
                var boxIndex;
                var destX;
                var destY;

                for (key in reachable) {
                    if (!reachable.hasOwnProperty(key)) {
                        continue;
                    }
                    parts = key.split('_');
                    px = parseInt(parts[0], 10);
                    py = parseInt(parts[1], 10);

                    for (di = 0; di < DIRS4.length; di = di + 1) {
                        dx = DIRS4[di].dx;
                        dy = DIRS4[di].dy;
                        boxX = px + dx;
                        boxY = py + dy;
                        boxIndex = boxIndexAt(boxes, boxX, boxY);
                        if (boxIndex < 0) {
                            continue;
                        }
                        destX = px - dx;
                        destY = py - dy;
                        if (isWall(map, destX, destY) || lookup[keyFor(destX, destY)]) {
                            continue;
                        }
                        moves.push({
                            standX: px,
                            standY: py,
                            destX: destX,
                            destY: destY,
                            boxIndex: boxIndex,
                            boxX: boxX,
                            boxY: boxY,
                            dx: dx,
                            dy: dy
                        });
                    }
                }

                return moves;
            }

            function choosePullMove(moves, boxes, player, goals, goalLookup, seen, prevBoxIndex) {
                var pool = moves.slice(0);
                var limit;
                var i;
                var m;
                var nextBoxes;
                var nextPlayer;
                var nextKey;
                var dist;
                var offGoals;
                var novelty;
                var swapBonus;
                var s;
                var best = null;
                var bestScore = -999999;

                shuffle(pool);
                limit = Math.min(pool.length, 36);

                for (i = 0; i < limit; i = i + 1) {
                    m = pool[i];
                    nextBoxes = clonePoints(boxes);
                    nextBoxes[m.boxIndex].x = m.standX;
                    nextBoxes[m.boxIndex].y = m.standY;
                    normalizeBoxes(nextBoxes);
                    nextPlayer = { x: m.destX, y: m.destY };
                    nextKey = stateKey(nextBoxes, nextPlayer);

                    dist = assignmentDistance(goals, nextBoxes);
                    offGoals = countOffGoals(nextBoxes, goalLookup);
                    novelty = seen[nextKey] ? 0 : 14;
                    swapBonus = m.boxIndex !== prevBoxIndex ? 4 : 0;
                    s = (dist * 12) + (offGoals * 28) + novelty + swapBonus + Math.random();

                    if (s > bestScore) {
                        bestScore = s;
                        best = {
                            boxIndex: m.boxIndex,
                            standX: m.standX,
                            standY: m.standY,
                            destX: m.destX,
                            destY: m.destY,
                            boxX: m.boxX,
                            boxY: m.boxY,
                            dx: m.dx,
                            dy: m.dy,
                            nextBoxes: nextBoxes,
                            nextPlayer: nextPlayer,
                            nextKey: nextKey,
                            distance: dist
                        };
                    }
                }

                return best;
            }

            function assignmentDistance(goals, boxes) {
                var used = [];
                var best = 999999;
                function dfs(boxIdx, total) {
                    var g;
                    var d;
                    if (boxIdx >= boxes.length) {
                        if (total < best) {
                            best = total;
                        }
                        return;
                    }
                    if (total >= best) {
                        return;
                    }
                    for (g = 0; g < goals.length; g = g + 1) {
                        if (used[g]) {
                            continue;
                        }
                        used[g] = true;
                        d = Math.abs(boxes[boxIdx].x - goals[g].x) + Math.abs(boxes[boxIdx].y - goals[g].y);
                        dfs(boxIdx + 1, total + d);
                        used[g] = false;
                    }
                }
                if (goals.length !== boxes.length || goals.length === 0) {
                    return 0;
                }
                dfs(0, 0);
                return best === 999999 ? 0 : best;
            }

            function countOffGoals(boxes, goalLookup) {
                var i;
                var n = 0;
                for (i = 0; i < boxes.length; i = i + 1) {
                    if (!goalLookup[keyFor(boxes[i].x, boxes[i].y)]) {
                        n = n + 1;
                    }
                }
                return n;
            }

            function deterministicFallback(spec) {
                var map = createBaseMap(spec.width, spec.height);
                var goals = [];
                var boxes = [];
                var i;
                var gxStart = 2;
                var gy = Math.floor(spec.height / 2);
                var player;
                var finalized;

                for (i = 0; i < spec.boxes; i = i + 1) {
                    goals.push({ x: gxStart + i * 2, y: gy + 1 });
                    boxes.push({ x: gxStart + i * 2, y: gy });
                }

                player = { x: gxStart - 1, y: gy };
                finalized = finalizeGeneratedLevel(spec, map, goals, boxes, player, 1, null, spec.boxes);
                if (finalized) {
                    return finalized;
                }

                return {
                    map: map,
                    goals: goals,
                    boxes: boxes,
                    player: player,
                    attempt: 1,
                    solvePushes: spec.boxes

            function finalizeGeneratedLevel(spec, map, goals, boxes, player, attempt, preferredActions, preferredPushes) {
                var goalLookup = pointsLookup(goals);
                var actions = preferredActions;
                var trace;
                var tightened;
                var checkAfter;
                var deadLookup;
                var solver;
                var boxStartLookup = pointsLookup(boxes);

                if (!actions || actions.length === 0) {
                    deadLookup = computeDeadLookup(map, goalLookup);
                    solver = solveLevel(map, goals, boxes, player, 120000, deadLookup, true);
                    if (!solver.solved || !solver.actions || solver.actions.length === 0) {
                        return null;
                    }
                    actions = solver.actions;
                }

                trace = traceWizardPathForActions(map, boxes, player, actions, goalLookup);
                if (!trace || !trace.solved) {
                    return null;
                }

                tightened = tightenMapByVisitedWizardCells(map, trace.visitedLookup, goalLookup, boxStartLookup);
                checkAfter = traceWizardPathForActions(tightened, boxes, player, actions, goalLookup);
                if (!checkAfter || !checkAfter.solved) {
                    return null;
                }

                return {
                    map: tightened,
                    goals: clonePoints(goals),
                    boxes: clonePoints(boxes),
                    player: { x: player.x, y: player.y },
                    attempt: attempt || 1,
                    solvePushes: preferredPushes || actions.length
                };
            }

            function invertReverseHistory(reverseHistory) {
                var out = [];
                var i;
                var m;
                if (!reverseHistory || reverseHistory.length === 0) {
                    return out;
                }
                for (i = reverseHistory.length - 1; i >= 0; i = i - 1) {
                    m = reverseHistory[i];
                    out.push({
                        boxX: m.standX,
                        boxY: m.standY,
                        dx: m.dx,
                        dy: m.dy,
                        pushFromX: m.destX,
                        pushFromY: m.destY,
                        targetX: m.boxFromX,
                        targetY: m.boxFromY
                    });
                }
                return out;
            }

            function traceWizardPathForActions(map, startBoxes, startPlayer, actions, goalLookup) {
                var boxes = clonePoints(startBoxes);
                var player = { x: startPlayer.x, y: startPlayer.y };
                var visitedLookup = {};
                var i;
                var a;
                var idx;
                var path;
                var j;
                var lookup;

                normalizeBoxes(boxes);
                visitedLookup[keyFor(player.x, player.y)] = true;

                for (i = 0; i < actions.length; i = i + 1) {
                    a = actions[i];
                    idx = boxIndexAt(boxes, a.boxX, a.boxY);
                    if (idx < 0) {
                        return null;
                    }
                    if (a.targetX !== a.boxX + a.dx || a.targetY !== a.boxY + a.dy) {
                        return null;
                    }
                    if (a.pushFromX !== a.boxX - a.dx || a.pushFromY !== a.boxY - a.dy) {
                        return null;
                    }
                    lookup = boxLookup(boxes);
                    path = findPathForWizard(map, player, { x: a.pushFromX, y: a.pushFromY }, lookup);
                    if (!path) {
                        return null;
                    }
                    for (j = 0; j < path.length; j = j + 1) {
                        visitedLookup[keyFor(path[j].x, path[j].y)] = true;
                    }
                    if (isWall(map, a.targetX, a.targetY) || (lookup[keyFor(a.targetX, a.targetY)] && !(a.targetX === a.boxX && a.targetY === a.boxY))) {
                        return null;
                    }
                    boxes[idx].x = a.targetX;
                    boxes[idx].y = a.targetY;
                    player = { x: a.boxX, y: a.boxY };
                    visitedLookup[keyFor(player.x, player.y)] = true;
                    normalizeBoxes(boxes);
                }

                return {
                    solved: allBoxesOnGoals(boxes, goalLookup),
                    visitedLookup: visitedLookup
                };
            }

            function findPathForWizard(map, from, to, boxLookupMap) {
                var startKey = keyFor(from.x, from.y);
                var goalKey = keyFor(to.x, to.y);
                var q = [];
                var head = 0;
                var parent = {};
                var visited = {};
                var i;
                var cur;
                var nx;
                var ny;
                var nk;
                var out;
                var walk;
                var parts;

                if (startKey === goalKey) {
                    return [{ x: from.x, y: from.y }];
                }
                if (boxLookupMap[goalKey] || isWall(map, to.x, to.y)) {
                    return null;
                }

                q.push({ x: from.x, y: from.y });
                visited[startKey] = true;

                while (head < q.length) {
                    cur = q[head];
                    head = head + 1;
                    for (i = 0; i < DIRS4.length; i = i + 1) {
                        nx = cur.x + DIRS4[i].dx;
                        ny = cur.y + DIRS4[i].dy;
                        nk = keyFor(nx, ny);
                        if (visited[nk] || isWall(map, nx, ny) || boxLookupMap[nk]) {
                            continue;
                        }
                        visited[nk] = true;
                        parent[nk] = keyFor(cur.x, cur.y);
                        if (nk === goalKey) {
                            out = [];
                            walk = nk;
                            while (walk) {
                                parts = walk.split('_');
                                out.push({ x: parseInt(parts[0], 10), y: parseInt(parts[1], 10) });
                                walk = parent[walk];
                            }
                            out.reverse();
                            return out;
                        }
                        q.push({ x: nx, y: ny });
                    }
                }

                return null;
            }

            function tightenMapByVisitedWizardCells(map, visitedLookup, goalLookup, boxStartLookup) {
                var out = cloneGrid(map);
                var y;
                var x;
                var k;
                for (y = 1; y < out.length - 1; y = y + 1) {
                    for (x = 1; x < out[0].length - 1; x = x + 1) {
                        if (out[y][x] === WALL) {
                            continue;
                        }
                        k = keyFor(x, y);
                        if (!visitedLookup[k] && !goalLookup[k] && !boxStartLookup[k]) {
                            out[y][x] = WALL;
                        }
                    }
                }
                return out;
            }

            function cloneGrid(map) {
                var out = [];
                var y;
                var x;
                for (y = 0; y < map.length; y = y + 1) {
                    out[y] = [];
                    for (x = 0; x < map[0].length; x = x + 1) {
                        out[y][x] = map[y][x];
                    }
                }
                return out;
            }

            function cloneMoves(moves) {
                var out = [];
                var i;
                var m;
                for (i = 0; i < moves.length; i = i + 1) {
                    m = moves[i];
                    out.push({
                        standX: m.standX,
                        standY: m.standY,
                        destX: m.destX,
                        destY: m.destY,
                        boxFromX: m.boxFromX,
                        boxFromY: m.boxFromY,
                        dx: m.dx,
                        dy: m.dy
                    });
                }
                return out;
            }

            function generateMap(width, height, wallCount) {
                var map = createBaseMap(width, height);
                var floorTotal = (width - 2) * (height - 2) - reservedFloorCellCount(width, height);
                var tries = wallCount * 14;
                var placed = 0;
                var x;
                var y;
                var old;
                var connected;
                var remaining;

                while (tries > 0 && placed < wallCount) {
                    tries = tries - 1;
                    x = randInt(1, width - 1);
                    y = randInt(1, height - 1);
                    if (map[y][x] === WALL) {
                        continue;
                    }

                    old = map[y][x];
                    map[y][x] = WALL;
                    remaining = floorTotal - 1;
                    connected = connectedFloorCount(map);
                    if (connected !== remaining || touchesTooManyWalls(map, x, y)) {
                        map[y][x] = old;
                    } else {
                        floorTotal = remaining;
                        placed = placed + 1;
                    }
                }

                if (floorTotal < 18) {
                    return null;
                }
                return map;
            }

            function touchesTooManyWalls(map, x, y) {
                var count = 0;
                var i;
                var nx;
                var ny;
                for (i = 0; i < DIRS4.length; i = i + 1) {
                    nx = x + DIRS4[i].dx;
                    ny = y + DIRS4[i].dy;
                    if (isWall(map, nx, ny)) {
                        count = count + 1;
                    }
                }
                return count >= 4;
            }

            function createBaseMap(width, height) {
                var map = [];
                var x;
                var y;
                for (y = 0; y < height; y = y + 1) {
                    map[y] = [];
                    for (x = 0; x < width; x = x + 1) {
                        if (x === 0 || y === 0 || x === width - 1 || y === height - 1 || isReservedBoardCell(x, y, width, height)) {
                            map[y][x] = WALL;
                        } else {
                            map[y][x] = FLOOR;
                        }
                    }
                }
                return map;
            }

            function connectedFloorCount(map) {
                var h = map.length;
                var w = map[0].length;
                var start = null;
                var x;
                var y;
                var q = [];
                var head = 0;
                var visited = {};
                var count = 0;
                var k;
                var i;
                var nx;
                var ny;

                for (y = 0; y < h && !start; y = y + 1) {
                    for (x = 0; x < w; x = x + 1) {
                        if (map[y][x] === FLOOR) {
                            start = { x: x, y: y };
                            break;
                        }
                    }
                }

                if (!start) {
                    return 0;
                }

                q.push(start);
                visited[keyFor(start.x, start.y)] = true;

                while (head < q.length) {
                    var cur = q[head];
                    head = head + 1;
                    count = count + 1;
                    for (i = 0; i < DIRS4.length; i = i + 1) {
                        nx = cur.x + DIRS4[i].dx;
                        ny = cur.y + DIRS4[i].dy;
                        if (isWall(map, nx, ny)) {
                            continue;
                        }
                        k = keyFor(nx, ny);
                        if (!visited[k]) {
                            visited[k] = true;
                            q.push({ x: nx, y: ny });
                        }
                    }
                }

                return count;
            }

            function pickGoals(map, count) {
                var dead = computeDeadLookup(map, {});
                var floor = listFloorCells(map);
                var candidates = [];
                var i;
                var p;

                for (i = 0; i < floor.length; i = i + 1) {
                    p = floor[i];
                    if (!dead[keyFor(p.x, p.y)]) {
                        candidates.push(p);
                    }
                }

                if (candidates.length < count) {
                    return null;
                }
                return pickRandomPoints(candidates, count);
            }

            function pickBoxes(map, count, goals, deadLookup) {
                var goalLookup = pointsLookup(goals);
                var floor = listFloorCells(map);
                var candidates = [];
                var i;
                var p;
                for (i = 0; i < floor.length; i = i + 1) {
                    p = floor[i];
                    if (!goalLookup[keyFor(p.x, p.y)] && !deadLookup[keyFor(p.x, p.y)]) {
                        candidates.push(p);
                    }
                }
                if (candidates.length < count) {
                    return null;
                }
                return pickRandomPoints(candidates, count);
            }

            function pickPlayer(map, goals, boxes) {
                var floor = listFloorCells(map);
                var blocked = pointsLookup(goals);
                var i;
                for (i = 0; i < boxes.length; i = i + 1) {
                    blocked[keyFor(boxes[i].x, boxes[i].y)] = true;
                }
                var choices = [];
                var p;
                for (i = 0; i < floor.length; i = i + 1) {
                    p = floor[i];
                    if (!blocked[keyFor(p.x, p.y)]) {
                        choices.push(p);
                    }
                }
                if (choices.length === 0) {
                    return null;
                }
                p = choices[randInt(0, choices.length)];
                return { x: p.x, y: p.y };
            }

            function solveLevel(map, goals, boxes, player, maxNodes, deadLookup, withPath) {
                var goalLookup = pointsLookup(goals);
                var queue = [];
                var head = 0;
                var visited = {};
                var startBoxes = clonePoints(boxes);
                normalizeBoxes(startBoxes);
                var startPlayer = { x: player.x, y: player.y };
                var startKey = stateKey(startBoxes, startPlayer);
                var nodes = 0;
                var reachable;
                var lookup;
                var s;
                var bi;
                var di;
                var box;
                var dx;
                var dy;
                var pushFromX;
                var pushFromY;
                var targetX;
                var targetY;
                var newBoxes;
                var newPlayer;
                var newKey;
                var actions;
                var at;
                var action;

                queue.push({ boxes: startBoxes, player: startPlayer, depth: 0, key: startKey });
                visited[startKey] = { prevKey: null, action: null };

                while (head < queue.length && nodes < maxNodes) {
                    s = queue[head];
                    head = head + 1;
                    nodes = nodes + 1;

                    if (allBoxesOnGoals(s.boxes, goalLookup)) {
                        if (!withPath) {
                            return { solved: true, pushes: s.depth, nodes: nodes };
                        }
                        actions = [];
                        at = s.key;
                        while (at && visited[at] && visited[at].prevKey !== null) {
                            actions.push(visited[at].action);
                            at = visited[at].prevKey;
                        }
                        actions.reverse();
                        return { solved: true, pushes: s.depth, nodes: nodes, actions: actions };
                    }

                    lookup = boxLookup(s.boxes);
                    reachable = reachableCells(map, s.player, lookup);

                    for (bi = 0; bi < s.boxes.length; bi = bi + 1) {
                        box = s.boxes[bi];
                        for (di = 0; di < DIRS4.length; di = di + 1) {
                            dx = DIRS4[di].dx;
                            dy = DIRS4[di].dy;
                            pushFromX = box.x - dx;
                            pushFromY = box.y - dy;
                            targetX = box.x + dx;
                            targetY = box.y + dy;

                            if (!reachable[keyFor(pushFromX, pushFromY)]) {
                                continue;
                            }
                            if (isWall(map, targetX, targetY) || lookup[keyFor(targetX, targetY)]) {
                                continue;
                            }
                            if (deadLookup[keyFor(targetX, targetY)] && !goalLookup[keyFor(targetX, targetY)]) {
                                continue;
                            }

                            newBoxes = clonePoints(s.boxes);
                            newBoxes[bi].x = targetX;
                            newBoxes[bi].y = targetY;
                            normalizeBoxes(newBoxes);
                            newPlayer = { x: box.x, y: box.y };
                            newKey = stateKey(newBoxes, newPlayer);
                            if (!visited[newKey]) {
                                action = {
                                    boxX: box.x,
                                    boxY: box.y,
                                    dx: dx,
                                    dy: dy,
                                    pushFromX: pushFromX,
                                    pushFromY: pushFromY,
                                    targetX: targetX,
                                    targetY: targetY
                                };
                                visited[newKey] = { prevKey: s.key, action: action };
                                queue.push({ boxes: newBoxes, player: newPlayer, depth: s.depth + 1, key: newKey });
                            }
                        }
                    }
                }

                return { solved: false, pushes: 0, nodes: nodes, actions: [] };
            }

            function reachableCells(map, player, boxLookupMap) {
                var q = [];
                var head = 0;
                var visited = {};
                var i;
                var nx;
                var ny;
                var k;
                var c;

                q.push({ x: player.x, y: player.y });
                visited[keyFor(player.x, player.y)] = true;

                while (head < q.length) {
                    c = q[head];
                    head = head + 1;
                    for (i = 0; i < DIRS4.length; i = i + 1) {
                        nx = c.x + DIRS4[i].dx;
                        ny = c.y + DIRS4[i].dy;
                        k = keyFor(nx, ny);
                        if (visited[k] || isWall(map, nx, ny) || boxLookupMap[k]) {
                            continue;
                        }
                        visited[k] = true;
                        q.push({ x: nx, y: ny });
                    }
                }

                return visited;
            }

            function allBoxesOnGoals(boxes, goalLookup) {
                var i;
                for (i = 0; i < boxes.length; i = i + 1) {
                    if (!goalLookup[keyFor(boxes[i].x, boxes[i].y)]) {
                        return false;
                    }
                }
                return true;
            }

            function computeDeadLookup(map, goalLookup) {
                var out = {};
                var h = map.length;
                var w = map[0].length;
                var x;
                var y;
                var k;
                var up;
                var down;
                var left;
                var right;

                for (y = 1; y < h - 1; y = y + 1) {
                    for (x = 1; x < w - 1; x = x + 1) {
                        if (map[y][x] === WALL) {
                            continue;
                        }
                        k = keyFor(x, y);
                        if (goalLookup[k]) {
                            continue;
                        }
                        up = isWall(map, x, y - 1);
                        down = isWall(map, x, y + 1);
                        left = isWall(map, x - 1, y);
                        right = isWall(map, x + 1, y);
                        if ((up || down) && (left || right)) {
                            out[k] = true;
                        }
                    }
                }

                return out;
            }

            function listFloorCells(map) {
                var out = [];
                var y;
                var x;
                for (y = 1; y < map.length - 1; y = y + 1) {
                    for (x = 1; x < map[0].length - 1; x = x + 1) {
                        if (map[y][x] === FLOOR) {
                            out.push({ x: x, y: y });
                        }
                    }
                }
                return out;
            }

            function reservedFloorCellCount(width, height) {
                var count = 0;
                var x;
                var y;
                for (y = Math.max(1, height - PAD_SIZE); y < height - 1; y = y + 1) {
                    for (x = Math.max(1, width - PAD_SIZE); x < width - 1; x = x + 1) {
                        count = count + 1;
                    }
                }
                return count;
            }

            function isReservedBoardCell(x, y, boardWidth, boardHeight) {
                return x >= boardWidth - PAD_SIZE && y >= boardHeight - PAD_SIZE;
            }

            function pickRandomPoints(points, count) {
                var pool = clonePoints(points);
                shuffle(pool);
                if (pool.length < count) {
                    return null;
                }
                return pool.slice(0, count);
            }

            function shuffle(arr) {
                var i;
                var j;
                var temp;
                for (i = arr.length - 1; i > 0; i = i - 1) {
                    j = randInt(0, i + 1);
                    temp = arr[i];
                    arr[i] = arr[j];
                    arr[j] = temp;
                }
            }

            function clonePoints(points) {
                var out = [];
                var i;
                for (i = 0; i < points.length; i = i + 1) {
                    out.push({ x: points[i].x, y: points[i].y });
                }
                return out;
            }

            function pointsLookup(points) {
                var out = {};
                var i;
                for (i = 0; i < points.length; i = i + 1) {
                    out[keyFor(points[i].x, points[i].y)] = true;
                }
                return out;
            }

            function boxLookup(boxes) {
                return pointsLookup(boxes);
            }

            function stateKey(boxes, player) {
                return boxesKey(boxes) + '@' + player.x + ',' + player.y;
            }

            function boxesKey(boxes) {
                var parts = [];
                var i;
                for (i = 0; i < boxes.length; i = i + 1) {
                    parts.push(boxes[i].x + ',' + boxes[i].y);
                }
                return parts.join('|');
            }

            function normalizeBoxes(boxes) {
                boxes.sort(function (a, b) {
                    if (a.y !== b.y) {
                        return a.y - b.y;
                    }
                    return a.x - b.x;
                });
            }

            function boxIndexAt(boxes, x, y) {
                var i;
                for (i = 0; i < boxes.length; i = i + 1) {
                    if (boxes[i].x === x && boxes[i].y === y) {
                        return i;
                    }
                }
                return -1;
            }

            function isWall(map, x, y) {
                if (y < 0 || y >= map.length || x < 0 || x >= map[0].length) {
                    return true;
                }
                if (isReservedBoardCell(x, y, map[0].length, map.length)) {
                    return true;
                }
                return map[y][x] === WALL;
            }

            function isEnclosedWallCell(x, y, map) {
                var dx;
                var dy;
                var i;
                if (!map || !map.length) {
                    return false;
                }
                for (dy = -1; dy <= 1; dy = dy + 1) {
                    for (dx = -1; dx <= 1; dx = dx + 1) {
                        if (dx === 0 && dy === 0) {
                            continue;
                        }
                        if (!isWall(map, x + dx, y + dy)) {
                            return false;
                        }
                    }
                }
                return true;
            }

            function keyFor(x, y) {
                return x + '_' + y;
            }

            function randInt(min, max) {
                return Math.floor(Math.random() * (max - min)) + min;
            }

            function cp(v) {
                if (String.fromCodePoint) {
                    return String.fromCodePoint(v);
                }
                if (v <= 0xFFFF) {
                    return String.fromCharCode(v);
                }
                v = v - 0x10000;
                return String.fromCharCode((v >> 10) + 0xD800, (v % 0x400) + 0xDC00);
            }
        }());
    </script>
