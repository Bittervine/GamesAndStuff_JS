<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Breakthrough JS</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'FreeSerif', serif;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
      background:#fff;
      color:#23160f;
    }
    .wrap{width:100%; margin:0; padding:8px 0 0}
    canvas{
      display:block;
      margin:8px auto;
      max-width:calc(100vw - 16px);
      height:auto;
      touch-action:manipulation;
    }
    #controls{
      font-size:95%;
      text-align:center;
      font-family:serif;
    }
    #controls button,
    #controls input{
      font-size:inherit;
      vertical-align:middle;
    }
    #controls button{
      width:2.2em;
      box-sizing:border-box;
      line-height:1;
      padding-top:0;
      padding-bottom:0;
      padding-left:0;
      padding-right:0;
      min-height:1.8em;
    }
    #previewBtn{
      width:auto;
      min-width:4.6em;
      padding-left:0.3em;
      padding-right:0.3em;
    }
    #previewBtn.is-on{
      box-shadow:inset 0 2px 4px rgba(0,0,0,0.35);
      background:#d9d9d9;
    }
    #buttonRow{
      display:flex;
      flex-wrap:nowrap;
      align-items:center;
      justify-content:center;
      gap:0.25em;
      white-space:nowrap;
    }
    #buttonRow button,
    #buttonRow label,
    #buttonRow input{
      vertical-align:middle;
    }
    #buttonRow label{
      display:inline-flex;
      align-items:center;
      line-height:1;
      white-space:nowrap;
    }
    #status{
      display:block;
      margin-top:.35em;
      font-weight:700;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <canvas id="board" width="720" height="720"></canvas>
    <div id="controls">
      <div id="buttonRow">
        <button id="resetBtn" title="Reset">↺</button>
        <label>&nbsp;Depth:&nbsp;<input id="depthInput" type="number" value="4" min="1" max="9" style="width:2.2em"></label>
        <label>&nbsp;Clumsy:&nbsp;<input id="clumsyInput" type="number" value="0" min="0" max="100" style="width:2.2em;margin-right:2px">%</label>
        <button id="previewBtn" title="Preview">Preview</button>
        <button id="takebackBtn" title="Undo">⌫</button>
      </div>
      <span id="status"></span>
    </div>
  </main>

  <script>
  (function(){
    'use strict';

    var N=8, HUMAN='w', AI='b', INF=1e9, MATE=1e7;
    var board, turn, over, winner, history, previewMove, previewEnabled, aiBusy, aiTimer, selected, cell, pad;
    var aiThinkStart=0, aiDepthNow=0, aiDepthDone=0, aiLastSec=0, aiTargetDepth=0, aiBestMove=null, aiDepthStart=0, searchDeadline=0;
    var canvas=document.getElementById('board'), ctx=canvas.getContext&&canvas.getContext('2d');
    var controls=document.getElementById('controls'), statusEl=document.getElementById('status');
    var depthInput=document.getElementById('depthInput'), clumsyInput=document.getElementById('clumsyInput'), previewBtn=document.getElementById('previewBtn');
    var LIGHT_SQUARE = '#F0D9B5';
    var DARK_SQUARE = '#B58863';
    var dir=[[1,0],[-1,0],[0,1],[0,-1]];

    function save(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
    function load(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
    function clamp(v,lo,hi){ v=parseFloat(v); if(!isFinite(v)) return lo; if(v<lo) return lo; if(v>hi) return hi; return v; }
    function readClumsyProbability(){
      var raw=parseFloat(clumsyInput.value);
      if(!isFinite(raw)) raw=0;
      return clamp(raw,0,99)/100;
    }
    function clumsyRootScore(score, clumsyProb){
      var adjusted=score + (Math.random()-0.5)/100;
      var roll=Math.random();
      var hardMiss=clumsyProb*clumsyProb;
      if(roll<hardMiss) return -INF+1;
      if(roll<clumsyProb) return adjusted + (Math.random()>0.5 ? -1 : 1);
      return adjusted;
    }
    function opp(c){ return c===HUMAN ? AI : HUMAN; }
    function inBounds(r,c){ return r>=0 && r<N && c>=0 && c<N; }

    function makeBoard(){ var b=[],r,c; for(r=0;r<N;r++){ b[r]=[]; for(c=0;c<N;c++) b[r][c]=null; } return b; }
    function resetState(){
      var c;
      board=makeBoard();
      turn=HUMAN;
      over=false;
      winner=null;
      history=[];
      previewMove=null;
      selected=null;
      aiBusy=false;
      if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; }
      aiThinkStart=0; aiDepthNow=0; aiDepthDone=0; aiLastSec=0; aiTargetDepth=0; aiBestMove=null; aiDepthStart=0;
      for(c=0;c<N;c++){
        board[0][c]=AI;
        board[1][c]=AI;
        board[N-1][c]=HUMAN;
        board[N-2][c]=HUMAN;
      }
    }

    function pieceCount(color){
      var r,c,n=0;
      for(r=0;r<N;r++) for(c=0;c<N;c++) if(board[r][c]===color) n++;
      return n;
    }
    function advancement(color){
      var r,c,score=0;
      for(r=0;r<N;r++) for(c=0;c<N;c++){
        if(board[r][c]!==color) continue;
        score += color===AI ? r : (N-1-r);
      }
      return score;
    }
    function legalMovesFrom(r,c,color){
      var moves=[], dr=color===AI ? 1 : -1, nc, nr, target;
      if(board[r][c]!==color) return moves;
      nr=r+dr;
      if(!inBounds(nr,c)) return moves;
      if(board[nr][c]===null) moves.push({sr:r,sc:c,tr:nr,tc:c,capture:false});
      nc=c-1;
      if(inBounds(nr,nc) && board[nr][nc]!==color){
        target=board[nr][nc];
        if(target===null || target===opp(color)) moves.push({sr:r,sc:c,tr:nr,tc:nc,capture:target===opp(color)});
      }
      nc=c+1;
      if(inBounds(nr,nc) && board[nr][nc]!==color){
        target=board[nr][nc];
        if(target===null || target===opp(color)) moves.push({sr:r,sc:c,tr:nr,tc:nc,capture:target===opp(color)});
      }
      return moves;
    }
    function allMoves(color){
      var moves=[], r, c, part, i;
      for(r=0;r<N;r++) for(c=0;c<N;c++){
        if(board[r][c]!==color) continue;
        part=legalMovesFrom(r,c,color);
        for(i=0;i<part.length;i++) moves.push(part[i]);
      }
      return moves;
    }
    function hasAnyLegalMove(color){ return allMoves(color).length>0; }

    function makeToken(move,color){
      var t={move:{sr:move.sr,sc:move.sc,tr:move.tr,tc:move.tc,capture:move.capture},color:color,prevTurn:turn,prevOver:over,prevWinner:winner,captured:null};
      if(move.capture) t.captured={r:move.tr,c:move.tc,color:board[move.tr][move.tc]};
      board[move.sr][move.sc]=null;
      board[move.tr][move.tc]=color;
      return t;
    }
    function undoToken(t){
      if(!t) return;
      board[t.move.sr][t.move.sc]=t.color;
      if(t.captured) board[t.move.tr][t.move.tc]=t.captured.color;
      else board[t.move.tr][t.move.tc]=null;
      turn=t.prevTurn;
      over=t.prevOver;
      winner=t.prevWinner;
    }

    function terminalScore(){
      var r,c;
      for(c=0;c<N;c++){
        if(board[0][c]===HUMAN) return -MATE;
        if(board[N-1][c]===AI) return MATE;
      }
      if(pieceCount(HUMAN)===0) return MATE;
      if(pieceCount(AI)===0) return -MATE;
      return null;
    }
    function evaluateBoard(){
      var win=terminalScore();
      if(win!==null) return win;
      return (pieceCount(AI)-pieceCount(HUMAN))*1000 + (advancement(AI)-advancement(HUMAN))*40 + (allMoves(AI).length-allMoves(HUMAN).length)*8;
    }
    function moveOrderScore(move,color){
      var s=0;
      if(move.capture) s+=500;
      s += color===AI ? move.tr*20 : (N-1-move.tr)*20;
      if(move.tc===3 || move.tc===4) s += 8;
      return s;
    }
    function sortMoves(moves,color){
      moves.sort(function(a,b){ return moveOrderScore(b,color)-moveOrderScore(a,color); });
    }
    function search(depth, alpha, beta, color){
      var moves=allMoves(color), i, mv, tok, val, best;
      if(searchDeadline && Date.now()>=searchDeadline) return evaluateBoard();
      if(depth<=0) return evaluateBoard();
      if(!moves.length) return color===AI ? -MATE + depth : MATE - depth;
      sortMoves(moves, color);
      if(color===AI){
        best=-INF;
        for(i=0;i<moves.length;i++){
          mv=moves[i];
          tok=makeToken(mv,color);
          turn=HUMAN;
          val=search(depth-1, alpha, beta, HUMAN);
          undoToken(tok);
          if(val>best) best=val;
          if(best>alpha) alpha=best;
          if(alpha>=beta) break;
        }
        return best;
      }
      best=INF;
      for(i=0;i<moves.length;i++){
        mv=moves[i];
        tok=makeToken(mv,color);
        turn=AI;
        val=search(depth-1, alpha, beta, AI);
        undoToken(tok);
        if(val<best) best=val;
        if(best<beta) beta=best;
        if(alpha>=beta) break;
      }
      return best;
    }
    function chooseAiMoveAtDepth(depth){
      var maxDepth=clamp(depth,1,9)|0, moves=allMoves(AI), i, mv, tok, val, score, best=-INF, bestMove=null, bestMoves=[], clumsyProb=readClumsyProbability(), deadline=Date.now()+350;
      if(!moves.length) return null;
      sortMoves(moves, AI);
      bestMoves=[]; best=-INF;
      searchDeadline=deadline;
      for(i=0;i<moves.length;i++){
        mv=moves[i];
        tok=makeToken(mv, AI);
        turn=HUMAN;
        val=search(maxDepth-1, -INF, INF, HUMAN);
        undoToken(tok);
        score=clumsyRootScore(val, clumsyProb);
        if(score>best){ best=score; bestMoves=[mv]; }
        else if(score===best) bestMoves.push(mv);
        if(Date.now()>=deadline) break;
      }
      searchDeadline=0;
      if(bestMoves.length){
        bestMove = bestMoves[(Math.random() * bestMoves.length) | 0];
      }
      return bestMove;
    }

    function drawSquare(r,c){
      var x=pad + c*cell, y=pad + r*cell;
      ctx.fillStyle=((r+c)%2===0) ? LIGHT_SQUARE : DARK_SQUARE;
      ctx.fillRect(x, y, cell, cell);
    }
    function drawPiece(r,c,color,alpha){
      var x=pad + c*cell + cell/2, y=pad + r*cell + cell/2, rad=cell*0.34;
      if(typeof alpha==='number') ctx.globalAlpha=alpha;
      ctx.fillStyle=(color===HUMAN)?'#ffffff':'#000000';
      ctx.beginPath();
      ctx.arc(x, y, rad, 0, Math.PI*2, false);
      ctx.fill();
      ctx.lineWidth=Math.max(2, rad*0.14);
      ctx.strokeStyle=(color===HUMAN)?'#000000':'#ffffff';
      ctx.stroke();
      if(typeof alpha==='number') ctx.globalAlpha=1;
    }
    function drawTargets(move){
      var moves, i;
      if(!move || move.sr===undefined || move.sc===undefined) return;
      moves=legalMovesFrom(move.sr, move.sc, HUMAN);
      ctx.strokeStyle='rgba(255,215,120,.95)';
      ctx.lineWidth=Math.max(2, cell*0.08);
      for(i=0;i<moves.length;i++){
        ctx.beginPath();
        ctx.arc(pad + moves[i].tc*cell + cell/2, pad + moves[i].tr*cell + cell/2, cell*0.12, 0, Math.PI*2, false);
        ctx.stroke();
      }
    }
    function drawCornerMarks(r,c,color,alpha){
      var x0,y0,segment,width;
      if(!ctx || !inBounds(r,c)) return;
      x0=pad + c*cell;
      y0=pad + r*cell;
      segment=cell*0.12;
      width=Math.max(2, cell*0.07);
      if(typeof alpha==='number') ctx.globalAlpha=alpha;
      ctx.strokeStyle=color||'#000000';
      ctx.lineWidth=width;
      ctx.lineCap='butt';
      ctx.beginPath();
      ctx.moveTo(x0,y0+segment); ctx.lineTo(x0,y0); ctx.lineTo(x0+segment,y0);
      ctx.moveTo(x0+cell,y0+segment); ctx.lineTo(x0+cell,y0); ctx.lineTo(x0+cell-segment,y0);
      ctx.moveTo(x0,y0+cell-segment); ctx.lineTo(x0,y0+cell); ctx.lineTo(x0+segment,y0+cell);
      ctx.moveTo(x0+cell,y0+cell-segment); ctx.lineTo(x0+cell,y0+cell); ctx.lineTo(x0+cell-segment,y0+cell);
      ctx.stroke();
      if(typeof alpha==='number') ctx.globalAlpha=1;
    }
    function draw(){
      var r,c,last;
      if(!ctx) return;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle=LIGHT_SQUARE;
      ctx.fillRect(0,0,canvas.width,canvas.height);
      for(r=0;r<N;r++) for(c=0;c<N;c++) drawSquare(r,c);
      if(previewEnabled && previewMove && turn===AI) drawPiece(previewMove.tr, previewMove.tc, AI, 0.3);
      for(r=0;r<N;r++) for(c=0;c<N;c++) if(board[r][c]!==null) drawPiece(r,c,board[r][c],1);
      if(selected){
        ctx.strokeStyle='#000000';
        ctx.lineWidth=Math.max(2, cell*0.08);
        ctx.strokeRect(pad + selected.c*cell + 1.5, pad + selected.r*cell + 1.5, cell-3, cell-3);
        drawTargets(selected);
      }
      if(history.length){
        last=history[history.length-1];
        drawCornerMarks(last.move.sr, last.move.sc, '#000000');
        drawCornerMarks(last.move.tr, last.move.tc, '#000000');
      }
    }

    function updateStatus(){
      var score=evaluateBoard(), lead;
      if(over){
        if(winner===HUMAN) statusEl.textContent='Info: Game over: White wins ' + Math.abs(score).toFixed(1) + '.';
        else if(winner===AI) statusEl.textContent='Info: Game over: Black wins ' + Math.abs(score).toFixed(1) + '.';
        else statusEl.textContent='Info: Game over: Draw 0.0.';
      } else if (aiBusy && aiThinkStart) {
        statusEl.textContent='Info: Thinking Depth '+aiDepthNow+' for '+((Date.now()-aiThinkStart)/1000).toFixed(1)+' s.';
      } else {
        lead=score>0 ? 'Black leads by ' + score.toFixed(1) : score<0 ? 'White leads by ' + Math.abs(score).toFixed(1) : 'Level';
        statusEl.textContent='Info: ' + lead + ' for depth ' + (aiDepthDone>0?aiDepthDone:clamp(depthInput.value,1,9)) + ' after ' + aiLastSec.toFixed(1) + ' s.';
      }
    }
    function resolveEnd(){
      if(over) return;
      if(terminalScore()===MATE){ over=true; winner=AI; }
      else if(terminalScore()===-MATE){ over=true; winner=HUMAN; }
      else if(!hasAnyLegalMove(turn)){ over=true; winner=opp(turn); }
    }
    function refresh(){
      resolveEnd();
      updateStatus();
      draw();
    }

    function applyHuman(move){
      var tok;
      if(over || turn!==HUMAN || aiBusy) return false;
      if(!move) return false;
      tok=makeToken(move, HUMAN);
      history.push(tok);
      selected=null;
      turn=AI;
      resolveEnd();
      refresh();
      if(!over) scheduleAI();
      return true;
    }
    function applyAI(move){
      var tok=makeToken(move, AI);
      history.push(tok);
      turn=HUMAN;
      resolveEnd();
      refresh();
    }
    function scheduleAI(){
      if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; }
      aiTimer=setTimeout(startEngineTurn, previewEnabled ? 60 : 20);
    }
    function startEngineTurn(){
      aiTimer=null;
      if(over || turn!==AI || aiBusy) return;
      aiBusy=true;
      aiThinkStart=Date.now();
      aiDepthStart=aiThinkStart;
      aiDepthNow=1;
      aiTargetDepth=clamp(depthInput.value,1,9)|0;
      aiBestMove=null;
      refresh();
      previewMove=null;
      draw();
      aiTimer=setTimeout(pumpEngineTurn,0);
    }
    function finishEngineTurn(){
      var mv;
      aiBusy=false;
      aiLastSec=(Date.now()-aiThinkStart)/1000;
      aiDepthDone=aiDepthNow>0?Math.min(aiDepthNow,aiTargetDepth):aiDepthDone;
      aiThinkStart=0; aiDepthNow=0; aiTargetDepth=0; aiDepthStart=0;
      mv=aiBestMove;
      if(over || turn!==AI || !mv){ resolveEnd(); refresh(); return; }
      if(previewEnabled){
        previewMove={tr:mv.tr,tc:mv.tc,color:AI};
        draw();
      }
      setTimeout(function(){
        if(over || turn!==AI) return;
        applyAI(mv);
      }, previewEnabled ? 220 : 0);
    }
    function pumpEngineTurn(){
      var mv, depthElapsed;
      aiTimer=null;
      if(over || turn!==AI || !aiBusy) return;
      refresh();
      if(Date.now()-aiThinkStart>=30000){ finishEngineTurn(); return; }
      mv=chooseAiMoveAtDepth(aiDepthNow);
      if(mv) aiBestMove=mv;
      if(previewEnabled){
        previewMove=aiBestMove ? {tr:aiBestMove.tr,tc:aiBestMove.tc,color:AI} : null;
        draw();
      }
      depthElapsed=Date.now()-aiDepthStart;
      if(aiDepthNow>=aiTargetDepth || depthElapsed>=10000 || (Date.now()+Math.max(400,depthElapsed*2))>=(aiThinkStart+30000)){ finishEngineTurn(); return; }
      aiDepthNow+=1;
      aiDepthStart=Date.now();
      aiTimer=setTimeout(pumpEngineTurn,0);
    }

    function findSelectedMove(sr,sc,tr,tc){
      var moves=legalMovesFrom(sr,sc,HUMAN), i;
      for(i=0;i<moves.length;i++) if(moves[i].tr===tr && moves[i].tc===tc) return moves[i];
      return null;
    }
    function click(ev){
      var rect,x,y,sx,sy,r,c,mv;
      if(over || turn!==HUMAN || aiBusy) return;
      rect=canvas.getBoundingClientRect();
      sx=canvas.width/rect.width; sy=canvas.height/rect.height;
      x=(ev.clientX-rect.left)*sx; y=(ev.clientY-rect.top)*sy;
      c=Math.floor((x-pad)/cell);
      r=Math.floor((y-pad)/cell);
      if(!inBounds(r,c)) return;
      if(selected){
        if(selected.r===r && selected.c===c){ selected=null; draw(); return; }
        mv=findSelectedMove(selected.r,selected.c,r,c);
        if(mv){ applyHuman(mv); return; }
      }
      if(board[r][c]===HUMAN){
        selected={r:r,c:c};
        draw();
      } else {
        selected=null;
        draw();
      }
    }

    function takeBack(){
      var tok;
      if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; }
      aiBusy=false; aiThinkStart=0; aiDepthNow=0; aiTargetDepth=0; aiBestMove=null; aiDepthStart=0;
      if(!history.length) return;
      tok=history.pop();
      undoToken(tok);
      selected=null;
      previewMove=null;
      resolveEnd();
      refresh();
    }
    function resetGame(){
      if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; }
      aiBusy=false; aiThinkStart=0; aiDepthNow=0; aiTargetDepth=0; aiBestMove=null; aiDepthStart=0;
      resetState();
      previewEnabled=load('brk_preview')==='1';
      previewBtn.className=previewEnabled ? 'is-on' : '';
      refresh();
    }

    window.__test = {
      getState: function() {
        return { over: over, turn: turn, winner: winner, white: pieceCount(HUMAN), black: pieceCount(AI) };
      },
      legalMoves: function() { return allMoves(turn); },
      play: function(move) { return applyHuman(move); },
      forceOutcome: function(side) {
        over = true;
        winner = side === 'white' ? HUMAN : side === 'black' ? AI : null;
        statusEl.textContent = side === 'white' ? 'Info: Game over: White wins.' : side === 'black' ? 'Info: Game over: Black wins.' : 'Info: Game over: Draw.';
      }
    };
    function resize(){
      var safety=60;
      var controlsH=controls ? controls.offsetHeight + 16 : 0;
      var maxW=(typeof window.innerWidth==='number' && isFinite(window.innerWidth)) ? window.innerWidth - 16 : 512;
      var maxH=(typeof window.innerHeight==='number' && isFinite(window.innerHeight)) ? window.innerHeight - controlsH - safety : 512;
      var size=Math.max(128, Math.floor(Math.min(maxW, maxH)));
      if(controls){
        var testWidth=Math.floor(size*0.9);
        controls.style.width=testWidth+'px';
        controls.style.fontSize=Math.max(10, Math.round(size*0.033))+'px';
        controls.style.boxSizing='border-box';
        controls.style.textAlign='center';
        controlsH=controls.offsetHeight + 16;
        maxH=(typeof window.innerHeight==='number' && isFinite(window.innerHeight)) ? window.innerHeight - controlsH - safety : 512;
        size=Math.max(128, Math.floor(Math.min(maxW, maxH)));
      }
      var freeW=Math.max(0, maxW - size);
      canvas.width=size;
      canvas.height=size;
      canvas.style.marginLeft=(8 + Math.floor(freeW/2)) + 'px';
      canvas.style.marginRight=(8 + Math.ceil(freeW/2)) + 'px';
      canvas.style.marginTop='8px';
      canvas.style.marginBottom='8px';
      if(controls){
        var controlsWidth=Math.floor(size*0.9);
        var sideGap=size-controlsWidth;
        controls.style.width=controlsWidth + 'px';
        controls.style.fontSize=Math.max(10, Math.round(size*0.033)) + 'px';
        controls.style.marginLeft=(8 + Math.floor(freeW/2) + Math.floor(sideGap/2)) + 'px';
        controls.style.marginRight=(8 + Math.ceil(freeW/2) + Math.ceil(sideGap/2)) + 'px';
        controls.style.marginTop='0px';
        controls.style.marginBottom='8px';
      }
      pad=0;
      cell=size/N;
      draw();
    }
    function updatePreview(){
      if(!previewEnabled || over || turn!==AI || aiBusy){ previewMove=null; return; }
      previewMove=chooseAiMoveAtDepth(clamp(depthInput.value,1,9)|0);
    }
    function bind(){
      document.getElementById('resetBtn').addEventListener('click', resetGame);
      document.getElementById('takebackBtn').addEventListener('click', takeBack);
      canvas.addEventListener('click', click);
      if(window.addEventListener) window.addEventListener('resize', resize);
      depthInput.addEventListener('change', function(){ save('brk_depth', depthInput.value); updatePreview(); draw(); });
      clumsyInput.addEventListener('change', function(){ save('brk_clumsy', clumsyInput.value); updatePreview(); draw(); });
      previewBtn.addEventListener('click', function(){
        previewEnabled=!previewEnabled;
        save('brk_preview', previewEnabled ? '1' : '0');
        previewBtn.className=previewEnabled ? 'is-on' : '';
        updatePreview();
        draw();
      });
    }
    function boot(){
      var d=load('brk_depth'), c=load('brk_clumsy'), p=load('brk_preview');
      if(d!==null) depthInput.value=d;
      if(c!==null) clumsyInput.value=c;
      previewEnabled=(p==='1');
      previewBtn.className=previewEnabled ? 'is-on' : '';
      bind();
      resetState();
      resize();
      refresh();
