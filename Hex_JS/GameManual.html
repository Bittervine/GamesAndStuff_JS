<body>
  <main class="wrap">
    <h1>Hex Manual</h1>
    <p>Goal: connect your two opposite sides before the AI connects the other pair.</p>
    <ul>
      <li>White tries to connect top and bottom.</li>
      <li>Black tries to connect left and right.</li>
      <li>A legal move is placing one stone on any empty hex.</li>
      <li>There are no captures and no draws.</li>
    </ul>
    <p>Open the game: <a href="Hex_JS.html">Hex JS</a></p>
  </main>
