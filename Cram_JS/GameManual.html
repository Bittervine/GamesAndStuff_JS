<h1>Cram</h1>
<p>Both players place dominoes on empty squares. Dominoes may be vertical or horizontal.</p>
<h2>Legal Move</h2>
<p>Choose two orthogonally adjacent empty cells and place one domino covering exactly those two cells.</p>
<h2>Win</h2>
<p>If a player has no legal domino placement on their turn, that player loses.</p>
