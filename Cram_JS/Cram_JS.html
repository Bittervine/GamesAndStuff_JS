<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Cram JS</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:'FreeSerif',serif;overflow-x:hidden;-webkit-text-size-adjust:100%;background:#fff;color:#23160f}
    .wrap{width:100%;margin:0;padding:8px 0 0}
    canvas{display:block;margin:8px auto;max-width:calc(100vw - 16px);height:auto;touch-action:manipulation}
    #controls{font-size:95%;text-align:center;font-family:serif}
    #controls button,#controls input{font-size:inherit;vertical-align:middle}
    #controls button{width:2.2em;box-sizing:border-box;line-height:1;padding:0;min-height:1.8em}
    #previewBtn{width:auto;min-width:4.6em;padding-left:.3em;padding-right:.3em}
    #previewBtn.is-on{box-shadow:inset 0 2px 4px rgba(0,0,0,.35);background:#d9d9d9}
    #buttonRow{display:flex;flex-wrap:nowrap;align-items:center;justify-content:center;gap:.25em;white-space:nowrap}
    #buttonRow label{display:inline-flex;align-items:center;line-height:1;white-space:nowrap}
    #status{display:block;margin-top:.35em;font-weight:700}
  </style>
</head>
<body>
  <main class="wrap">
    <canvas id="board" width="760" height="760"></canvas>
    <div id="controls">
      <div id="buttonRow">
        <button id="resetBtn" title="Reset">&#8634;</button>
        <label>&nbsp;Depth:&nbsp;<input id="depthInput" type="number" value="5" min="1" max="9" style="width:2.2em"></label>
        <label>&nbsp;Clumsy:&nbsp;<input id="clumsyInput" type="number" value="0" min="0" max="100" style="width:2.2em;margin-right:2px">%</label>
        <button id="previewBtn" title="Preview">Preview</button>
        <button id="takebackBtn" title="Undo">&#9003;</button>
      </div>
      <span id="status"></span>
    </div>
  </main>
  <script>
  (function(){
    'use strict';
    var LIGHT='rgba(240,217,181,.20)', DARK='rgba(181,136,99,.20)';
    var N=8, HUMAN='w', AI='b', board, turn, over, winner, history, previewMove, previewEnabled, aiBusy, aiTimer, cell, pad;
    var aiThinkStart=0, aiDepthNow=0, aiDepthDone=0, aiLastSec=0, aiTargetDepth=0, aiBestMove=null, aiDepthStart=0, searchDeadline=0;
    var canvas=document.getElementById('board'), ctx=canvas.getContext&&canvas.getContext('2d');
    var controls=document.getElementById('controls'), statusEl=document.getElementById('status');
    var depthInput=document.getElementById('depthInput'), clumsyInput=document.getElementById('clumsyInput'), previewBtn=document.getElementById('previewBtn');
    var selected=null;
    function clamp(v,lo,hi){ v=parseFloat(v); if(!isFinite(v))v=lo; if(v<lo)return lo; if(v>hi)return hi; return v; }
    function pickClumsyMoveFromScores(scored, clumsyPct){
      var pct=clamp(clumsyPct,0,100), p, u, skip=0, idx;
      if(!scored||!scored.length) return null;
      if(scored.length===1) return scored[0].move;
      if(pct>=100) return scored[(Math.random()*scored.length)|0].move;
      if(pct<=0) return scored[0].move;
      p=pct/100;
      u=Math.random();
      while(skip<scored.length-1 && u<Math.pow(p,skip+1)) skip++;
      idx=skip + ((Math.random()*(scored.length-skip))|0);
      return scored[idx].move;
    }
    function save(k,v){ try{ localStorage.setItem(k,v); }catch(e){} } function load(k){ try{ return localStorage.getItem(k);}catch(e){return null;} }
    function opp(c){ return c===HUMAN?AI:HUMAN; } function inBounds(r,c){ return r>=0&&r<N&&c>=0&&c<N; }
    function makeBoard(){ var b=[],r,c; for(r=0;r<N;r++){ b[r]=[]; for(c=0;c<N;c++) b[r][c]=null; } return b; }
    function resetState(){ board=makeBoard(); turn=HUMAN; over=false; winner=null; history=[]; previewMove=null; selected=null; aiBusy=false; }
    function isFree(r,c){ return inBounds(r,c)&&board[r][c]===null; }
    function legalMoves(){ var a=[],r,c; for(r=0;r<N;r++)for(c=0;c<N;c++){ if(isFree(r,c+1)&&isFree(r,c))a.push({r1:r,c1:c,r2:r,c2:c+1}); if(isFree(r+1,c)&&isFree(r,c))a.push({r1:r,c1:c,r2:r+1,c2:c}); } return a; }
    function makeMove(m,color){ if(!m||!isFree(m.r1,m.c1)||!isFree(m.r2,m.c2)) return null; board[m.r1][m.c1]=color; board[m.r2][m.c2]=color; return {m:m,color:color}; }
    function undoMove(t){ if(!t)return; board[t.m.r1][t.m.c1]=null; board[t.m.r2][t.m.c2]=null; }
    function terminal(){ return legalMoves().length===0; }
    function evalBoard(){ var s=legalMoves().length; if(!s) return turn===AI?-100000:100000; return (turn===AI?1:-1)*s; }
    function search(depth,color,alpha,beta){
      var moves=legalMoves(),i,t,v,best;
      if(searchDeadline&&Date.now()>=searchDeadline) return evalBoard();
      if(depth<=0||!moves.length) return evalBoard();
      if(color===AI){ best=-1e9; for(i=0;i<moves.length;i++){ t=makeMove(moves[i],AI); turn=HUMAN; v=search(depth-1,HUMAN,alpha,beta); undoMove(t); turn=AI; if(v>best)best=v; if(best>alpha)alpha=best; if(beta<=alpha)break; } return best; }
      best=1e9; for(i=0;i<moves.length;i++){ t=makeMove(moves[i],HUMAN); turn=AI; v=search(depth-1,AI,alpha,beta); undoMove(t); turn=HUMAN; if(v<best)best=v; if(best<beta)beta=best; if(beta<=alpha)break; } return best;
    }
    function chooseAiMoveAtDepth(depth){
      var clumsyPct=clamp(clumsyInput.value,0,100),moves=legalMoves(),i,m,t,v,scored=[],deadline=Date.now()+350;
      if(!moves.length) return null;
      if(clumsyPct>=100) return moves[(Math.random()*moves.length)|0];
      searchDeadline=deadline;
      for(i=0;i<moves.length;i++){ m=moves[i]; t=makeMove(m,AI); turn=HUMAN; v=search(depth-1,HUMAN,-1e9,1e9); undoMove(t); turn=AI; scored.push({move:m,score:v}); if(Date.now()>=deadline)break; }
      searchDeadline=0;
      if(!scored.length) return null;
      scored.sort(function(a,b){return b.score-a.score;});
      return pickClumsyMoveFromScores(scored,clumsyPct);
    }
    function resize(){
      var safety=60, controlsH=controls?controls.offsetHeight+16:0, maxW=window.innerWidth-16, maxH=window.innerHeight-controlsH-safety, size=Math.max(128,Math.floor(Math.min(maxW,maxH)));
      var freeW, controlsWidth, sideGap;
      if(controls){
        controls.style.width=Math.floor(size*.9)+'px';
        controls.style.fontSize=Math.max(10,Math.round(size*.033))+'px';
        controls.style.boxSizing='border-box';
        controls.style.textAlign='center';
        controlsH=controls.offsetHeight+16;
        maxH=window.innerHeight-controlsH-safety;
        size=Math.max(128,Math.floor(Math.min(maxW,maxH)));
      }
      freeW=Math.max(0,maxW-size);
      canvas.width=size; canvas.height=size;
      canvas.style.marginLeft=(8+Math.floor(freeW/2))+'px';
      canvas.style.marginRight=(8+Math.ceil(freeW/2))+'px';
      canvas.style.marginTop='8px';
      canvas.style.marginBottom='8px';
      if(controls){
        controlsWidth=Math.floor(size*0.9);
        sideGap=size-controlsWidth;
        controls.style.width=controlsWidth+'px';
        controls.style.fontSize=Math.max(10,Math.round(size*0.033))+'px';
        controls.style.marginLeft=(8+Math.floor(freeW/2)+Math.floor(sideGap/2))+'px';
        controls.style.marginRight=(8+Math.ceil(freeW/2)+Math.ceil(sideGap/2))+'px';
        controls.style.marginTop='0px';
        controls.style.marginBottom='8px';
      }
      cell=Math.max(18,Math.floor(size/(N+2))); pad=Math.floor((size-cell*N)/2); draw();
    }
    function drawBrackets(m){
      var w=Math.max(2,Math.floor(cell*.09)), l=Math.max(7,Math.floor(cell*.28));
      var left=Math.min(m.c1,m.c2), right=Math.max(m.c1,m.c2), top=Math.min(m.r1,m.r2), bottom=Math.max(m.r1,m.r2);
      var x=pad+left*cell, y=pad+top*cell, bw=(right-left+1)*cell, bh=(bottom-top+1)*cell;
      ctx.strokeStyle='#000'; ctx.lineWidth=w;
      ctx.beginPath(); ctx.moveTo(x,y+l); ctx.lineTo(x,y); ctx.lineTo(x+l,y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+bw-l,y); ctx.lineTo(x+bw,y); ctx.lineTo(x+bw,y+l); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,y+bh-l); ctx.lineTo(x,y+bh); ctx.lineTo(x+l,y+bh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+bw-l,y+bh); ctx.lineTo(x+bw,y+bh); ctx.lineTo(x+bw,y+bh-l); ctx.stroke();
    }
    function drawDomino(m,color,alpha){
      var inset=Math.max(4,cell*0.14), corner=Math.max(4,cell*0.12), strokeW=Math.max(2,cell*0.08);
      var left=Math.min(m.c1,m.c2), right=Math.max(m.c1,m.c2), top=Math.min(m.r1,m.r2), bottom=Math.max(m.r1,m.r2);
      var x=pad+left*cell+inset, y=pad+top*cell+inset, w=(right-left+1)*cell-inset*2, h=(bottom-top+1)*cell-inset*2;
      if(typeof alpha==='number') ctx.globalAlpha=alpha;
      ctx.fillStyle=(color===HUMAN)?'#ffffff':'#000000';
      ctx.beginPath();
      ctx.moveTo(x+corner,y);
      ctx.lineTo(x+w-corner,y);
      ctx.quadraticCurveTo(x+w,y,x+w,y+corner);
      ctx.lineTo(x+w,y+h-corner);
      ctx.quadraticCurveTo(x+w,y+h,x+w-corner,y+h);
      ctx.lineTo(x+corner,y+h);
      ctx.quadraticCurveTo(x,y+h,x,y+h-corner);
      ctx.lineTo(x,y+corner);
      ctx.quadraticCurveTo(x,y,x+corner,y);
      ctx.closePath();
      ctx.fill();
      ctx.lineWidth=strokeW;
      ctx.strokeStyle=(color===HUMAN)?'#000000':'#ffffff';
      ctx.stroke();
      if(typeof alpha==='number') ctx.globalAlpha=1;
    }
    function draw(){
      var r,c,x,y,last,i,e;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for(r=0;r<N;r++)for(c=0;c<N;c++){ x=pad+c*cell; y=pad+r*cell; ctx.fillStyle=((r+c)%2===0)?LIGHT:DARK; ctx.fillRect(x,y,cell,cell); }
      for(i=0;i<history.length;i++){ e=history[i]; if(e&&e.m) drawDomino(e.m,e.color,1); }
      if(selected){ ctx.strokeStyle='#000'; ctx.lineWidth=Math.max(2,cell*.08); ctx.strokeRect(pad+selected.c*cell+1,pad+selected.r*cell+1,cell-2,cell-2); }
      if(previewMove&&previewEnabled){ drawDomino(previewMove,AI,0.33); }
      if(history.length){ last=history[history.length-1].m; drawBrackets(last); }
    }
    function refresh(){ var lead=legalMoves().length; if(over) statusEl.textContent='Info: Game over: '+(winner===AI?'Black':'White')+' wins '+lead.toFixed(1)+'.'; else if(aiBusy&&aiThinkStart) statusEl.textContent='Info: Thinking Depth '+aiDepthNow+' for '+((Date.now()-aiThinkStart)/1000).toFixed(1)+' s.'; else statusEl.textContent='Info: Black leads by '+lead.toFixed(1)+' for depth '+(aiDepthDone>0?aiDepthDone:clamp(depthInput.value,1,9))+' after '+aiLastSec.toFixed(1)+' s.'; }
    function recordMove(color,t,m){ history.push({color:color,t:t,m:m}); turn=opp(color); previewMove=null; selected=null; }
    function finishIfNeeded(){ if(terminal()){ over=true; winner=opp(turn); refresh(); return true; } return false; }
    function humanPlay(m){ var t; if(over||turn!==HUMAN||aiBusy)return; t=makeMove(m,HUMAN); if(!t)return; recordMove(HUMAN,t,m); draw(); refresh(); if(!finishIfNeeded())scheduleAi(); }
    function click(ev){
      var rect=canvas.getBoundingClientRect(), sx=canvas.width/rect.width, sy=canvas.height/rect.height, x=(ev.clientX-rect.left)*sx, y=(ev.clientY-rect.top)*sy, r=Math.floor((y-pad)/cell), c=Math.floor((x-pad)/cell), m;
      if(!isFree(r,c)) return;
      if(!selected){ selected={r:r,c:c}; draw(); return; }
      if(selected.r===r&&selected.c===c){ selected=null; draw(); return; }
      if(Math.abs(selected.r-r)+Math.abs(selected.c-c)!==1){ selected={r:r,c:c}; draw(); return; }
      m={r1:selected.r,c1:selected.c,r2:r,c2:c}; if(m.r1>m.r2||(m.r1===m.r2&&m.c1>m.c2)){ var tr=m.r1,tc=m.c1; m.r1=m.r2; m.c1=m.c2; m.r2=tr; m.c2=tc; } humanPlay(m);
    }
    function scheduleAi(){ if(aiTimer)clearTimeout(aiTimer); aiTimer=setTimeout(startEngineTurn,previewEnabled?60:20); }
    function startEngineTurn(){ if(over||turn!==AI||aiBusy)return; aiBusy=true; aiThinkStart=Date.now(); aiDepthNow=1; aiTargetDepth=clamp(depthInput.value,1,9)|0; aiBestMove=null; aiDepthStart=aiThinkStart; refresh(); aiTimer=setTimeout(pumpEngineTurn,0); }
    function pumpEngineTurn(){ var m,depthElapsed; if(over||turn!==AI||!aiBusy)return; refresh(); if(Date.now()-aiThinkStart>=30000){ finishEngineTurn(); return; } m=chooseAiMoveAtDepth(aiDepthNow); if(m)aiBestMove=m; if(previewEnabled){ previewMove=aiBestMove; draw(); } depthElapsed=Date.now()-aiDepthStart; if(aiDepthNow>=aiTargetDepth||depthElapsed>=10000||(Date.now()+Math.max(400,depthElapsed*2))>=(aiThinkStart+30000)){ finishEngineTurn(); return; } aiDepthNow+=1; aiDepthStart=Date.now(); aiTimer=setTimeout(pumpEngineTurn,0); }
    function finishEngineTurn(){ var m,t; aiBusy=false; aiLastSec=(Date.now()-aiThinkStart)/1000; aiDepthDone=aiDepthNow; aiThinkStart=0; aiDepthNow=0; m=aiBestMove; if(!m){ refresh(); return; } if(previewEnabled){ previewMove=m; draw(); } setTimeout(function(){ if(over||turn!==AI)return; t=makeMove(m,AI); if(!t)return; recordMove(AI,t,m); draw(); refresh(); finishIfNeeded(); },previewEnabled?220:0); }
    function undoEntry(e){ if(!e)return; undoMove(e.t); turn=e.color; over=false; winner=null; }
    function takeBack(){ if(aiTimer){clearTimeout(aiTimer);aiTimer=null;} aiBusy=false; previewMove=null; selected=null; if(!history.length)return; undoEntry(history.pop()); while(history.length&&turn!==HUMAN) undoEntry(history.pop()); draw(); refresh(); }
    function reset(){ resetState(); resize(); draw(); refresh(); }
    function init(){ var d=load('cram_depth'),c=load('cram_clumsy'),p=load('cram_preview'); if(d!==null)depthInput.value=d; if(c!==null)clumsyInput.value=c; previewEnabled=(p==='1'); previewBtn.className=previewEnabled?'is-on':''; document.getElementById('resetBtn').addEventListener('click',reset); document.getElementById('takebackBtn').addEventListener('click',takeBack); canvas.addEventListener('click',click); window.addEventListener('resize',resize); depthInput.addEventListener('change',function(){save('cram_depth',depthInput.value);}); clumsyInput.addEventListener('change',function(){save('cram_clumsy',clumsyInput.value);}); previewBtn.addEventListener('click',function(){ previewEnabled=!previewEnabled; save('cram_preview',previewEnabled?'1':'0'); previewBtn.className=previewEnabled?'is-on':''; draw(); }); window.__test={getState:function(){return {over:over,turn:turn};},legalMoves:function(){return legalMoves();},play:function(m){humanPlay(m);} }; reset(); }
    init();
  }());
  </script>
</body>
</html>
